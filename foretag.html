<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="page-title">Spick för företag — Professionell städning utan strul</title>
<meta id="page-desc" name="description" content="Spick levererar städning till kontor, fastigheter och företag via verifierade underleverantörer. Faktura med 30 dagars betalvillkor. Begär offert.">
<link rel="icon" href="favicon.ico">
<link rel="canonical" id="canonical-link">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<!-- Sprint Prof-1: delat design-system. Laddas FÖRE local <style> så lokala
     regler kan override. Aliases håller bakåtkompat för --g/--accent/etc. -->
<link rel="stylesheet" href="css/profile.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#0F6E56;--accent2:#1D9E75;--accent3:#E1F5EE;--bg:#FAFAF8;--w:#fff;--t:#1C1C1A;--m:#6B6960;--border:#E8E8E4;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased}

/* ── NAV ── */
.nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.nav-logo{color:var(--accent);text-decoration:none;font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700}
.nav-cta{background:var(--accent);color:#fff;padding:9px 22px;border-radius:99px;font-weight:600;font-size:.82rem;text-decoration:none;transition:all .2s}
.nav-cta:hover{background:var(--accent2);transform:translateY(-1px)}

/* ── HERO ── */
.hero{position:relative;overflow:hidden;padding:48px 24px 44px;color:#fff}
.hero-bg{position:absolute;inset:0;background:linear-gradient(165deg,color-mix(in srgb,var(--accent) 80%,#000) 0%,var(--accent) 40%,var(--accent2) 100%);z-index:0}
.hero-pattern{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:20px 20px;z-index:1}
.hero-glow{position:absolute;top:-40%;right:-15%;width:70%;height:180%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 65%);z-index:1;pointer-events:none}
.hero-inner{max-width:720px;margin:0 auto;position:relative;z-index:2}
.hero-top{display:flex;align-items:center;gap:18px;margin-bottom:20px}
.hero-avatar{width:72px;height:72px;border-radius:18px;background:rgba(255,255,255,.12);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;font-family:'Playfair Display',serif;flex-shrink:0;border:2px solid rgba(255,255,255,.18);backdrop-filter:blur(8px)}
.hero-avatar img{width:100%;height:100%;object-fit:cover;border-radius:16px}
.hero-info h1{font-family:'Playfair Display',serif;font-size:1.75rem;font-weight:700;line-height:1.15;letter-spacing:-.01em}
.hero-tagline{font-size:.88rem;opacity:.75;margin-top:4px}
.hero-avail{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:.78rem;font-weight:600;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);padding:5px 14px;border-radius:99px}
.hero-avail .pulse{width:8px;height:8px;border-radius:50%;background:#4ADE80;box-shadow:0 0 0 0 rgba(74,222,128,.6);animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(74,222,128,.6)}70%{box-shadow:0 0 0 8px rgba(74,222,128,0)}100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}}
.hero-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.hero-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);padding:5px 12px;border-radius:8px;font-size:.72rem;font-weight:600;letter-spacing:.02em}
.hero-desc{font-size:.92rem;line-height:1.7;opacity:.88;max-width:540px;margin:16px 0 24px}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap}
.hero-stat-val{font-size:1.6rem;font-weight:700;line-height:1}
.hero-stat-lbl{font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;opacity:.55;margin-top:3px}
.hero-cta-wrap{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap}
.hero-btn{display:inline-block;background:#fff;color:var(--accent);padding:14px 36px;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.hero-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.hero-btn-sec{display:inline-flex;align-items:center;gap:6px;color:#fff;font-size:.85rem;font-weight:500;text-decoration:none;padding:14px 20px;border:1.5px solid rgba(255,255,255,.25);border-radius:12px;transition:all .2s}
.hero-btn-sec:hover{background:rgba(255,255,255,.08)}

/* ── SOCIAL PROOF BAR ── */
.proof-bar{background:var(--w);border-bottom:1px solid var(--border);padding:14px 24px;text-align:center;font-size:.85rem;color:var(--t)}
.proof-bar strong{color:var(--accent);font-weight:700}
.proof-bar .count{font-size:1.1rem;font-weight:700;color:var(--accent)}

/* ── CONTAINER ── */
.container{max-width:720px;margin:0 auto;padding:24px 20px 120px}

/* ── SECTIONS ── */
.section{margin-bottom:24px;animation:fadeUp .4s ease both}
.section:nth-child(2){animation-delay:.05s}
.section:nth-child(3){animation-delay:.1s}
.section:nth-child(4){animation-delay:.15s}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;color:var(--t)}
.section-sub{font-size:.78rem;color:var(--m)}
.card{background:var(--w);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}

/* ── SERVICES ── */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.svc-card{background:var(--w);border:1px solid var(--border);border-radius:14px;padding:20px 16px;transition:all .25s;cursor:pointer;text-decoration:none;display:block;color:var(--t);position:relative}
.svc-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(15,110,86,.1);transform:translateY(-3px)}
.svc-card.popular{border-color:var(--accent);border-width:1.5px}
.svc-popular-badge{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:.62rem;padding:3px 8px;border-radius:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.svc-icon{font-size:1.4rem;margin-bottom:10px}
.svc-name{font-weight:700;font-size:.92rem;margin-bottom:2px}
.svc-desc{font-size:.75rem;color:var(--m);line-height:1.4;margin-bottom:10px;min-height:32px}
.svc-price{color:var(--accent);font-weight:700;font-size:1.15rem}
.svc-rut{font-size:.7rem;color:var(--m);margin-top:1px}
.svc-cta{display:inline-block;margin-top:10px;font-size:.78rem;color:var(--accent);font-weight:600;padding:6px 16px;background:var(--accent3);border-radius:8px;transition:background .2s}
.svc-card:hover .svc-cta{background:#C2EDDD}

/* ── TEAM ── */
.team-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.team-scroll::-webkit-scrollbar{height:4px}
.team-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.team-card{min-width:175px;max-width:200px;background:var(--w);border:1px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;scroll-snap-align:start;transition:all .25s;flex-shrink:0;text-decoration:none;color:var(--t);display:block}
.team-card:hover{border-color:var(--accent);box-shadow:0 8px 24px rgba(15,110,86,.1);transform:translateY(-3px)}
.team-av{width:64px;height:64px;border-radius:50%;background:var(--accent3);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.3rem;margin:0 auto 10px;overflow:hidden;border:2px solid var(--border);transition:border-color .2s}
.team-card:hover .team-av{border-color:var(--accent)}
.team-av img{width:100%;height:100%;object-fit:cover}
.team-name{font-weight:700;font-size:.92rem}
.team-stars{color:#F59E0B;font-size:.78rem;margin-top:4px}
.team-meta{font-size:.72rem;color:var(--m);margin-top:2px}
.team-bio{font-size:.72rem;color:var(--m);margin-top:6px;line-height:1.4;font-style:italic;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.team-svcs{display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin-top:8px}
.team-svc{background:var(--accent3);color:var(--accent);font-size:.62rem;padding:2px 8px;border-radius:99px;font-weight:600}
.team-book{display:block;margin-top:12px;padding:10px;background:var(--accent);color:#fff;border-radius:10px;font-size:.82rem;font-weight:600;text-decoration:none;transition:all .2s}
.team-book:hover{background:var(--accent2)}

/* ── FEATURED CLEANER ── */
.featured{border:2px solid var(--accent);border-radius:var(--radius);background:var(--w);padding:22px;margin-bottom:24px;position:relative}
.featured-badge{position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;font-size:.68rem;padding:4px 12px;border-radius:99px;font-weight:600}
.featured-main{display:flex;gap:16px;align-items:center;margin-bottom:14px}
.featured-av{width:64px;height:64px;border-radius:50%;background:var(--accent3);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;flex-shrink:0;overflow:hidden}
.featured-av img{width:100%;height:100%;object-fit:cover}
.featured-name{font-weight:700;font-size:1.05rem}
.featured-meta{font-size:.82rem;color:var(--m);margin-top:2px}
.featured-bio{font-size:.85rem;color:#4A4A44;font-style:italic;margin-top:6px;line-height:1.5}
.featured-btn{display:block;text-align:center;padding:13px;background:var(--accent);color:#fff;border-radius:12px;font-weight:600;font-size:.92rem;text-decoration:none;margin-top:14px;transition:all .2s}
.featured-btn:hover{background:var(--accent2)}

/* ── TRUST ── */
.trust-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.trust-item{background:var(--w);border:1px solid var(--border);border-radius:12px;padding:18px 12px;text-align:center;transition:all .2s}
.trust-item:hover{border-color:var(--accent);transform:translateY(-1px)}
.trust-check{width:32px;height:32px;border-radius:50%;background:var(--accent3);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.9rem;margin:0 auto 8px;font-weight:700}
.trust-label{font-size:.78rem;color:var(--t);font-weight:500;line-height:1.3}

/* ── REVIEWS ── */
.review{padding:18px 20px;border-bottom:1px solid #F2F2EE}
.review:last-child{border:none}
.review-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-who{font-weight:600;font-size:.88rem}
.review-date{font-size:.72rem;color:var(--m)}
.review-stars{color:#F59E0B;font-size:.85rem;letter-spacing:1px}
.review-text{font-size:.85rem;color:#4A4A44;line-height:1.65;margin-top:6px}
.review-svc{display:inline-block;background:#F5F5F0;padding:2px 8px;border-radius:6px;font-size:.7rem;color:var(--m);margin-top:6px}

/* ── AREAS ── */
.area-tags{display:flex;flex-wrap:wrap;gap:6px}
.area-tag{background:var(--w);border:1px solid var(--border);padding:8px 16px;border-radius:99px;font-size:.82rem;color:var(--t);font-weight:500;transition:all .2s}
.area-tag:hover{border-color:var(--accent);color:var(--accent);background:var(--accent3)}

/* ── FAQ ── */
.faq-item{padding:16px 20px;border-bottom:1px solid #F2F2EE;cursor:pointer;transition:background .15s}
.faq-item:hover{background:#FCFCFA}
.faq-item:last-child{border:none}
.faq-q{display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:.88rem}
.faq-arrow{font-size:1.1rem;color:var(--m);transition:transform .25s;font-weight:300}
.faq-item.open .faq-arrow{transform:rotate(45deg)}
.faq-a{font-size:.85rem;color:#4A4A44;line-height:1.65;margin-top:10px;display:none;padding-right:24px}
.faq-item.open .faq-a{display:block}

/* ── BOTTOM CTA ── */
.bottom-cta{text-align:center;padding:48px 20px 20px}
.bottom-cta h2{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;margin-bottom:6px}
.bottom-cta p{font-size:.88rem;color:var(--m);margin-bottom:24px}
.bottom-cta-btn{display:inline-block;background:var(--accent);color:#fff;padding:16px 48px;border-radius:12px;font-weight:700;font-size:1rem;text-decoration:none;transition:all .25s;box-shadow:0 4px 16px rgba(15,110,86,.2)}
.bottom-cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(15,110,86,.3)}

/* ── STICKY CTA ── */
.sticky-cta{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);padding:12px 20px;z-index:40;transform:translateY(100%);transition:transform .3s ease}
.sticky-cta.visible{transform:translateY(0)}
.sticky-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sticky-info{font-size:.82rem;color:var(--m)}
.sticky-info strong{color:var(--t);font-size:.88rem}
.sticky-btn{background:var(--accent);color:#fff;padding:13px 32px;border-radius:12px;font-weight:700;font-size:.92rem;text-decoration:none;white-space:nowrap;transition:all .2s}
.sticky-btn:hover{background:var(--accent2)}

/* ── RECRUIT FOOTER ── */
.recruit{background:var(--t);color:#fff;padding:32px 24px;text-align:center}
.recruit h3{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600;margin-bottom:6px}
.recruit p{font-size:.85rem;opacity:.7;margin-bottom:16px}
.recruit-btn{display:inline-block;background:var(--accent);color:#fff;padding:12px 28px;border-radius:10px;font-weight:600;font-size:.88rem;text-decoration:none;transition:all .2s}
.recruit-btn:hover{background:var(--accent2)}

/* Prof-3: Similar profiles + QR + share */
.similar-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.75rem}
.similar-card{background:var(--bg);border-radius:12px;padding:1rem;text-align:center;text-decoration:none;color:var(--t);transition:all .15s;border:1px solid var(--border)}
.similar-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.similar-av{width:48px;height:48px;border-radius:50%;background:var(--accent3);display:flex;align-items:center;justify-content:center;margin:0 auto .5rem;font-family:'Playfair Display',serif;font-weight:700;color:var(--accent);overflow:hidden}
.similar-av img{width:100%;height:100%;object-fit:cover}
.similar-name{font-weight:600;font-size:.85rem}
.similar-area{font-size:.75rem;color:var(--m)}
.similar-rating{font-size:.8rem;color:#F59E0B;margin-top:.25rem}
.qr-section{text-align:center;padding:16px 0}
.qr-section canvas,.qr-section img{border-radius:12px;max-width:180px;height:auto}
.share-bar{display:flex;gap:.75rem;justify-content:center;margin-top:12px;flex-wrap:wrap}
.share-btn{display:inline-flex;align-items:center;gap:.35rem;padding:.6rem 1rem;border-radius:100px;font-size:.8rem;font-weight:600;border:1.5px solid var(--border);color:var(--t);background:#fff;cursor:pointer;transition:all .15s;font-family:inherit}
.share-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── FOOTER ── */
.footer{text-align:center;padding:16px;font-size:.72rem;color:var(--m)}
.footer a{color:var(--accent);font-weight:600;text-decoration:none}

/* ── STATES ── */
.loading{text-align:center;padding:100px 20px;color:var(--m);font-size:.9rem}
.not-found{text-align:center;padding:100px 20px}
.not-found h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}

/* ── MOBILE ── */
@media(max-width:600px){
  .hero{padding:36px 20px 32px}
  .hero-info h1{font-size:1.35rem}
  .hero-stats{gap:20px}
  .hero-stat-val{font-size:1.3rem}
  .hero-cta-wrap{flex-direction:column}
  .hero-btn,.hero-btn-sec{text-align:center;justify-content:center}
  .svc-grid{grid-template-columns:1fr}
  .trust-grid{grid-template-columns:1fr 1fr}
  .team-card{min-width:150px}
  .sticky-info{display:none}
  .proof-bar{font-size:.8rem}
}

/* ── B2B LANDNINGSSIDA ── */
.b2b-hero{position:relative;overflow:hidden;padding:80px 24px 72px;color:#fff;text-align:center}
.b2b-hero-bg{position:absolute;inset:0;background:linear-gradient(165deg,color-mix(in srgb,var(--accent) 80%,#000) 0%,var(--accent) 40%,var(--accent2) 100%);z-index:0}
.b2b-hero-pattern{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.07) 1px,transparent 1px);background-size:20px 20px;z-index:1}
.b2b-hero-inner{max-width:780px;margin:0 auto;position:relative;z-index:2}
.b2b-hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:6px 16px;border-radius:99px;font-size:.78rem;font-weight:600;margin-bottom:20px;backdrop-filter:blur(8px)}
.b2b-hero h1{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;line-height:1.1;letter-spacing:-.02em;margin-bottom:16px}
.b2b-hero-sub{font-size:1.05rem;line-height:1.6;opacity:.88;max-width:580px;margin:0 auto 32px}
.b2b-cta-wrap{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.b2b-btn-primary{display:inline-block;background:#fff;color:var(--accent);padding:16px 36px;border-radius:12px;font-weight:700;font-size:.95rem;text-decoration:none;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.b2b-btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.2)}
.b2b-btn-secondary{display:inline-flex;align-items:center;gap:6px;color:#fff;font-weight:500;font-size:.9rem;text-decoration:none;padding:16px 24px;border:1.5px solid rgba(255,255,255,.3);border-radius:12px;transition:all .2s}
.b2b-btn-secondary:hover{background:rgba(255,255,255,.1)}

.b2b-proof{background:var(--w);border-bottom:1px solid var(--border);padding:20px 24px}
.b2b-proof-inner{max-width:960px;margin:0 auto;display:flex;justify-content:space-around;gap:24px;flex-wrap:wrap;text-align:center}
.b2b-proof-stat{flex:1;min-width:140px}
.b2b-proof-val{font-size:1.6rem;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}
.b2b-proof-lbl{font-size:.78rem;color:var(--m);margin-top:2px}

.b2b-section{padding:64px 24px;max-width:1080px;margin:0 auto}
.b2b-section-head{text-align:center;margin-bottom:48px}
.b2b-section-eyebrow{font-size:.78rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.b2b-section-head h2{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;letter-spacing:-.01em;line-height:1.2}
.b2b-section-head p{font-size:1rem;color:var(--m);max-width:560px;margin:12px auto 0;line-height:1.6}

.b2b-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.b2b-card{background:var(--w);border:1px solid var(--border);border-radius:16px;padding:28px 24px;transition:all .2s}
.b2b-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:var(--accent2)}
.b2b-card-icon{width:44px;height:44px;border-radius:12px;background:var(--accent3);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:16px}
.b2b-card h3{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.b2b-card p{font-size:.88rem;color:var(--m);line-height:1.6}

.b2b-process{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:32px;counter-reset:step}
.b2b-step{position:relative;padding-left:52px;counter-increment:step}
.b2b-step::before{content:counter(step);position:absolute;left:0;top:0;width:36px;height:36px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:.95rem;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif}
.b2b-step h3{font-size:1rem;font-weight:700;margin-bottom:6px}
.b2b-step p{font-size:.88rem;color:var(--m);line-height:1.6}

.b2b-price{background:var(--w);border:1px solid var(--border);border-radius:20px;padding:40px 32px;max-width:560px;margin:0 auto;text-align:center}
.b2b-price-amount{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:var(--accent);line-height:1}
.b2b-price-unit{font-size:1rem;color:var(--m);margin-top:4px}
.b2b-price-list{text-align:left;margin:24px 0;display:flex;flex-direction:column;gap:10px}
.b2b-price-item{display:flex;align-items:flex-start;gap:10px;font-size:.92rem}
.b2b-price-item::before{content:"✓";color:var(--accent);font-weight:700;flex-shrink:0}
.b2b-price-note{font-size:.78rem;color:var(--m);margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}

.b2b-faq{max-width:720px;margin:0 auto}
.b2b-faq-item{background:var(--w);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden}
.b2b-faq-q{padding:18px 24px;cursor:pointer;font-weight:600;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;list-style:none}
.b2b-faq-q::-webkit-details-marker{display:none}
.b2b-faq-q::after{content:"+";color:var(--accent);font-size:1.4rem;font-weight:400;transition:transform .2s}
.b2b-faq-item[open] .b2b-faq-q::after{transform:rotate(45deg)}
.b2b-faq-a{padding:0 24px 20px;color:var(--m);font-size:.92rem;line-height:1.7}

.b2b-cta-final{background:linear-gradient(165deg,var(--accent) 0%,var(--accent2) 100%);color:#fff;padding:64px 24px;text-align:center;margin-top:32px}
.b2b-cta-final h2{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;margin-bottom:12px}
.b2b-cta-final p{font-size:1rem;opacity:.9;max-width:520px;margin:0 auto 24px}

@media (max-width:640px){
  .b2b-hero{padding:60px 20px 52px}
  .b2b-hero h1{font-size:1.8rem}
  .b2b-section{padding:48px 20px}
  .b2b-section-head h2{font-size:1.5rem}
}

</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">Spick</a>
  <a href="#boka" class="nav-cta" id="header-book-btn">Boka städning</a>
</nav>

<div id="content"><div class="loading">Laddar företagsprofil...</div></div>

<div class="sticky-cta" id="sticky-cta">
  <div class="sticky-inner">
    <div class="sticky-info"><strong id="sticky-name"></strong> · Professionell städning</div>
    <a href="#boka" class="sticky-btn" id="sticky-book-btn">Boka nu</a>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/services-loader.js" defer></script>
<!-- Prof-3: QR-generator CDN (~5kB, cached). Används för shareable profile-QR. -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script>
var SU = SPICK.SUPA_URL, SK = SPICK.SUPA_KEY;
var H = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// Primärkälla: services.rut_eligible-kolumn via window.SPICK_RUT_SERVICES.
var RUT_SERVICES_FALLBACK = ['Hemstädning', 'Storstädning', 'Flyttstädning', 'Fönsterputs', 'Mattrengöring'];
function getRutServices() {
  return (window.SPICK_RUT_SERVICES && window.SPICK_RUT_SERVICES.length > 0)
    ? window.SPICK_RUT_SERVICES
    : RUT_SERVICES_FALLBACK;
}
function isRutEligible(svc) { return getRutServices().indexOf(svc) !== -1; }

// ── DYNAMIC ACCENT COLOR from company name ──
function nameToColor(name) {
  var hash = 0;
  for (var i = 0; i < (name || '').length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  var h = Math.abs(hash) % 360;
  // Avoid reds (0-30, 330-360) and yellows (45-65) — keep professional
  if (h < 30) h += 120;
  if (h > 330) h -= 120;
  if (h > 45 && h < 65) h += 80;
  return {
    main: 'hsl(' + h + ', 55%, 32%)',
    light: 'hsl(' + h + ', 55%, 42%)',
    bg: 'hsl(' + h + ', 45%, 95%)',
    accent3: 'hsl(' + h + ', 40%, 93%)'
  };
}

var svcIcons = {
  'Hemstädning': '🏠', 'Storstädning': '✨', 'Flyttstädning': '📦',
  'Fönsterputs': '🪟', 'Kontorsstädning': '🏢', 'Trappstädning': '🪜',
  'Skolstädning': '🏫', 'Vårdstädning': '🏥', 'Hotell & restaurang': '🏨'
};
var svcDescs = {
  'Hemstädning': 'Regelbunden städning av ditt hem — dammsugning, moppning, kök och badrum.',
  'Storstädning': 'Grundlig genomgång av hela bostaden — perfekt inför högtider eller flytt.',
  'Flyttstädning': 'Komplett städning enligt mäklarstandard — redo för besiktning.',
  'Fönsterputs': 'Kristallklara fönster in- och utvändigt, inklusive karmar.',
  'Kontorsstädning': 'Professionell kontorsmiljö — golv, ytor, kök och toaletter.',
  'Trappstädning': 'Rena trapphus och gemensamma utrymmen.',
  'Skolstädning': 'Professionell städning för skolor och förskolor med fokus på hygien.',
  'Vårdstädning': 'Städning av vårdlokaler med strikta hygienkrav.',
  'Hotell & restaurang': 'Professionell städservice för hotell och restauranger.'
};
var dayMap = ['day_sun','day_mon','day_tue','day_wed','day_thu','day_fri','day_sat'];

function animateCounter(el, target) {
  if (!el || target <= 0) return;
  var dur = 1200, start = performance.now();
  function step(now) {
    var t = Math.min((now - start) / dur, 1);
    t = 1 - Math.pow(1 - t, 3); // easeOutCubic
    el.textContent = Math.round(target * t);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

async function init() {
  var p = new URLSearchParams(window.location.search);
  var cid = p.get('id');
  var cleanerSlug = p.get('cleaner') || '';
  var slug = p.get('slug') || p.get('s');

  if (!cid && !slug) {
    renderB2BLanding();
    return;
  }

  try {
    var q = cid ? 'id=eq.' + cid : 'slug=eq.' + slug;
    var cr = await fetch(SU + '/rest/v1/companies?select=*&' + q, { headers: H });
    var cos = await cr.json();
    var co = cos[0];
    if (!co) { document.getElementById('content').innerHTML = '<div class="not-found"><h2>Företaget hittades inte</h2><p style="color:var(--m)">Kontrollera URL:en.</p><a href="boka.html" style="color:var(--accent);font-weight:600">← Boka städning</a></div>'; return; }

    // ── 1. DYNAMIC ACCENT COLOR ──
    // Zivar 2026-04-26: synka pristext + alla accent-element med VD:s
    // valda hero-färg om finns. Annars fallback till nameToColor(co.name).
    var colors = nameToColor(co.name);
    if (co.hero_bg_color && /^#[0-9a-fA-F]{3,8}$/.test(co.hero_bg_color)) {
      // VD har valt egen färg → använd den som accent överallt
      var _hexToRgb = function(hex) {
        var x = hex.replace('#',''); if (x.length===3) x = x[0]+x[0]+x[1]+x[1]+x[2]+x[2];
        return { r: parseInt(x.slice(0,2),16), g: parseInt(x.slice(2,4),16), b: parseInt(x.slice(4,6),16) };
      };
      var _lightenHex = function(hex, pct) {
        var c = _hexToRgb(hex), f = pct/100;
        var r = Math.min(255, Math.round(c.r + (255-c.r)*f));
        var g = Math.min(255, Math.round(c.g + (255-c.g)*f));
        var b = Math.min(255, Math.round(c.b + (255-c.b)*f));
        return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      };
      var _bgFromHex = function(hex) {
        var c = _hexToRgb(hex);
        return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.08)'; // svag bakgrund-tint
      };
      colors = {
        main: co.hero_bg_color,
        light: _lightenHex(co.hero_bg_color, 25),
        bg: _bgFromHex(co.hero_bg_color)
      };
    }
    document.documentElement.style.setProperty('--accent', colors.main);
    document.documentElement.style.setProperty('--accent2', colors.light);
    document.documentElement.style.setProperty('--accent3', colors.bg);

    // Hämta teammedlemmar
    var mr = await fetch(SU + '/rest/v1/v_cleaners_public?select=id,full_name,first_name,bio,avatar_url,services,hourly_rate,avg_rating,review_count,completed_jobs,status,owner_only,city&company_id=eq.' + co.id + '&is_approved=eq.true', { headers: H });
    var members = await mr.json() || [];
    // Per-cleaner allow_individual_booking-berikning (Zivar 2026-04-26)
    if (members.length > 0) {
      try {
        var memberIds = members.map(function(m) { return m.id; }).join(',');
        var modeRes = await fetch(SU + '/rest/v1/v_cleaner_booking_mode?id=in.(' + memberIds + ')&select=id,allow_individual_booking', { headers: H });
        var modeArr = modeRes.ok ? await modeRes.json() : [];
        var modeMap = {};
        modeArr.forEach(function(b) { modeMap[b.id] = b.allow_individual_booking !== false; });
        members.forEach(function(m) { m._allowIndividual = modeMap[m.id] !== false; });
      } catch(e) { members.forEach(function(m) { m._allowIndividual = true; }); }
    }
    var active = members.filter(function(m) { return !m.owner_only && m.status !== 'pausad'; });

    // Detect B2B company
    var allSvcs = [];
    members.forEach(function(m) { if (Array.isArray(m.services)) m.services.forEach(function(s) { if (allSvcs.indexOf(s) === -1) allSvcs.push(s); }); });
    var b2bSvcs = ['Kontorsst\u00e4dning','Trappst\u00e4dning','Skolst\u00e4dning','V\u00e5rdst\u00e4dning','Hotell & restaurang'];
    var isB2B = allSvcs.some(function(s) { return b2bSvcs.indexOf(s) > -1; }) && allSvcs.indexOf('Hemst\u00e4dning') === -1;

    // Hämta tjänstpriser
    var activIds = active.map(function(m){ return m.id; });
    var svcPrices = [];
    // Fetch company-level prices
    var companyPrices = {};
    try {
      var cpr = await fetch(SU + '/rest/v1/company_service_prices?company_id=eq.' + co.id, { headers: H });
      var cpData = await cpr.json() || [];
      cpData.forEach(function(p) { companyPrices[p.service_type] = p; });
    } catch(e) {}
    if (activIds.length) {
      var spf = activIds.map(function(id){ return 'cleaner_id.eq.' + id; }).join(',');
      var spr = await fetch(SU + '/rest/v1/cleaner_service_prices?select=cleaner_id,service_type,price,price_type&or=(' + spf + ')', { headers: H });
      svcPrices = await spr.json() || [];
    }

    // Hämta recensioner
    var ids = members.map(function(m) { return m.id; });
    var reviews = [];
    if (ids.length) {
      var rf = ids.map(function(id) { return 'cleaner_id.eq.' + id; }).join(',');
      var rr = await fetch(SU + '/rest/v1/reviews?select=id,cleaner_id,cleaner_rating,comment,created_at,service_type&or=(' + rf + ')&order=created_at.desc&limit=10', { headers: H });
      reviews = await rr.json() || [];
    }

    // ── 3. TILLGÄNGLIGHET IDAG ──
    var availableToday = false;
    if (activIds.length) {
      try {
        var todayCol = dayMap[new Date().getDay()];
        var avf = activIds.map(function(id){ return 'cleaner_id.eq.' + id; }).join(',');
        var avr = await fetch(SU + '/rest/v1/cleaner_availability?select=cleaner_id,' + todayCol + '&or=(' + avf + ')&' + todayCol + '=eq.true&limit=1', { headers: H });
        var avData = await avr.json();
        availableToday = Array.isArray(avData) && avData.length > 0;
      } catch(e) {}
    }

    // ── 4. POPULÄRASTE TJÄNSTEN ──
    var popularService = null;
    if (activIds.length) {
      try {
        var bkf = activIds.map(function(id){ return 'cleaner_id.eq.' + id; }).join(',');
        var bkr = await fetch(SU + '/rest/v1/bookings?select=service_type&or=(' + bkf + ')&payment_status=eq.paid&limit=100', { headers: H });
        var bks = await bkr.json() || [];
        if (bks.length) {
          var svcCount = {};
          bks.forEach(function(b) { svcCount[b.service_type] = (svcCount[b.service_type] || 0) + 1; });
          var maxCount = 0;
          Object.keys(svcCount).forEach(function(k) { if (svcCount[k] > maxCount) { maxCount = svcCount[k]; popularService = k; } });
          if (maxCount < 2) popularService = null; // Minst 2 bokningar för badge
        }
      } catch(e) {}
    }

    var totalJobs = members.reduce(function(s, m) { return s + (m.completed_jobs || 0); }, 0);
    var avgRating = reviews.length ? reviews.reduce(function(s, r) { return s + (r.cleaner_rating || 0); }, 0) / reviews.length : 0;
    var nameMap = {}; members.forEach(function(m) { nameMap[m.id] = m.full_name || m.first_name || ''; });
    var displayName = co.display_name || co.name;
    var bookUrl = 'boka.html?company=' + co.id;

    // Bygg unika tjänster med lägsta pris
    // Prioritet: 1) individuella priser  2) företagspriser  3) hourly_rate fallback
    // (Samma ordning som boka.html)
    var svcMap = {};
    // Steg 1: Individuella cleaner_service_prices (lägst vinner)
    svcPrices.forEach(function(sp) {
      var key = sp.service_type;
      if (!svcMap[key] || sp.price < svcMap[key].price) svcMap[key] = sp;
    });
    // Steg 2: Företagspriser (company_service_prices) — fallback för tjänster utan individpris
    Object.keys(companyPrices).forEach(function(svc) {
      if (!svcMap[svc]) {
        svcMap[svc] = { service_type: svc, price: companyPrices[svc].price, price_type: companyPrices[svc].price_type };
      }
    });
    // Steg 3: hourly_rate som sista fallback — bara om varken steg 1 eller 2 har priset
    active.forEach(function(m) {
      if (Array.isArray(m.services)) {
        m.services.forEach(function(s) {
          if (!svcMap[s]) svcMap[s] = { service_type: s, price: m.hourly_rate || 350, price_type: 'hourly' };
        });
      }
    });
    var uniqueServices = Object.values(svcMap);

    var cities = [];
    active.forEach(function(m) { if (m.city && cities.indexOf(m.city) === -1) cities.push(m.city); });

    // Update page
    document.title = displayName + ' — Professionell städning | Spick';
    document.getElementById('header-book-btn').href = bookUrl;
    document.getElementById('sticky-book-btn').href = bookUrl;
    document.getElementById('sticky-name').textContent = displayName;
    var canon = document.getElementById('canonical-link');
    if (canon) canon.href = 'https://spick.se/f/' + (co.slug || co.id);

    // ── BUILD HTML ──
    var h = '';

    // ── HERO ──
    // Anpassad bakgrund (Zivar 2026-04-26):
    //   1. co.hero_bg_url (custom bild) — högst prio + dark-overlay
    //   2. co.hero_bg_color (custom hex) — gradient från färgen
    //   3. nameToColor() — befintligt fallback (via .hero-bg-rule + --accent)
    var heroBgInline = '';
    if (co.hero_bg_url) {
      heroBgInline = 'background:linear-gradient(165deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.35) 50%,rgba(0,0,0,.55) 100%),url("' + esc(co.hero_bg_url) + '") center/cover no-repeat;';
    } else if (co.hero_bg_color && /^#[0-9a-fA-F]{3,8}$/.test(co.hero_bg_color)) {
      // Override --accent-color så hela hero + buttons matchar VD:s val
      var heroLight = (function(hex) {
        var x = hex.replace('#',''); if (x.length===3) x = x[0]+x[0]+x[1]+x[1]+x[2]+x[2];
        var r = parseInt(x.slice(0,2),16), g = parseInt(x.slice(2,4),16), b = parseInt(x.slice(4,6),16);
        r = Math.min(255, Math.round(r + (255-r)*0.25));
        g = Math.min(255, Math.round(g + (255-g)*0.25));
        b = Math.min(255, Math.round(b + (255-b)*0.25));
        return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
      })(co.hero_bg_color);
      heroBgInline = 'background:linear-gradient(165deg,' + co.hero_bg_color + ' 0%,' + heroLight + ' 100%);';
    }
    h += '<div class="hero"' + (heroBgInline ? ' style="' + heroBgInline + '"' : '') + '>';
    h += (co.hero_bg_url || co.hero_bg_color) ? '' : '<div class="hero-bg"></div>';
    h += '<div class="hero-pattern"></div><div class="hero-glow"></div><div class="hero-inner">';
    h += '<div class="hero-top">';
    // Logo om finns, annars initial-bokstav (Zivar-request 2026-04-26)
    if (co.logo_url) {
      h += '<div class="hero-avatar" style="overflow:hidden;background:#fff"><img src="' + esc(co.logo_url) + '" alt="' + esc(displayName) + ' logo" style="width:100%;height:100%;object-fit:cover" loading="lazy"></div>';
    } else {
      h += '<div class="hero-avatar">' + (displayName || '?').charAt(0) + '</div>';
    }
    h += '<div class="hero-info"><h1>' + esc(displayName) + '</h1>';
    if (co.org_number) h += '<div class="hero-tagline">Org.nr ' + esc(co.org_number) + '</div>';

    // ── 3. TILLGÄNGLIG IDAG ──
    if (availableToday) h += '<div class="hero-avail"><span class="pulse"></span>Tillgänglig idag</div>';

    h += '<div class="hero-badges">';
    if (isB2B) {
      h += '<span class="hero-badge">✓ F-skattsedel</span>';
      h += '<span class="hero-badge">✓ Avtalskunder</span>';
    } else {
      h += '<span class="hero-badge">✓ F-skattsedel</span>';
      h += '<span class="hero-badge">✓ RUT-avdrag</span>';
    }
    if (totalJobs >= 10) h += '<span class="hero-badge">✓ ' + totalJobs + '+ jobb utförda</span>';
    h += '</div></div></div>';

    if (co.description) h += '<div class="hero-desc">' + esc(co.description) + '</div>';

    // ── 2. ANIMERADE SIFFROR ──
    h += '<div class="hero-stats">';
    if (avgRating > 0) h += '<div><div class="hero-stat-val">' + avgRating.toFixed(1) + '</div><div class="hero-stat-lbl">Snittbetyg</div></div>';
    if (totalJobs > 0) {
      h += '<div><div class="hero-stat-val animated-counter" data-target="' + totalJobs + '">0</div><div class="hero-stat-lbl">Utförda jobb</div></div>';
    }
    if (active.length > 0) h += '<div><div class="hero-stat-val animated-counter" data-target="' + active.length + '">0</div><div class="hero-stat-lbl">Städare</div></div>';
    if (reviews.length) h += '<div><div class="hero-stat-val animated-counter" data-target="' + reviews.length + '">0</div><div class="hero-stat-lbl">Recensioner</div></div>';
    h += '</div>';

    h += '<div class="hero-cta-wrap">';
    h += '<a href="' + bookUrl + '" class="hero-btn">Boka städning →</a>';
    h += '<a href="tel:+46760505153" class="hero-btn-sec"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Ring oss</a>';
    h += '</div>';
    h += '</div></div>';

    // ── 6. SOCIAL PROOF BAR ──
    if (totalJobs > 0) {
      h += '<div class="proof-bar"><span class="count animated-counter" data-target="' + totalJobs + '">0</span> hem har städats via <strong>' + esc(displayName) + '</strong> på Spick</div>';
    }

    h += '<div class="container">';

    // ── FEATURED CLEANER ──
    if (cleanerSlug) {
      var featuredCleaner = active.find(function(m) {
        var mSlug = (m.full_name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        return mSlug === cleanerSlug || m.id === cleanerSlug;
      });
      if (featuredCleaner) {
        var fStars = '', fRat = parseFloat(featuredCleaner.avg_rating) || 0;
        for (var i = 0; i < 5; i++) fStars += i < Math.round(fRat) ? '★' : '☆';
        var fSvcs = Array.isArray(featuredCleaner.services) ? featuredCleaner.services : [];
        h += '<div class="featured">';
        h += '<div class="featured-badge">Rekommenderad</div>';
        h += '<div class="featured-main">';
        h += featuredCleaner.avatar_url ? '<div class="featured-av"><img src="' + featuredCleaner.avatar_url + '" alt="' + esc(featuredCleaner.full_name) + '"></div>' : '<div class="featured-av">' + (featuredCleaner.full_name || '?').charAt(0).toUpperCase() + '</div>';
        h += '<div><div class="featured-name">' + esc(featuredCleaner.full_name) + '</div>';
        h += '<div class="featured-meta">' + fStars + ' · ' + (featuredCleaner.completed_jobs || 0) + ' utförda jobb</div>';
        if (featuredCleaner.bio) h += '<div class="featured-bio">"' + esc(featuredCleaner.bio) + '"</div>';
        h += '</div></div>';
        if (fSvcs.length) { h += '<div class="team-svcs" style="justify-content:flex-start;margin-bottom:12px">'; fSvcs.forEach(function(s) { h += '<span class="team-svc">' + esc(s) + '</span>'; }); h += '</div>'; }
        h += '<a href="' + bookUrl + '&cleaner_id=' + featuredCleaner.id + '" class="featured-btn">Boka ' + esc((featuredCleaner.full_name || '').split(' ')[0]) + ' →</a>';
        h += '</div>';
      }
    }

    // ── 4. TJÄNSTER ──
    if (uniqueServices.length) {

    }

    if (metaDesc) metaDesc.content = displayName + ' — Professionell städning med verifierade städare. Boka via Spick med säker betalning och RUT-avdrag.';

    // ── SEO: JSON-LD (Prof-5 enhanced) ──
    // Rich-result-kandidat: aggregateRating, review[] med author, geo, areaServed,
    // hasOfferCatalog för tjänster. Google kan visa stjärnor + pris i SERP.
    var primaryCity = cities[0] || 'Stockholm';
    var jsonLd = {
      '@context': 'https://schema.org',
      '@type': 'LocalBusiness',
      'name': co.name,
      'description': co.description || 'Professionell städning',
      'url': 'https://spick.se/f/' + (co.slug || co.id),

    };

    if (cities.length > 1) {
      jsonLd.areaServed = cities.map(function(cty) { return { '@type': 'City', 'name': cty }; });
    } else {
      jsonLd.areaServed = { '@type': 'City', 'name': primaryCity };
    }
    // Prof-5: geo skippas för foretag.html — v_cleaners_public exponerar inte
    // home_lat/home_lng (PII-skyddad policy). Företagsadress finns inte i companies-
    // schema idag. Lägg till som framtida features (hygien-flag).
    //
    // Prof-5: tjänster som OfferCatalog
    if (uniqueServices.length > 0) {
      jsonLd.hasOfferCatalog = {
        '@type': 'OfferCatalog',
        'name': 'Städtjänster',
        'itemListElement': uniqueServices.map(function(svc) {
          return { '@type': 'Offer', 'itemOffered': { '@type': 'Service', 'name': svc.service_type } };
        })
      };
    }
    if (avgRating > 0) {
      jsonLd.aggregateRating = { '@type': 'AggregateRating', 'ratingValue': avgRating.toFixed(1), 'reviewCount': reviews.length, 'bestRating': '5', 'worstRating': '1' };
    }
    if (reviews.length) {
      jsonLd.review = reviews.slice(0, 3).map(function(r) {
        return { '@type': 'Review', 'author': { '@type': 'Person', 'name': nameMap[r.cleaner_id] || 'Kund' }, 'reviewRating': { '@type': 'Rating', 'ratingValue': r.cleaner_rating, 'bestRating': '5', 'worstRating': '1' }, 'reviewBody': r.comment || '', 'datePublished': r.created_at ? r.created_at.split('T')[0] : '' };
      });
    }
    var ldScript = document.createElement('script');
    ldScript.type = 'application/ld+json';
    ldScript.textContent = JSON.stringify(jsonLd);
    document.head.appendChild(ldScript);

  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="not-found"><h2>Något gick fel</h2><p style="color:var(--m)">' + (e.message || '') + '</p></div>';
  }
}

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Företag på Spick</title>
<meta name="description" content="Boka professionell städning via Spick — verifierade städare, säker betalning, RUT-avdrag.">
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#0F6E56;--gl:#1A8A6E;--bg:#FAFAF8;--w:#fff;--m:#6B6960;--border:#E8E8E4;--radius:16px}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:#1C1C1A;-webkit-font-smoothing:antialiased}
.header{background:var(--g);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header a{color:#fff;text-decoration:none;font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700}
.header .btn-book{background:#fff;color:var(--g);padding:8px 20px;border-radius:99px;font-weight:600;font-size:.85rem;text-decoration:none}
.container{max-width:800px;margin:0 auto;padding:24px 20px}
.hero{text-align:center;padding:40px 20px 32px}
.hero-avatar{width:80px;height:80px;border-radius:20px;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto 16px;font-family:'Playfair Display',serif}
.hero h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:#1C1C1A;margin-bottom:4px}
.hero .org{font-size:.85rem;color:var(--m)}
.hero .desc{font-size:.95rem;color:#4A4A44;margin-top:12px;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto}
.stats{display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap}
.stat{text-align:center}
.stat .num{font-size:1.3rem;font-weight:700;color:var(--g)}
.stat .lbl{font-size:.72rem;color:var(--m);text-transform:uppercase;letter-spacing:.04em}
.section{margin-top:32px}
.section-title{font-family:'Playfair Display',serif;font-size:1.15rem;margin-bottom:16px}
.card{background:var(--w);border-radius:var(--radius);padding:20px;border:1px solid var(--border);margin-bottom:12px}
.member{display:flex;align-items:center;gap:14px}
.member-avatar{width:48px;height:48px;border-radius:50%;background:#E1F5EE;color:var(--g);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;flex-shrink:0}
.member-name{font-weight:600;font-size:.95rem}
.member-meta{font-size:.78rem;color:var(--m);margin-top:2px}
.member-services{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.member-services span{background:#E1F5EE;color:var(--g);font-size:.7rem;padding:2px 8px;border-radius:99px;font-weight:500}
.review{padding:16px 0;border-bottom:1px solid var(--border)}
.review:last-child{border-bottom:none}
.review-header{display:flex;justify-content:space-between;align-items:center}
.review-name{font-weight:600;font-size:.88rem}
.review-date{font-size:.75rem;color:var(--m)}
.review-stars{color:#F59E0B;font-size:.9rem;margin-top:4px}
.review-text{font-size:.85rem;color:#4A4A44;margin-top:6px;line-height:1.5;font-style:italic}
.cta{text-align:center;padding:40px 20px;margin-top:24px}
.cta h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:8px}
.cta p{font-size:.88rem;color:var(--m);margin-bottom:20px}
.cta .btn{display:inline-block;background:var(--g);color:#fff;padding:14px 40px;border-radius:99px;font-weight:600;font-size:1rem;text-decoration:none;transition:background .2s}
.cta .btn:hover{background:var(--gl)}
.trust{display:flex;justify-content:center;gap:20px;margin-top:16px;flex-wrap:wrap}
.trust span{font-size:.78rem;color:var(--m)}
.footer{text-align:center;padding:24px;font-size:.75rem;color:var(--m);border-top:1px solid var(--border);margin-top:32px}
.loading{text-align:center;padding:80px 20px;color:var(--m);font-size:.9rem}
.not-found{text-align:center;padding:80px 20px}
.not-found h2{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:8px}
@media(max-width:600px){.hero h1{font-size:1.4rem}.stats{gap:16px}}
</style>
</head>
<body>
<div class="header">
  <a href="index.html">Spick</a>
  <a href="#boka" class="btn-book" id="header-book-btn">Boka städning →</a>
</div>
<div id="content"><div class="loading">🏢 Laddar företagsprofil...</div></div>
<script src="js/config.js"></script>
<script>
var SU = SPICK.SUPA_URL, SK = SPICK.SUPA_KEY;
var H = { 'apikey': SK, 'Authorization': 'Bearer ' + SK };

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

async function init() {
  var p = new URLSearchParams(window.location.search);
  var cid = p.get('id');
  var cleanerSlug = p.get('cleaner') || '';
  var slug = p.get('slug') || p.get('s');

  if (!cid && !slug) {
    document.getElementById('content').innerHTML = '<div class="not-found"><h2>Inget företag angivet</h2><p style="color:var(--m)">Kontrollera URL:en.</p><a href="boka.html" style="color:var(--g);font-weight:600">← Boka städning</a></div>';
    return;
  }

  try {
    var q = cid ? 'id=eq.' + cid : 'slug=eq.' + slug;
    var cr = await fetch(SU + '/rest/v1/companies?select=*&' + q, { headers: H });
    var cos = await cr.json();
    var co = cos[0];
    if (!co) { document.getElementById('content').innerHTML = '<div class="not-found"><h2>Företaget hittades inte</h2><p style="color:var(--m)">Kontrollera URL:en.</p><a href="boka.html" style="color:var(--g);font-weight:600">← Boka städning</a></div>'; return; }

    var mr = await fetch(SU + '/rest/v1/cleaners?select=id,full_name,first_name,bio,avatar_url,services,hourly_rate,avg_rating,review_count,completed_jobs,status,owner_only&company_id=eq.' + co.id + '&is_approved=eq.true', { headers: H });
    var members = await mr.json() || [];
    var active = members.filter(function(m) { return !m.owner_only && m.status !== 'pausad'; });

    var ids = members.map(function(m) { return m.id; });
    var reviews = [];
    if (ids.length) {
      var rf = ids.map(function(id) { return 'cleaner_id.eq.' + id; }).join(',');
      var rr = await fetch(SU + '/rest/v1/reviews?select=id,cleaner_id,cleaner_rating,comment,created_at,service_type&or=(' + rf + ')&order=created_at.desc&limit=10', { headers: H });
      reviews = await rr.json() || [];
    }

    var totalJobs = members.reduce(function(s, m) { return s + (m.completed_jobs || 0); }, 0);
    var avgRating = reviews.length ? reviews.reduce(function(s, r) { return s + (r.cleaner_rating || 0); }, 0) / reviews.length : 0;
    var nameMap = {}; members.forEach(function(m) { nameMap[m.id] = m.full_name || m.first_name || ''; });

    document.title = (co.name || 'Företag') + ' — Spick';
    document.getElementById('header-book-btn').href = 'boka.html?company=' + co.id;

    var h = '<div class="hero"><div class="hero-avatar">' + (co.name || '?').charAt(0) + '</div>';
    h += '<h1>' + esc(co.name) + '</h1>';
    if (co.org_number) h += '<div class="org">Org.nr: ' + esc(co.org_number) + '</div>';
    if (co.description) h += '<div class="desc">' + esc(co.description) + '</div>';
    h += '<div class="stats">';
    if (avgRating > 0) h += '<div class="stat"><div class="num">⭐ ' + avgRating.toFixed(1) + '</div><div class="lbl">Snittbetyg</div></div>';
    h += '<div class="stat"><div class="num">' + totalJobs + '</div><div class="lbl">Utförda jobb</div></div>';
    h += '<div class="stat"><div class="num">' + active.length + '</div><div class="lbl">Städare</div></div>';
    h += '</div></div><div class="container">';

    // If specific cleaner is requested, show them first
    var featuredCleaner = null;
    if (cleanerSlug) {
      featuredCleaner = active.find(function(m) {
        var mSlug = (m.full_name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        return mSlug === cleanerSlug || m.id === cleanerSlug;
      });
      if (featuredCleaner) {
        var fStars = '', fRat = parseFloat(featuredCleaner.avg_rating) || 0;
        for (var i = 0; i < 5; i++) fStars += i < Math.round(fRat) ? '\u2b50' : '\u2606';
        var fSvcs = Array.isArray(featuredCleaner.services) ? featuredCleaner.services : [];
        h += '<div class="container"><div class="section"><div class="section-title">Boka direkt</div>';
        h += '<div class="card" style="border:2px solid var(--g);position:relative">';
        h += '<div style="position:absolute;top:12px;right:12px;background:var(--g);color:#fff;font-size:.7rem;padding:3px 10px;border-radius:99px;font-weight:600">Rekommenderad</div>';
        h += '<div class="member" style="margin-bottom:12px">';
        h += featuredCleaner.avatar_url ? '<img src="' + featuredCleaner.avatar_url + '" style="width:56px;height:56px;border-radius:50%;object-fit:cover;flex-shrink:0">' : '<div class="member-avatar" style="width:56px;height:56px;font-size:1.2rem">' + (featuredCleaner.full_name || '?').charAt(0).toUpperCase() + '</div>';
        h += '<div><div class="member-name" style="font-size:1.05rem">' + esc(featuredCleaner.full_name) + '</div>';
        h += '<div class="member-meta">' + fStars + ' \u00b7 ' + (featuredCleaner.completed_jobs || 0) + ' utf\u00f6rda jobb</div>';
        if (featuredCleaner.bio) h += '<div class="member-meta" style="margin-top:4px;font-style:italic">"' + esc(featuredCleaner.bio) + '"</div>';
        if (fSvcs.length) { h += '<div class="member-services">'; fSvcs.forEach(function(s) { h += '<span>' + esc(s) + '</span>'; }); h += '</div>'; }
        h += '</div></div>';
        h += '<a href="boka.html?company=' + co.id + '&cleaner_id=' + featuredCleaner.id + '" class="btn" style="display:block;text-align:center;margin-top:8px;padding:12px;border-radius:12px">Boka ' + esc((featuredCleaner.full_name || '').split(' ')[0]) + ' \u2192</a>';
        h += '</div></div></div>';
      }
    }

    if (active.length) {
      h += '<div class="section"><div class="section-title">Vårt team</div>';
      active.forEach(function(m) {
        var stars = '', rat = parseFloat(m.avg_rating) || 0;
        for (var i = 0; i < 5; i++) stars += i < Math.round(rat) ? '⭐' : '☆';
        var svcs = Array.isArray(m.services) ? m.services : [];
        h += '<div class="card"><div class="member">';
        h += m.avatar_url ? '<img src="' + m.avatar_url + '" style="width:48px;height:48px;border-radius:50%;object-fit:cover;flex-shrink:0">' : '<div class="member-avatar">' + (m.full_name || '?').charAt(0).toUpperCase() + '</div>';
        h += '<div><div class="member-name">' + esc(m.full_name) + '</div>';
        h += '<div class="member-meta">' + stars + ' · ' + (m.completed_jobs || 0) + ' utförda jobb</div>';
        if (m.bio) h += '<div class="member-meta" style="margin-top:4px;font-style:italic">"' + esc(m.bio) + '"</div>';
        if (svcs.length) { h += '<div class="member-services">'; svcs.forEach(function(s) { h += '<span>' + esc(s) + '</span>'; }); h += '</div>'; }
        h += '<a href="boka.html?company=' + co.id + '&cleaner_id=' + m.id + '" style="display:block;text-align:center;margin-top:10px;padding:8px;background:#E1F5EE;color:var(--g);border-radius:10px;font-size:.82rem;font-weight:600;text-decoration:none">Boka ' + esc((m.full_name || '').split(' ')[0]) + ' \u2192</a>';
        h += '</div></div></div>';
      });
      h += '</div>';
    }

    if (reviews.length) {
      h += '<div class="section"><div class="section-title">Kundrecensioner</div><div class="card">';
      reviews.forEach(function(r) {
        var stars = ''; for (var i = 0; i < 5; i++) stars += i < Math.round(r.cleaner_rating || 0) ? '⭐' : '☆';
        var date = r.created_at ? new Date(r.created_at).toLocaleDateString('sv-SE', { day: 'numeric', month: 'short', year: 'numeric' }) : '';
        h += '<div class="review"><div class="review-header"><div class="review-name">' + esc(nameMap[r.cleaner_id] || '') + (r.service_type ? ' · ' + esc(r.service_type) : '') + '</div><div class="review-date">' + date + '</div></div>';
        h += '<div class="review-stars">' + stars + '</div>';
        if (r.comment) h += '<div class="review-text">"' + esc(r.comment) + '"</div>';
        h += '</div>';
      });
      h += '</div></div>';
    }

    h += '<div class="cta" id="boka"><h2>Boka ' + esc(co.name) + '</h2>';
    h += '<p>Professionell städning med säker betalning och RUT-avdrag</p>';
    h += '<a href="boka.html?company=' + co.id + '" class="btn">Boka städning →</a>';
    h += '<div class="trust"><span>🔒 Säker betalning</span><span>🏠 RUT-avdrag 50%</span><span>✅ Verifierade städare</span></div></div>';
    h += '</div>';
    h += '<div class="footer">Powered by <a href="index.html" style="color:var(--g);font-weight:600;text-decoration:none">Spick</a> · hello@spick.se</div>';

    document.getElementById('content').innerHTML = h;

    // SEO: Dynamic meta tags
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = (co.name || '') + ' — Professionell st\u00e4dning med verifierade st\u00e4dare. Boka via Spick med s\u00e4ker betalning och RUT-avdrag.';

    // SEO: JSON-LD structured data (LocalBusiness)
    var jsonLd = {
      '@context': 'https://schema.org',
      '@type': 'LocalBusiness',
      'name': co.name,
      'description': co.description || 'Professionell st\u00e4dning',
      'url': 'https://spick.se/f/' + (co.slug || co.id),
      'telephone': '+46760505153',
      'address': { '@type': 'PostalAddress', 'addressCountry': 'SE' },
      'priceRange': '$',
      'image': 'https://spick.se/images/spick-og.png'
    };
    if (avgRating > 0) {
      jsonLd.aggregateRating = {
        '@type': 'AggregateRating',
        'ratingValue': avgRating.toFixed(1),
        'reviewCount': reviews.length,
        'bestRating': '5',
        'worstRating': '1'
      };
    }
    var ldScript = document.createElement('script');
    ldScript.type = 'application/ld+json';
    ldScript.textContent = JSON.stringify(jsonLd);
    document.head.appendChild(ldScript);
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="not-found"><h2>Något gick fel</h2><p style="color:var(--m)">' + (e.message || '') + '</p></div>';
  }
}
init();
</script>
</body>
</html>

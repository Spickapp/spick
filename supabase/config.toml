[functions.health]
verify_jwt = false

# Stripe webhooks — Stripe skickar bara Stripe-Signature-header, inte JWT.
# Utan verify_jwt = false returnerar Supabase gateway 401 → Stripe disablear
# webhooken efter ~3 dagars failures (mejl 2026-04-25 om 28 apr-deadline).
[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-connect-webhook]
verify_jwt = false

# Sprint 4 — SSR-EF som triggas av crawlers från 404.html-routing.
# Måste accepteras anon (Googlebot etc har ingen JWT).
[functions.seo-page-stad-tjanst]
verify_jwt = false

# Sprint 4/B SEO — pre-render + dynamiska OG-images för crawlers.
[functions.og-prerender]
verify_jwt = false

[functions.og-image]
verify_jwt = false

# Phase 2 — anon POST från registrera-stadare.html.
# Egen rate-limit via check_rate_limit() i koden (3/IP/dag).
[functions.cleaner-application-submit]
verify_jwt = false

# Sprint 1B — anon POST från registrera-stadare.html för F-skatt-verify.
[functions.verify-fskatt]
verify_jwt = false

# Cron-EFs — autentisering via Bearer CRON_SECRET (inte JWT).
# requireCronAuth() i _shared/cron-auth.ts gör auth-checken inne i EF:n,
# men Supabase-gateway måste släppa igenom non-JWT-token först.
[functions.rating-reminder-cron]
verify_jwt = false

[functions.blog-auto-publish-cron]
verify_jwt = false

[functions.cleaner-onboarding-emails]
verify_jwt = false

# Weekly health-check som anropas via cron (sms-delivery-weekly.yml).
# Egen auth via requireCronAuth() — gateway behöver släppa igenom Bearer.
[functions.sms-delivery-test]
verify_jwt = false

# Nightly synthetic monitor — auth via Bearer CRON_SECRET, inte JWT.
[functions.synthetic-monitor]
verify_jwt = false

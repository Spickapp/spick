<div class="referral-card">
<h2 style="font-size:20px;margin-bottom:20px">🌑 Skicka en personlig inbjudan</h2>
<form onsubmit="sendInvite(event)">
  <input type="text" id="friendName" placeholder="Kompisens namn">
  <input type="email" id="friendEmail" placeholder="K-postadress" required>
  <textarea style="height:80px" id="friendMsg" placeholder="Personligt meddelande (valfritt)"></textarea>
  <button type="submit" class="btn btn-green" style="width:100%">Skicka inbjudan</button>
</form>
</div>
</div>

<script>
// Config loaded from js/config.js
const SUPA_URL = SPICK.SUPA_URL;
const SUPA_KEY = SPICK.SUPA_KEY;
// Generera referral-kod från e-post i localStorage
function getRefCode(){const email=localStorage.getItem('spick_customer_email');if(email){return btoa(email).replace(/[^a-zA-Z0-9]/g,'').slice(0,10);}return localStorage.getItem('spickRefCode')||'GAST';}
const refCode=getRefCode();
const refLink=`https://spick.se?ref=${refCode}`;
document.getElementById('refLink').textContent=refLink;

function copyLink(){navigator.clipboard.writeText(refLink);const btn=document.getElementById('copyBtn');btn.textContent='✅ Kopierat!';setTimeout(()=>{btn.innerHTML='🐎 Kopiera';},2000);}
function shareWA(){const msg=encodeURIComponent(`🧹 Boka städning med RUT-avdrag genom Spick! Får 50% rabatt via Skatteverket.\n\nRekommenderar starkt! Boka på: ${refLink}`);window.open('https://wa.me/?'+new URLSearchParams({text:msg}));}
function shareOther(){if(navigator.share){navigator.share({title:'Spick - städning med RUT',body:'Boka städning med 50% rabatt!',url:refLink});}else{copyLink();}}
async function sendInvite(e){
  e.preventDefault();
  const btn=e.target.querySelector('button');
  const friendEmail=document.getElementById('friendEmail').value;
  const friendName=document.getElementById('friendName').value;
  const friendMsg=document.getElementById('friendMsg').value;
  btn.textContent='⏳ Skickar...';btn.disabled=true;
  try{
    // Spara referral i Supabase
    const SB=supabase.createClient(SUPA_URL,SUPA_KEY);
    await SB.from('referrals').insert({
      referrer_email:localStorage.getItem('spick_customer_email')||'okänd',
      referred_email:friendEmail,
      ref_code:refCode,
      status:'skickad',
      created_at:new Date().toISOString()
    });
    // Skicka email via notify
    await fetch(SUPA_URL+'/functions/v1/notify',{method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+SUPA_KEY,apikey:SUPA_KEY},
      body:JSON.stringify({type:'referral_invite',record:{
        friend_email:friendEmail,friend_name:friendName,
        message:friendMsg,ref_code:refCode,ref_link:refLink
      }})
    });
    btn.textContent='✅ Skickat!';
  }catch(err){
    btn.textContent='Skicka inbjudan';btn.disabled=false;console.error(err);
  }
}
</script>

  <div id="spick-cookie">

  <div class="cookie-btns">
    <button class="cookie-decline" onclick="cookieChoice(false)">Endast nödvändiga</button>

  <script>
(function(){
  var c = document.getElementById('spick-cookie');
  if (!c) return;
  var choice = localStorage.getItem('spick-cookie-consent');
  if (!choice) {
    setTimeout(function(){ c.classList.add('show'); }, 3000);
  }
})();

function cookieChoice(accept) {
  localStorage.setItem('spick-cookie-consent', accept ? 'all' : 'necessary');
  var c = document.getElementById('spick-cookie');
  if (c) { c.style.transform = 'translateY(100%)'; setTimeout(function(){ c.remove(); }, 400); }
  if (accept && window.gtag) {
    gtag('consent', 'update', { analytics_storage: 'granted', ad_storage: 'granted' });
  }
}
</script>

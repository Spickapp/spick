<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<script>
var path = location.pathname.replace(/^\/f\//, '').replace(/\/$/, '').replace(/\.html$/, '');
var parts = path.split('/');
var compSlug = parts[0];
var cleanerSlug = parts[1] || '';
if (compSlug && compSlug !== 'index') {
  var url = '/foretag.html?slug=' + encodeURIComponent(compSlug);
  if (cleanerSlug) url += '&cleaner=' + encodeURIComponent(cleanerSlug);
  location.replace(url);
} else {
  location.replace('/boka.html');
}
</script>
</head>
<body><p>Omdirigeras...</p></body>
</html>

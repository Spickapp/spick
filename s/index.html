<meta name="robots" content="noindex">
<script>
// /s/farhad-haghighi → stadare-profil.html?s=farhad-haghighi
var slug = location.pathname.replace(/^\/s\//, '').replace(/\/$/, '').replace(/\.html$/, '');
if (slug && slug !== 'index') {
  location.replace('/stadare-profil.html?s=' + encodeURIComponent(slug));
} else {
  location.replace('/boka.html');
}
</script>
</head>

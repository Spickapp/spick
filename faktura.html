<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Faktura – Spick</title>
<meta name="robots" content="noindex">
<script src="js/config.js"></script>
<script src="js/commission-helpers.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#0F6E56;--t:#1C1C1A;--m:#6B6960;--border:#E8E8E4;--bg:#F7F7F5}
body{font-family:'DM Sans','Segoe UI',Arial,sans-serif;color:var(--t);background:var(--bg);min-height:100vh}
@media print{body{background:#fff} .no-print{display:none!important} .invoice-wrap{box-shadow:none!important;margin:0!important;border-radius:0!important}}
.no-print{text-align:center;padding:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.no-print button{padding:10px 24px;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.btn-print{background:var(--g);color:#fff}
.btn-back{background:#E5E7EB;color:#374151}
.invoice-wrap{max-width:700px;margin:20px auto;background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);overflow:hidden}
.inv-header{background:var(--g);padding:28px 32px;display:flex;justify-content:space-between;align-items:flex-start;color:#fff}
.inv-logo{font-family:Georgia,serif;font-size:1.8rem;font-weight:700}
.inv-type{font-size:1.1rem;font-weight:600;text-align:right;opacity:.9}
.inv-body{padding:28px 32px}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px}
.inv-meta-box h4{font-size:.72rem;text-transform:uppercase;color:var(--m);letter-spacing:.5px;margin-bottom:6px}
.inv-meta-box p{font-size:.88rem;line-height:1.6}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:20px}
.inv-table th{background:var(--bg);padding:10px 12px;text-align:left;font-size:.78rem;text-transform:uppercase;color:var(--m);font-weight:600;letter-spacing:.3px}
.inv-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:.88rem}
.inv-table td:last-child,.inv-table th:last-child{text-align:right}
.inv-totals{margin-left:auto;width:280px}
.inv-totals .row{display:flex;justify-content:space-between;padding:6px 0;font-size:.88rem}
.inv-totals .row.total{border-top:2px solid var(--t);font-weight:700;font-size:1rem;padding-top:10px;margin-top:6px}
.inv-totals .row.rut{color:var(--g);font-weight:600}
.inv-footer{padding:20px 32px;background:var(--bg);font-size:.75rem;color:var(--m);line-height:1.7;text-align:center}
.inv-badge{display:inline-block;padding:4px 12px;border-radius:6px;font-size:.75rem;font-weight:600}
.inv-badge.paid{background:#D1FAE5;color:#065F46}
.inv-badge.pending{background:#FEF3C7;color:#92400E}
.loading{text-align:center;padding:60px;color:var(--m)}
.error{text-align:center;padding:40px;color:#DC2626}
.inv-rut-box{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:14px;margin-bottom:20px;font-size:.85rem}
.inv-rut-box strong{color:var(--g)}
</style>
</head>
<body>

<div class="no-print">
  <button class="btn-print" onclick="window.print()">🖨️ Skriv ut / Spara som PDF</button>
  <button class="btn-back" onclick="history.back()">← Tillbaka</button>
</div>

<div class="invoice-wrap" id="invoice">
  <div class="loading" id="loading">Laddar faktura...</div>
</div>

<script>
const SUPA = SPICK.SUPA_URL;
const KEY = SPICK.SUPA_KEY;
const H = { apikey: KEY, Authorization: 'Bearer ' + KEY };

async function loadInvoice() {
  await window.SPICK_COMMISSION_READY;
  const params = new URLSearchParams(location.search);
  const bid = params.get('bid') || params.get('id');
  const type = params.get('type') || 'customer'; // customer or cleaner

  if (!bid) {
    document.getElementById('invoice').innerHTML = '<div class="error">Ingen boknings-ID angiven. Lägg till ?bid=DITT_ID i URL:en.</div>';
    return;
  }

  try {
    const res = await fetch(SUPA + '/rest/v1/bookings?id=eq.' + bid + '&select=*', { headers: H });
    const bookings = await res.json();
    if (!bookings || !bookings.length) {
      document.getElementById('invoice').innerHTML = '<div class="error">Bokning hittades inte.</div>';
      return;
    }
    const b = bookings[0];

    // Hämta städarinfo
    let cleanerData = null;
    if (b.cleaner_id) {
      const cRes = await fetch(SUPA + '/rest/v1/v_cleaners_public?id=eq.' + b.cleaner_id + '&select=full_name,hourly_rate,company_id', { headers: H });
      const cArr = await cRes.json();
      if (cArr && cArr.length) cleanerData = cArr[0];
    }

    // Hämta företagsinfo om det finns
    let companyData = null;
    if (cleanerData && cleanerData.company_id) {
      const coRes = await fetch(SUPA + '/rest/v1/companies?id=eq.' + cleanerData.company_id + '&select=name,display_name,org_number', { headers: H });
      const coArr = await coRes.json();
      if (coArr && coArr.length) companyData = coArr[0];
    }

    if (type === 'cleaner') {
      renderCleanerInvoice(b, cleanerData, companyData);
    } else {
      renderCustomerInvoice(b, cleanerData, companyData);
    }

    document.title = 'Faktura ' + (b.id || '').slice(0, 8).toUpperCase() + ' – Spick';
  } catch (e) {
    document.getElementById('invoice').innerHTML = '<div class="error">Kunde inte ladda faktura: ' + e.message + '</div>';
  }
}

function esc(s) { return (s || '').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function fmt(n) { return (n || 0).toLocaleString('sv-SE'); }
function fmtDate(d) {
  if (!d) return '–';
  var parts = d.split('-');
  return parts[2] + '/' + parts[1] + ' ' + parts[0];
}

function renderCustomerInvoice(b, cleaner, company) {
  const isPaid = b.payment_status === 'paid';
  const invoiceNr = 'SP-' + (b.id || '').slice(0, 8).toUpperCase();
  const rutAmount = b.rut_amount || 0;
  const totalPrice = b.total_price || 0;
  const priceBeforeRut = totalPrice + rutAmount;
  const commissionPct = b.commission_pct || getCommissionPct();
  const hours = b.booking_hours || 3;
  const rate = b.base_price_per_hour || b.customer_price_per_hour || Math.round(priceBeforeRut / hours);
  const serviceName = b.service_type || 'Hemstädning';
  const stripeFee = b.stripe_fee_sek || 0;

  let html = `
  <div class="inv-header">
    <div>
      <div class="inv-logo">Spick</div>
      <div style="font-size:.82rem;opacity:.8;margin-top:4px">Haghighi Consulting AB</div>
      <div style="font-size:.75rem;opacity:.7">Org.nr: 559402-4522</div>
    </div>
    <div style="text-align:right">
      <div class="inv-type">FAKTURA</div>
      <div style="font-size:.82rem;margin-top:4px">${invoiceNr}</div>
      <div style="margin-top:8px"><span class="inv-badge ${isPaid ? 'paid' : 'pending'}">${isPaid ? '✅ Betald' : '⏳ Väntar'}</span></div>
    </div>
  </div>
  <div class="inv-body">
    <div class="inv-meta">
      <div class="inv-meta-box">
        <h4>Kund</h4>
        <p><strong>${esc(b.customer_name)}</strong><br>
        ${esc(b.customer_email)}<br>
        ${b.customer_phone ? esc(b.customer_phone) + '<br>' : ''}
        ${esc(b.customer_address || '')}</p>
      </div>
      <div class="inv-meta-box">
        <h4>Fakturadetaljer</h4>
        <p>Fakturanr: <strong>${invoiceNr}</strong><br>
        Fakturadatum: ${fmtDate(b.booking_date)}<br>
        Betalningsmetod: ${isPaid ? 'Kort/Klarna via Stripe' : 'Ej betald'}<br>
        ${b.confirmed_at ? 'Bekräftad: ' + new Date(b.confirmed_at).toLocaleDateString('sv-SE') : ''}</p>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr><th>Beskrivning</th><th>Timmar</th><th>Á-pris</th><th>Belopp</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <strong>${esc(serviceName)}</strong><br>
            <span style="font-size:.78rem;color:var(--m)">
              Datum: ${fmtDate(b.booking_date)} kl ${b.booking_time || '09:00'}<br>
              Städare: ${esc(b.cleaner_name || 'Tilldelas')}
              ${b.square_meters ? '<br>Yta: ' + b.square_meters + ' kvm' : ''}
            </span>
          </td>
          <td>${hours}</td>
          <td>${fmt(rate)} kr</td>
          <td>${fmt(priceBeforeRut)} kr</td>
        </tr>
      </tbody>
    </table>

    ${rutAmount > 0 ? `
    <div class="inv-rut-box">
      <strong>RUT-avdrag tillämpat</strong><br>
      50% skattereduktion på arbetskostnaden enligt reglerna för husarbete (HUS).
      Spick ansöker om RUT-avdraget hos Skatteverket å kundens vägnar.<br>
      <strong>Avdrag: -${fmt(rutAmount)} kr</strong>
    </div>` : ''}

    <div class="inv-totals">
      <div class="row"><span>Arbetskostnad</span><span>${fmt(priceBeforeRut)} kr</span></div>
      ${rutAmount > 0 ? `<div class="row rut"><span>RUT-avdrag (50%)</span><span>-${fmt(rutAmount)} kr</span></div>` : ''}
      <div class="row total"><span>Att betala</span><span>${fmt(totalPrice)} kr</span></div>
      ${isPaid ? '<div class="row" style="color:var(--g)"><span>Betalt</span><span>✅ ' + fmt(totalPrice) + ' kr</span></div>' : ''}
    </div>
  </div>
  <div class="inv-footer">
    Haghighi Consulting AB · Bifirma Spick · Org.nr 559402-4522 · hello@spick.se · spick.se<br>
    Godkänd för F-skatt · Momsreg.nr: SE559402452201 · SNI: 81.210
  </div>`;

  document.getElementById('invoice').innerHTML = html;
}

function renderCleanerInvoice(b, cleaner, company) {
  const invoiceNr = 'SF-' + (b.id || '').slice(0, 8).toUpperCase();
  const hours = b.booking_hours || 3;
  const commissionPct = b.commission_pct || getCommissionPct();
  const totalPrice = b.total_price || 0;
  const rutAmount = b.rut_amount || 0;
  const priceBeforeRut = totalPrice + rutAmount;
  const spickGross = b.spick_gross_sek || Math.round(priceBeforeRut * commissionPct / 100);
  const cleanerPayout = priceBeforeRut - spickGross;
  const cleanerName = cleaner ? cleaner.full_name : (b.cleaner_name || 'Städare');
  const cleanerEmail = b.cleaner_email || '';
  const companyName = company ? (company.display_name || company.name) : null;
  const companyOrg = company ? company.org_number : null;

  let html = `
  <div class="inv-header">
    <div>
      <div class="inv-logo">Spick</div>
      <div style="font-size:.82rem;opacity:.8;margin-top:4px">Haghighi Consulting AB</div>
      <div style="font-size:.75rem;opacity:.7">Org.nr: 559402-4522</div>
    </div>
    <div style="text-align:right">
      <div class="inv-type">SJÄLVFAKTURA</div>
      <div style="font-size:.82rem;margin-top:4px">${invoiceNr}</div>
    </div>
  </div>
  <div class="inv-body">
    <div class="inv-meta">
      <div class="inv-meta-box">
        <h4>Uppdragstagare</h4>
        <p><strong>${esc(companyName || cleanerName)}</strong><br>
        ${companyOrg ? 'Org.nr: ' + esc(companyOrg) + '<br>' : ''}
        ${esc(cleanerEmail)}</p>
      </div>
      <div class="inv-meta-box">
        <h4>Uppdragsgivare</h4>
        <p><strong>Haghighi Consulting AB</strong><br>
        Bifirma Spick<br>
        Org.nr: 559402-4522<br>
        hello@spick.se</p>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr><th>Beskrivning</th><th>Timmar</th><th>Kundpris</th><th>Belopp</th></tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <strong>${esc(b.service_type || 'Hemstädning')}</strong><br>
            <span style="font-size:.78rem;color:var(--m)">
              Datum: ${fmtDate(b.booking_date)} kl ${b.booking_time || '09:00'}<br>
              Kund: ${esc(b.customer_name || 'Kund')}
              ${b.square_meters ? '<br>Yta: ' + b.square_meters + ' kvm' : ''}
            </span>
          </td>
          <td>${hours}</td>
          <td>${fmt(priceBeforeRut)} kr</td>
          <td>${fmt(priceBeforeRut)} kr</td>
        </tr>
      </tbody>
    </table>

    <div class="inv-totals">
      <div class="row"><span>Kundpris (inkl. RUT)</span><span>${fmt(priceBeforeRut)} kr</span></div>
      <div class="row" style="color:#DC2626"><span>Spick provision (${commissionPct}%)</span><span>-${fmt(spickGross)} kr</span></div>
      <div class="row total"><span>Utbetalning till dig</span><span>${fmt(cleanerPayout)} kr</span></div>
    </div>

    <div style="margin-top:20px;padding:14px;background:var(--bg);border-radius:10px;font-size:.82rem;color:var(--m);line-height:1.7">
      <strong>Villkor:</strong> Denna självfaktura är utställd av Spick (Haghighi Consulting AB) på uppdragstagarens vägnar
      enligt överenskommet uppdragsavtal. Invändning mot självfakturan ska ske skriftligt inom 7 dagar.
      Utbetalning sker inom 1–2 bankdagar efter genomfört och godkänt uppdrag via Stripe Connect.
    </div>
  </div>
  <div class="inv-footer">
    Haghighi Consulting AB · Bifirma Spick · Org.nr 559402-4522 · hello@spick.se · spick.se<br>
    Godkänd för F-skatt · Momsreg.nr: SE559402452201 · SNI: 81.210
  </div>`;

  document.getElementById('invoice').innerHTML = html;
}

loadInvoice();
</script>
</body>
</html>

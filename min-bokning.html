<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Min bokning – Spick</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<script>!function(c,l,a,r,i,t,y){c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y)}(window,document,"clarity","script","w1ep5s1zm6")</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--g:#0F6E56;--gm:#0A5240;--gr:#E1F5EE;--r:#DC2626;--b:#1C1C1A;--m:#6B6960;--bg:#FAFAF8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;padding:0 0 80px}
nav{background:#fff;border-bottom:1px solid #EBEBEB;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--g);text-decoration:none}
.wrap{max-width:560px;margin:32px auto;padding:0 16px}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--b);margin-bottom:8px}
.sub{color:var(--m);font-size:.95rem;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.status{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;font-size:.85rem;font-weight:600;margin-bottom:16px}
.status.paid{background:var(--gr);color:var(--g)}
.status.pending{background:#FEF3C7;color:#92400E}
.status.cancelled{background:#FEE2E2;color:var(--r)}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0EC;font-size:.9rem}
.row:last-child{border:none}
.row .lbl{color:var(--m)}.row .val{font-weight:600;color:var(--b);text-align:right;max-width:60%}
.cleaner-card{display:flex;align-items:center;gap:16px;background:var(--bg);border-radius:12px;padding:16px;margin-top:8px}
.avatar{width:52px;height:52px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;font-weight:700;flex-shrink:0}
.cleaner-name{font-weight:700;color:var(--b);font-size:1rem}
.cleaner-rating{color:var(--m);font-size:.85rem;margin-top:2px}
.btn{display:block;text-align:center;padding:14px;border-radius:100px;font-size:.95rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;width:100%;transition:all .2s}
.btn-primary{background:var(--g);color:#fff}.btn-primary:hover{background:var(--gm)}
.btn-outline{border:1.5px solid var(--g);color:var(--g);background:transparent}.btn-outline:hover{background:var(--gr)}
.btn-danger{border:1.5px solid var(--r);color:var(--r);background:transparent;margin-top:8px}.btn-danger:hover{background:#FEE2E2}
.timeline{position:relative;padding-left:28px;margin:8px 0}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#E8E8E4}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-24px;width:12px;height:12px;border-radius:50%;top:4px}
.tl-dot.done{background:var(--g)}.tl-dot.active{background:var(--g);box-shadow:0 0 0 4px var(--gr)}.tl-dot.todo{background:#E8E8E4}
.tl-text{font-size:.85rem;color:var(--b);font-weight:500}
.tl-sub{font-size:.78rem;color:var(--m);margin-top:2px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--gr);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:3rem;margin-bottom:16px}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CP115M45TT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CP115M45TT');
</script>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Spick</a>
  <a href="boka.html" style="color:var(--g);font-weight:600;text-decoration:none;font-size:.9rem">+ Ny bokning</a>
</nav>

<div class="wrap">
  <h1>Min bokning</h1>
  <p style="font-size:.82rem;margin-bottom:0"><a href="mitt-konto.html" style="color:var(--g);text-decoration:none">← Mina bokningar</a></p>
  <p class="sub">Bokningsstatus och detaljer</p>
  <div id="content"><div style="text-align:center;padding:60px 0"><div class="spin"></div></div></div>
</div>

<script>
const SB = supabase.createClient(
  'https://urjeijcncsyuletprydy.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzIyNDQsImV4cCI6MjA4OTg0ODI0NH0.CH5MSMaWTBfkuzZQOBKgxu-B6Vfy8w9DLh49WPU1Vd0'
);

const params = new URLSearchParams(window.location.search);
const bid = params.get('bid');
if (!bid) {
  document.getElementById('booking-content').innerHTML = '<div style="text-align:center;padding:4rem 2rem"><div style="font-size:3rem;margin-bottom:1rem">😕</div><h2 style="font-family:Playfair Display,serif;margin-bottom:.75rem">Bokningslänk saknas</h2><p style="color:#6B6960;margin-bottom:1.5rem">Öppna länken från din bokningsbekräftelse eller gå till Mitt konto.</p><a href="mitt-konto.html" style="background:#0F6E56;color:#fff;padding:.875rem 2rem;border-radius:100px;text-decoration:none;font-weight:600">Gå till Mitt konto →</a></div>';
}
const email = params.get('email');

const statusMap = {
  paid: ['paid','✅ Bekräftad och betald'],
  pending: ['pending','⏳ Väntar på betalning'],
  failed: ['cancelled','❌ Betalning misslyckades'],
  expired: ['cancelled','⏰ Bokning utgången'],
  cancelled: ['cancelled','❌ Avbokad'],
  refunded: ['cancelled','↩️ Återbetald'],
};

async function load() {
  let query = SB.from('bookings').select('*');
  if (bid) query = query.eq('id', bid);
  else if (email) query = query.eq('customer_email', email).order('created_at', {ascending:false}).limit(1);
  else {
    showEmpty();
    return;
  }

  const { data, error } = await query;
  if (error || !data?.length) { showEmpty(); return; }
  const b = data[0];
  
  // Hämta städare om tilldelad
  let cleaner = null;
  if (b.cleaner_id) {
    const { data: cd } = await SB.from('cleaners').select('full_name,avg_rating,city').eq('id', b.cleaner_id);
    cleaner = cd?.[0] || null;
  }

  renderBooking(b, cleaner);
}

function renderBooking(b, cleaner) {
  const [statusClass, statusText] = statusMap[b.payment_status] || ['pending','Okänd status'];
  const isPaid = b.payment_status === 'paid';
  const fname = b.customer_name?.split(' ')[0] || '';
  const date = new Date(b.date);
  const isPast = date < new Date();
  const isToday = date.toDateString() === new Date().toDateString();
  const isTomorrow = date.toDateString() === new Date(Date.now()+86400000).toDateString();

  // Tidslinje-status
  const step1Done = isPaid;
  const step2Done = isPaid && (isPast || isToday);
  const step3Done = b.review_requested;

  const d2 = b.date || b.scheduled_date || '';
const dateLabel = isToday ? 'Idag' : isTomorrow ? 'Imorgon' : d2;
  const price = b.total_price ? `${Math.round(b.total_price)} kr${b.rut ? ' (efter RUT)' : ''}` : '–';

  document.getElementById('content').innerHTML = `
<div class="card">
  <div class="status ${statusClass}">${statusText}</div>
  <div class="row"><span class="lbl">Tjänst</span><span class="val">${b.service || 'Hemstädning'} · ${b.hours || 3}h</span></div>
  <div class="row"><span class="lbl">Datum</span><span class="val">${dateLabel} ${b.date !== dateLabel ? b.date : ''}</span></div>
  <div class="row"><span class="lbl">Tid</span><span class="val">${b.time || '09:00'}</span></div>
  <div class="row"><span class="lbl">Adress</span><span class="val">${b.address || '–'}</span></div>
  <div class="row"><span class="lbl">Betalt</span><span class="val">${price}</span></div>
  ${cleaner ? `
  <div style="background:#E1F5EE;border-radius:10px;padding:.875rem 1rem;display:flex;align-items:center;gap:.875rem;margin:.75rem 0">
    <div style="width:44px;height:44px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0">
      ${(cleaner.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2)}
    </div>
    <div>
      <div style="font-size:.875rem;font-weight:700;color:#0F6E56">${cleaner.full_name || 'Din städare'}</div>
      <div style="font-size:.78rem;color:#1D9E75">⭐ ${cleaner.avg_rating || '5.0'} · ${cleaner.city || ''}</div>
    </div>
  </div>` : ''}
  ${b.rut ? '<div class="row"><span class="lbl">RUT-avdrag</span><span class="val" style="color:var(--g)">✅ Ansökt automatiskt</span></div>' : ''}
</div>

${cleaner ? `
<div class="card">
  <p style="font-size:.8rem;color:var(--m);margin-bottom:8px;font-weight:600">DIN STÄDARE</p>
  <div class="cleaner-card">
    <div class="avatar">${cleaner.full_name?.charAt(0) || '?'}</div>
    <div>
      <div class="cleaner-name">${cleaner.full_name}</div>
      <div class="cleaner-rating">⭐ ${cleaner.avg_rating || '5.0'} · ${cleaner.city || ''}</div>
      <div style="font-size:.78rem;color:var(--g);margin-top:4px">✅ BankID-verifierad</div>
    </div>
  </div>
</div>` : isPaid ? `<div class="card"><p style="color:var(--m);font-size:.9rem">⏳ Vi tilldelar en städare och bekräftar via e-post.</p></div>` : ''}

<div class="card">
  <p style="font-size:.8rem;color:var(--m);margin-bottom:16px;font-weight:600">STATUS</p>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-dot ${step1Done?'done':'active'}"></div>
      <div class="tl-text">Bokning bekräftad</div>
      <div class="tl-sub">${step1Done ? 'Betalning mottagen ✅' : 'Väntar på betalning'}</div>
    </div>
    <div class="tl-item">
      <div class="tl-dot ${step2Done?'done':step1Done?'active':'todo'}"></div>
      <div class="tl-text">Städning genomförd</div>
      <div class="tl-sub">${step2Done ? 'Klar ✅' : `Planerad ${dateLabel} kl ${b.time||'09:00'}`}</div>
    </div>
    <div class="tl-item">
      <div class="tl-dot ${step3Done?'done':'todo'}"></div>
      <div class="tl-text">Betygsätt städningen</div>
      <div class="tl-sub">${step3Done ? 'Betyg lämnat ✅' : 'Du får ett mail dagen efter'}</div>
    </div>
  </div>
</div>

${isPaid && !isPast ? `
<div style="display:flex;flex-direction:column;gap:8px">
  <a href="betygsatt.html?bid=${b.id}" class="btn btn-outline">Betygsätt i förväg</a>
  <button onclick="cancelBooking('${b.id}')" class="btn btn-danger">Avboka städning</button>
</div>` : ''}
${!isPaid && b.payment_status === 'pending' ? `<a href="boka.html" class="btn btn-primary" style="margin-top:8px">Försök betala igen →</a>` : ''}
${!isPast && isPaid && !['cancelled','avbokad','klar'].includes(b.status) ? `
  <div style="text-align:center;margin-top:1rem">
    <button onclick="cancelBooking('${b.id}')" style="padding:.625rem 1.5rem;background:#FEE2E2;color:#DC2626;border:1.5px solid #FECACA;border-radius:100px;font-size:.85rem;font-weight:600;cursor:pointer">
      Avboka städning
    </button>
  </div>` : ''}
${isPast && isPaid && !b.review_requested ? `<a href="betygsatt.html?bid=${b.id}" class="btn btn-primary" style="margin-top:8px">⭐ Betygsätt städningen →</a>` : ''}
  `;
}

function showEmpty() {
  document.getElementById('content').innerHTML = `
<div class="empty">
  <div class="empty-icon">📋</div>
  <h2 style="font-family:'Playfair Display',serif;color:var(--b);margin-bottom:8px">Ingen bokning hittad</h2>
  <p style="color:var(--m);margin-bottom:24px">Hittar du inte din bokning? Kolla din e-post eller kontakta oss.</p>
  <a href="boka.html" class="btn btn-primary" style="max-width:280px;margin:0 auto">Boka städning →</a>
</div>`;
}

async function cancelBooking(id) {
  if (!confirm('Är du säker på att du vill avboka? Avbokning senare än 24h innan kan debiteras.')) return;
  const { error } = await SB.from('bookings').update({payment_status:'cancelled'}).eq('id',id);
  if (!error) { alert('Bokning avbokad. Vi kontaktar dig angående återbetalning.'); location.reload(); }
  else alert('Fel vid avbokning. Kontakta hello@spick.se');
}

load();
</script>
</body>
</html>

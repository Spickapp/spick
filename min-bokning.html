:root{--g:#0F6E56;--gm:#0A5240;--gr:#E1F5EE;--r:#DC2626;--b:#1C1C1A;--m:#6B6960;--bg:#FAFAF8}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;padding:0 0 80px}
nav{background:#fff;border-bottom:1px solid #EBEBEB;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--g);text-decoration:none}
.wrap{max-width:560px;margin:32px auto;padding:0 16px}
h1{font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--b);margin-bottom:8px}
.sub{color:var(--m);font-size:.95rem;margin-bottom:24px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.live-banner{background:linear-gradient(135deg,#0F6E56,#0A5240);color:#fff;border-radius:14px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.live-dot{width:10px;height:10px;background:#22C55E;border-radius:50%;animation:lpulse 1.2s infinite;flex-shrink:0}
@keyframes lpulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.progress-steps{display:flex;gap:0;margin:16px 0}
.p-step{flex:1;text-align:center;padding:10px 6px;font-size:.72rem;color:var(--m);position:relative}
.p-step.done{color:var(--g);font-weight:600}
.p-step.active{color:var(--b);font-weight:700}
.p-step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--border)}
.p-step.done::before{background:var(--g)}
.p-step.active::before{background:var(--g);opacity:.4}
.p-step .p-icon{font-size:1.3rem;display:block;margin-bottom:4px}
.maps-btn{display:flex;align-items:center;gap:8px;background:#4285F4;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;font-size:.85rem;font-weight:600;margin-top:10px;width:fit-content}
.cancel-btn{background:#FEE2E2;color:#DC2626;border:1.5px solid #FECACA;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;border:none}
.rebook-btn{background:var(--g);color:#fff;padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.status{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;font-size:.85rem;font-weight:600;margin-bottom:16px}
.status.paid{background:var(--gr);color:var(--g)}
.status.pending{background:#FEF3C7;color:#92400E}
.status.cancelled{background:#FEE2E2;color:var(--r)}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F0F0EC;font-size:.9rem}
.row:last-child{border:none}
.row .lbl{color:var(--m)}.row .val{font-weight:600;color:var(--b);text-align:right;max-width:60%}
.cleaner-card{display:flex;align-items:center;gap:16px;background:var(--bg);border-radius:12px;padding:16px;margin-top:8px}
.avatar{width:52px;height:52px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;font-weight:700;flex-shrink:0}
.cleaner-name{font-weight:700;color:var(--b);font-size:1rem}
.cleaner-rating{color:var(--m);font-size:.85rem;margin-top:2px}
.btn{display:block;text-align:center;padding:14px;border-radius:100px;font-size:.95rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;width:100%;transition:all .2s}
.btn-primary{background:var(--g);color:#fff}.btn-primary:hover{background:var(--gm)}
.btn-outline{border:1.5px solid var(--g);color:var(--g);background:transparent}.btn-outline:hover{background:var(--gr)}
.btn-danger{border:1.5px solid var(--r);color:var(--r);background:transparent;margin-top:8px}.btn-danger:hover{background:#FEE2E2}
.timeline{position:relative;padding-left:28px;margin:8px 0}
.timeline::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:#E8E8E4}
.tl-item{position:relative;margin-bottom:16px}
.tl-dot{position:absolute;left:-24px;width:12px;height:12px;border-radius:50%;top:4px}
.tl-dot.done{background:var(--g)}.tl-dot.active{background:var(--g);box-shadow:0 0 0 4px var(--gr)}.tl-dot.todo{background:#E8E8E4}
.tl-text{font-size:.85rem;color:var(--b);font-weight:500}
.tl-sub{font-size:.78rem;color:var(--m);margin-top:2px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--gr);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:3rem;margin-bottom:16px}

<div class="wrap">
  <h1>Min bokning</h1>
  <p style="font-size:.82rem;margin-bottom:0"><a href="mitt-konto.html" style="color:var(--g);text-decoration:none">← Mina bokningar</a></p>
  <p class="sub">Bokningsstatus och detaljer</p>
  <div id="content"><div style="text-align:center;padding:60px 0"><div class="spin"></div></div></div>
</div>

<script>
const SB = supabase.createClient(
  SPICK.SUPA_URL, SPICK.SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const bid = params.get('bid');
if (!bid) {
  document.getElementById('content').innerHTML = '<div style="text-align:center;padding:4rem 2rem"><div style="font-size:3rem;margin-bottom:1rem">😕</div><h2 style="font-family:Playfair Display,serif;margin-bottom:.75rem">Bokningslänk saknas</h2><p style="color:#6B6960;margin-bottom:1.5rem">Öppna länken från din bokningsbekräftelse eller gå till Mitt konto.</p><a href="mitt-konto.html" style="background:#0F6E56;color:#fff;padding:.875rem 2rem;border-radius:100px;text-decoration:none;font-weight:600">Gå till Mitt konto →</a></div>';
}
const email = params.get('email');

const statusMap = {
  paid: ['paid','✅ Bekräftad och betald'],
  awaiting_reassignment: ['pending','🔄 Din städare avböjde — välj ny nedan'],
  pending: ['pending','⏳ Väntar på betalning'],
  failed: ['cancelled','❌ Betalning misslyckades'],
  expired: ['cancelled','⏰ Bokning utgången'],
  cancelled: ['cancelled','❌ Avbokad'],
  refunded: ['cancelled','↩️ Återbetald'],
  awaiting_reassignment_status: ['pending','🔄 Väntar på nytt städarval'],
};

async function load() {
  let query = SB.from('v_customer_bookings').select('*');
  if (bid) query = query.eq('id', bid);
  else if (email) query = query.or(`customer_email.eq.${email}`).order('created_at', {ascending:false}).limit(1);
  else {
    showEmpty();
    return;
  }

  const { data, error } = await query;
  if (error || !data?.length) { showEmpty(); return; }
  // Map DB column names to frontend-friendly aliases
  const raw = data[0];
  const b = {
    ...raw,
    date: raw.booking_date || raw.date,
    time: raw.booking_time || raw.time,
    hours: raw.booking_hours || raw.hours,
    service: raw.service_type || raw.service,
    address: raw.customer_address || raw.address,
    name: raw.customer_name || raw.name,
    email: raw.customer_email || raw.email,
    phone: raw.customer_phone || raw.phone,
    rut: raw.rut_amount > 0,
    stripe_payment_intent: raw.stripe_payment_intent,
  };
  
  // Hämta städare om tilldelad
  let cleaner = null;
  if (b.cleaner_id) {
    const { data: cd } = await SB.from('v_cleaners_for_booking').select('full_name,avg_rating,city').eq('id', b.cleaner_id);
    cleaner = cd?.[0] || null;
  }

  renderBooking(b, cleaner);

  // ── REASSIGNMENT FLOW ──
  if (b.status === 'awaiting_reassignment') {
    loadAvailableCleanersForReassignment(b);
  }
  // Handle ?action=refund from email link
  if (params.get('action') === 'refund' && b.status === 'awaiting_reassignment') {
    requestRefund(b);
  }
  window._booking = b;
  if (b.status === 'awaiting_reassignment') { hideIrrelevantSections(); }
  if (b.payment_status === 'refunded' || b.status === 'cancelled') { hideForRefunded(b); }
  // Visa åtgärdsknappar
  const actBtns = document.getElementById('action-btns');
  const cancelBtn = document.getElementById('cancel-action-btn');
  if (actBtns) {
    const isPaid = b.payment_status === 'paid';
    const isPast = new Date(b.scheduled_date||b.date) < new Date();
    actBtns.style.display = isPaid ? 'block' : 'none';
    if (cancelBtn) cancelBtn.style.display = isPaid && !isPast ? 'inline-block' : 'none';
  }
  
  // Real-time polling var 30s om städning pågår idag
  const dateTime = new Date((b.scheduled_date||b.date)+'T'+(b.time||'09:00')+':00');
  const isToday = new Date().toDateString() === dateTime.toDateString();
  if (isToday && b.payment_status === 'paid' && b.status !== 'klar') {
    setInterval(load, 30000);
  }
}

function getMaterialText(serviceType) {
  var svc = (serviceType || '').toLowerCase();
  if (svc.includes('flytt') || svc.includes('fönster') || svc.includes('fonster')) {
    return 'Städaren tar med all utrustning';
  }
  return 'Ha dammsugare, mopp och rengöringsmedel redo';
}

function renderBooking(b, cleaner) {
  let [statusClass, statusText] = statusMap[b.payment_status] || ['pending','Okänd status'];
  if (b.status === 'awaiting_reassignment') { statusClass = 'pending'; statusText = '🔄 Din städare avböjde — välj ny nedan'; }
  const isPaid = b.payment_status === 'paid';
  const fname = (b.customer_name || b.name || '').split(' ')[0];
  const date = new Date(b.date);
  const isPast = date < new Date();
  const isToday = date.toDateString() === new Date().toDateString();
  const isTomorrow = date.toDateString() === new Date(Date.now()+86400000).toDateString();

  // Tidslinje-status
  const step1Done = isPaid;
  const step2Done = isPaid && (isPast || isToday);
  const step3Done = b.review_requested;

  const d2 = b.date || b.scheduled_date || '';
const dateLabel = isToday ? 'Idag' : isTomorrow ? 'Imorgon' : d2;
  const price = b.total_price ? `${Math.round(b.total_price)} kr${b.rut ? ' (med RUT)' : ''}` : '–';

  document.getElementById('content').innerHTML = `
<div class="card">
  <div class="status ${statusClass}">${statusText}</div>
  <div class="row"><span class="lbl">Tjänst</span><span class="val">${escHtml(b.service || 'Hemstädning')} · ${parseInt(b.hours) || 3}h</span></div>
  <div class="row"><span class="lbl">Datum</span><span class="val">${escHtml(dateLabel)} ${b.date !== dateLabel ? escHtml(b.date) : ''}</span></div>
  <div class="row"><span class="lbl">Tid</span><span class="val">${escHtml(b.time || '09:00')}</span></div>
  <div class="row"><span class="lbl">Adress</span><span class="val">${escHtml(b.address || '–')}</span></div>
  <div class="row"><span class="lbl">Pris</span><span class="val">${b.rut && b.rut_amount ? Math.round(b.total_price + b.rut_amount) + ' kr' : Math.round(b.total_price) + ' kr'}</span></div>
  ${b.rut && b.rut_amount ? '<div class="row"><span class="lbl">RUT-avdrag (50%)</span><span class="val" style="color:var(--g)">−' + Math.round(b.rut_amount) + ' kr</span></div>' : ''}
  <div class="row"><span class="lbl">Du betalar</span><span class="val" style="font-weight:700">${Math.round(b.total_price)} kr</span></div>
  ${cleaner ? `
  <div style="background:#E1F5EE;border-radius:10px;padding:.875rem 1rem;display:flex;align-items:center;gap:.875rem;margin:.75rem 0">
    <div style="width:44px;height:44px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0">
      ${escHtml((cleaner.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2))}
    </div>
    <div>
      <div style="font-size:.875rem;font-weight:700;color:#0F6E56">${escHtml(cleaner.full_name || 'Din städare')}</div>
      <div style="font-size:.78rem;color:#1D9E75">⭐ ${parseFloat(cleaner.avg_rating || '5.0').toFixed(1)} · ${escHtml(cleaner.city || '')}</div>
    </div>
  </div>` : ''}
  ${b.rut ? '<div class="row"><span class="lbl">RUT-avdrag</span><span class="val" style="color:var(--g)">✅ Ansökt automatiskt</span></div>' : ''}
  ${b.key_info ? `<div class="row"><span class="lbl">🔑 Nyckelinfo</span><span class="val">${escHtml(b.key_info)}</span></div>` : ''}
  <div class="row"><span class="lbl">🧹 Material</span><span class="val">${getMaterialText(b.service)}</span></div>
  ${b.customer_notes ? `<div class="row"><span class="lbl">📝 Dina noteringar</span><span class="val">${escHtml(b.customer_notes)}</span></div>` : ''}
</div>

<!-- Live-status om städning pågår idag -->
${isToday && b.status === 'pågår' ? `
<div class="live-banner">
  <div class="live-dot"></div>
  <div>
    <div style="font-weight:700;font-size:.95rem">Städning pågår just nu!</div>
    <div style="font-size:.78rem;opacity:.85">${cleaner ? escHtml(cleaner.full_name) : 'Din städare'} är på plats</div>
  </div>
</div>` : ''}

<!-- Progress-steps -->
<div class="progress-steps">
  <div class="p-step ${isPaid?'done':'active'}"><span class="p-icon">✅</span>Bekräftad</div>
  <div class="p-step ${b.status==='pågår'?'active':b.status==='klar'||isPast?'done':''}"><span class="p-icon">${b.status==='pågår'?'🧹':b.status==='klar'?'✅':'⏳'}</span>Städas</div>
  <div class="p-step ${b.status==='klar'?'done':''}"><span class="p-icon">${b.status==='klar'?'⭐':'💫'}</span>Klar</div>
</div>

<!-- Google Maps-länk -->
${b.address && isPaid ? `<a href="https://maps.google.com/?q=${encodeURIComponent(b.address||'')}" target="_blank" class="maps-btn">📍 ${b.address}</a>` : ''}

<!-- Noteringar KOMMENTAT -->
<div style="display:none">
</div>

${cleaner ? `
<div class="card">
  <p style="font-size:.8rem;color:var(--m);margin-bottom:8px;font-weight:600">DIN STÄDARE</p>
  <div class="cleaner-card">
    <div class="avatar">${cleaner.full_name?.charAt(0) || '?'}</div>
    <div>
      <div class="cleaner-name">${cleaner.full_name}</div>
      <div class="cleaner-rating">⭐ ${cleaner.avg_rating || '5.0'} · ${cleaner.city || ''}</div>
      <div style="font-size:.78rem;color:var(--g);margin-top:4px">✅ ID-verifierad</div>
    </div>
  </div>
</div>` : isPaid ? `<div class="card"><p style="color:var(--m);font-size:.9rem">⏳ Vi tilldelar en städare och bekräftar via e-post.</p></div>` : ''}

<div class="card">
  <p style="font-size:.8rem;color:var(--m);margin-bottom:16px;font-weight:600">STATUS</p>
  <div class="timeline">
    <div class="tl-item">
      <div class="tl-dot ${step1Done?'done':'active'}"></div>
      <div class="tl-text">Bokning bekräftad</div>
      <div class="tl-sub">${step1Done ? 'Betalning mottagen ✅' : 'Väntar på betalning'}</div>
    </div>
    <div class="tl-item">
      <div class="tl-dot ${step2Done?'done':step1Done?'active':'todo'}"></div>
      <div class="tl-text">Städning genomförd</div>
      <div class="tl-sub">${step2Done ? 'Klar ✅' : `Planerad ${dateLabel} kl ${b.time||'09:00'}`}</div>
    </div>
    <div class="tl-item">

${isPast && isPaid && !b.review_requested ? `<a href="betygsatt.html?bid=${b.id}" class="btn btn-primary" style="margin-top:8px">⭐ Betygsätt städningen →</a>` : ''}

var _chatPoll = null;

async function loadChatMessages() {
  var bid = new URLSearchParams(location.search).get('bid');
  if (!bid) return;
  try {
    var res = await fetch(SPICK.SUPA_URL + '/rest/v1/messages?booking_id=eq.' + bid + '&order=created_at.asc&select=*', {
      headers: { apikey: SPICK.SUPA_KEY, Authorization: 'Bearer ' + SPICK.SUPA_KEY }
    });
    var msgs = res.ok ? await res.json() : [];
    var el = document.getElementById('chat-messages');
    if (!el) return;
    if (!msgs.length) {
      el.innerHTML = '<div style="text-align:center;color:#ccc;font-size:.82rem;padding:16px">Inga meddelanden ännu. Skriv till din städare!</div>';
      return;
    }
    el.innerHTML = msgs.map(function(m) {
      var role = m.is_automated || m.from_role === 'spick' ? 'system' : m.from_role === 'cleaner' ? 'cleaner' : 'customer';
      var time = new Date(m.created_at).toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
      var sender = role === 'cleaner' ? (m.from_alias || 'Städaren') : role === 'system' ? 'Spick' : 'Du';
      return '<div class="chat-msg ' + role + '">' +
        (role !== 'customer' ? '<div style="font-size:.7rem;font-weight:600;color:#0F6E56;margin-bottom:2px">' + sender + '</div>' : '') +
        m.message.replace(/\n/g, '<br>') +
        '<div class="chat-msg-meta">' + time + '</div>' +
      '</div>';
    }).join('');
    el.scrollTop = el.scrollHeight;
  } catch(e) { console.warn('Chat load:', e); }
}

async function customerSendMsg() {
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;
  var bid = new URLSearchParams(location.search).get('bid');
  if (!bid) return;
  input.value = '';
  input.style.height = 'auto';
  try {
    await fetch(SPICK.SUPA_URL + '/rest/v1/messages', {
      method: 'POST',
      headers: { apikey: SPICK.SUPA_KEY, Authorization: 'Bearer ' + SPICK.SUPA_KEY, 'Content-Type': 'application/json', Prefer: 'return=minimal' },
      body: JSON.stringify({
        booking_id: bid,
        from_email: null,
        to_email: null,
        from_role: 'customer',
        from_alias: 'Kunden',
        message: text,
        message_type: 'text'
      })
    });
    loadChatMessages();
  } catch(e) { console.warn('Chat send:', e); }
}

async function loadAvailableCleanersForReassignment(booking) {
  var contentEl = document.getElementById('content');
  
  // Add reassignment banner + container at the top of content
  var banner = document.createElement('div');
  banner.id = 'reassign-section';
  banner.innerHTML = '<div style="background:linear-gradient(135deg,#FFFBEB,#FEF3C7);border:2px solid #F59E0B;border-radius:16px;padding:24px;margin-bottom:16px">' +
    '<div style="font-size:1.5rem;margin-bottom:8px">⚠️</div>' +
    '<h2 style="font-family:Playfair Display,serif;font-size:1.2rem;color:#92400E;margin-bottom:8px">Din städare kunde inte ta uppdraget</h2>' +
    '<p style="color:#92400E;font-size:.88rem;margin-bottom:16px">Välj en ny städare nedan, eller begär återbetalning.</p>' +
    '<div id="reassign-cleaners" style="margin-bottom:16px"><div style="text-align:center;padding:20px"><div class="spin"></div><p style="font-size:.82rem;color:#92400E;margin-top:8px">Letar efter tillgängliga städare...</p></div></div>' +
    '<div style="text-align:center;margin-top:12px"><button onclick="requestRefund(window._booking)" style="padding:10px 24px;background:transparent;color:#DC2626;border:1.5px solid #FECACA;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Jag vill ha återbetalning istället</button></div>' +
    '</div>';
  contentEl.insertBefore(banner, contentEl.firstChild);

  // Fetch available cleaners
  try {
    var res = await fetch(SPICK.SUPA_URL + '/rest/v1/v_cleaners_for_booking?select=id,full_name,avg_rating,review_count,city,hourly_rate,bio,avatar_url,services,home_lat,home_lng&order=avg_rating.desc', {
      headers: { apikey: SPICK.SUPA_KEY, Authorization: 'Bearer ' + SPICK.SUPA_KEY }
    });
    var cleaners = res.ok ? await res.json() : [];
    // Filter out cleaners without the right service
    var svc = booking.service || 'Hemstädning';
    // Filter out cleaners the customer already had (rejected)
    var rejectedId = (booking.admin_notes || '').includes('rejected_by:') ? booking.admin_notes.split('rejected_by:')[1].split(/[^a-f0-9-]/)[0] : null;
    cleaners = cleaners.filter(function(cl) {
      // Exclude the cleaner who just rejected
      if (rejectedId && cl.id === rejectedId) return false;
      return true;
    });
    cleaners = cleaners.filter(function(cl) {
      return !cl.services || cl.services.some(function(s) {
        return s.toLowerCase().includes(svc.toLowerCase().slice(0,4));
      });
    });
    renderReassignCleaners(cleaners, booking);
  } catch(e) {
    console.error('Load cleaners:', e);
    document.getElementById('reassign-cleaners').innerHTML = '<p style="color:#DC2626;font-size:.88rem">Kunde inte ladda städare. Kontakta hello@spick.se</p>';
  }
}

function renderReassignCleaners(cleaners, booking) {
  var el = document.getElementById('reassign-cleaners');
  if (!cleaners.length) {
    el.innerHTML = '<p style="color:#92400E;font-size:.88rem">Inga andra städare tillgängliga just nu. Du kan begära återbetalning eller kontakta oss.</p>';
    return;
  }
  el.innerHTML = cleaners.map(function(cl) {
    var initials = (cl.full_name || '?').split(' ').map(function(w){return w[0]}).join('').slice(0,2);
    var rating = cl.avg_rating ? parseFloat(cl.avg_rating).toFixed(1) : 'Ny';
    var rateDisplay = cl.hourly_rate ? Math.round(cl.hourly_rate * 0.5) + ' kr/h efter RUT' : '';
    return '<div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:1.5px solid #E8E8E4;display:flex;align-items:center;gap:14px">' +
      '<div style="width:48px;height:48px;border-radius:50%;background:#0F6E56;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1rem;flex-shrink:0">' +
        (cl.avatar_url ? '<img src="' + cl.avatar_url + '" style="width:48px;height:48px;border-radius:50%;object-fit:cover">' : initials) +
      '</div>' +
      '<div style="flex:1;min-width:0">' +
        '<div style="font-weight:700;color:#1C1C1A">' + escHtml(cl.full_name) + '</div>' +
        '<div style="font-size:.78rem;color:#6B6960">⭐ ' + rating + (cl.review_count ? ' (' + cl.review_count + ')' : '') + ' · ' + escHtml(cl.city || '') + '</div>' +
        (rateDisplay ? '<div style="font-size:.78rem;color:#0F6E56;font-weight:600;margin-top:2px">' + rateDisplay + '</div>' : '') +
      '</div>' +
      '<button onclick="reassignToLeaner(\'' + cl.id + '\',\'' + escHtml(cl.full_name).replace(/'/g, '') + '\')" style="padding:10px 18px;background:#0F6E56;color:#fff;border:none;border-radius:10px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap">Välj</button>' +
    '</div>';
  }).join('');
}

async function reassignToLeaner(cleanerId, cleanerName) {
  if (!confirm('Vill du boka ' + cleanerName + ' som din nya städare?')) return;
  var booking = window._booking;
  if (!booking) return;
  try {
    var res = await fetch(SPICK.SUPA_URL + '/functions/v1/booking-reassign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SPICK.SUPA_KEY, Authorization: 'Bearer ' + SPICK.SUPA_KEY },
      body: JSON.stringify({
        booking_id: booking.id,
        new_cleaner_id: cleanerId,
        customer_email: booking.email || booking.customer_email
      })
    });
    var result = await res.json();
    if (res.ok && result.success) {
      var section = document.getElementById('reassign-section');
      if (section) section.innerHTML = '<div style="background:#F0FDF4;border:2px solid #22C55E;border-radius:16px;padding:24px;text-align:center">' +
        '<div style="font-size:2rem;margin-bottom:8px">✅</div>' +
        '<h2 style="font-family:Playfair Display,serif;font-size:1.2rem;color:#065F46;margin-bottom:8px">' + (result.message || 'Ny städare tilldelad!') + '</h2>' +
        '<p style="color:#065F46;font-size:.88rem">Sidan uppdateras om 3 sekunder...</p></div>';
      setTimeout(function() { location.reload(); }, 3000);
    } else {
      alert(result.error || 'Något gick fel. Försök igen.');
    }
  } catch(e) {
    console.error('Reassign error:', e);
    alert('Kunde inte byta städare. Kontakta hello@spick.se');
  }
}

async function requestRefund(booking) {
  if (!booking) return;
  if (!confirm('Vill du ha återbetalning? Bokningen avbokas.')) return;
  try {
    var res = await fetch(SPICK.SUPA_URL + '/functions/v1/booking-reassign', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SPICK.SUPA_KEY, Authorization: 'Bearer ' + SPICK.SUPA_KEY },
      body: JSON.stringify({
        booking_id: booking.id,
        customer_email: booking.email || booking.customer_email,
        action: 'refund'
      })
    });
    var result = await res.json();
    if (res.ok && result.success) {
      alert(result.message || 'Återbetalning påbörjad.');
      location.reload();
    } else {
      alert(result.error || 'Något gick fel.');
    }
  } catch(e) {
    alert('Fel vid återbetalning. Kontakta hello@spick.se');
  }
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  <a href="boka.html" class="btn btn-primary" style="max-width:280px;margin:0 auto">Boka städning →</a>

async function cancelBooking(id) {
  const b = window._booking;
  const scheduledAt = new Date((b.date || '') + 'T' + (b.time || '09:00') + ':00');
  const hoursUntil = (scheduledAt.getTime() - Date.now()) / (1000 * 60 * 60);
  const total = Math.round(b.total_price || 0);
  const refundPct = hoursUntil >= 24 ? 100 : 50;
  const refundAmt = Math.round(total * refundPct / 100);
  const fee = total - refundAmt;
  const msg = refundPct === 100
    ? 'Vill du avboka? Du får full återbetalning (' + refundAmt + ' kr).'
    : 'Vill du avboka? Eftersom det är mindre än 24h kvar får du 50% tillbaka (' + refundAmt + ' kr). Avbokningsavgift: ' + fee + ' kr.';
  if (!confirm(msg)) return;
  const customerEmail = b?.customer_email || b?.email || email || '';
  try {
    const res = await fetch(`${SPICK.SUPA_URL}/functions/v1/booking-cancel-v2`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SPICK.SUPA_KEY, 'Authorization': 'Bearer ' + SPICK.SUPA_KEY },
      body: JSON.stringify({ booking_id: id, customer_email: customerEmail })
    });
    const result = await res.json();
    if (res.ok && result.success) {
      alert(result.message || 'Bokning avbokad.');
      location.reload();
    } else {
      alert(result.error || 'Fel vid avbokning. Kontakta hello@spick.se');
    }
  } catch (e) {
    console.error('Cancel error:', e);
    alert('Fel vid avbokning. Kontakta hello@spick.se');
  }
}

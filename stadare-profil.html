<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Städarprofil | Spick</title>
<meta name="description" content="Se profil, betyg och boka denna städare direkt via Spick.">
<meta property="og:type" content="website">
<meta property="og:title" content="Städarprofil | Spick">
<meta property="og:image" content="https://spick.se/assets/og-image.png">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://spick.se/stadare-profil.html">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script type="application/ld+json" id="schema-json"></script>
<script src="js/supabase.min.js"></script>
<script src="js/config.js"></script>
<style>
:root{--g:#0F6E56;--gp:#E1F5EE;--b:#1C1C1A;--m:#6B6960;--bg:#FAFAF8;--w:#fff;--border:#E8E8E4;--r:#DC2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--b);min-height:100vh}
.top-bar{background:var(--g);color:#fff;text-align:center;padding:10px 16px;font-size:.82rem}
.top-bar a{color:#9FE1CB;text-decoration:none}
.container{max-width:560px;margin:0 auto;padding:24px 16px 80px}
.profile-card{background:var(--w);border-radius:20px;border:1px solid var(--border);padding:32px 24px;text-align:center;margin-bottom:16px}
.avatar{width:80px;height:80px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto 12px}
.name{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:4px}
.city{font-size:.9rem;color:var(--m);margin-bottom:12px}
.stars{font-size:1.1rem;letter-spacing:2px}
.rating-text{font-size:.85rem;color:var(--m);margin-top:4px}
.badge-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge-green{background:var(--gp);color:var(--g)}
.badge-blue{background:#EFF6FF;color:#1D4ED8}
.badge-purple{background:#F3E8FF;color:#7C3AED}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.stat{background:var(--w);border-radius:14px;border:1px solid var(--border);padding:16px 10px;text-align:center}
.stat-val{font-size:1.3rem;font-weight:700;color:var(--g)}
.stat-lbl{font-size:.72rem;color:var(--m);margin-top:2px}
.card{background:var(--w);border-radius:16px;border:1px solid var(--border);padding:20px;margin-bottom:12px}
.card-title{font-weight:700;font-size:.95rem;margin-bottom:12px}
.bio{font-size:.9rem;color:var(--m);line-height:1.7}
.service-tag{display:inline-block;padding:6px 14px;border-radius:20px;background:#F3F4F6;font-size:.82rem;font-weight:500;margin:3px}
.review{padding:14px 0;border-bottom:1px solid var(--border)}
.review:last-child{border-bottom:none}
.review-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.review-name{font-weight:600;font-size:.88rem}
.review-date{font-size:.75rem;color:var(--m)}
.review-stars{font-size:.85rem;letter-spacing:1px;margin-bottom:4px}
.review-text{font-size:.85rem;color:var(--m);line-height:1.6}
.cta-bar{position:fixed;bottom:0;left:0;right:0;background:var(--w);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;justify-content:center;z-index:50}
.btn-book{flex:1;max-width:320px;background:var(--g);color:#fff;border:none;padding:14px;border-radius:14px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:block}
.btn-book:hover{background:#0A5240}
.btn-share{padding:14px 18px;background:var(--gp);color:var(--g);border:none;border-radius:14px;font-family:inherit;font-size:.9rem;font-weight:600;cursor:pointer}
.qr-section{text-align:center;padding:20px}
.qr-section canvas{border-radius:12px}
.loading{text-align:center;padding:60px 20px;color:var(--m);font-size:.95rem}
.error{text-align:center;padding:60px 20px;color:var(--r)}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/">← Tillbaka till Spick</a>
</div>

<div class="container">
  <div id="loading" class="loading">Laddar profil...</div>
  <div id="error" class="error" style="display:none"></div>
  <div id="content" style="display:none">

    <div class="profile-card">
      <div class="avatar" id="p-avatar">?</div>
      <div class="name" id="p-name">–</div>
      <div class="city" id="p-city">–</div>
      <div class="stars" id="p-stars"></div>
      <div class="rating-text" id="p-rating-text"></div>
      <div class="badge-row" id="p-badges"></div>
    </div>

    <div class="stats" id="stats-grid"></div>

    <div class="card" id="bio-card" style="display:none">
      <div class="card-title">Om mig</div>
      <div class="bio" id="p-bio"></div>
    </div>

    <div class="card">
      <div class="card-title">Tjänster</div>
      <div id="p-services"></div>
    </div>

    <div class="card">
      <div class="card-title">Recensioner</div>
      <div id="p-reviews"><span style="color:var(--m);font-size:.85rem">Inga recensioner än.</span></div>
    </div>

    <div class="card qr-section" id="qr-card">
      <div class="card-title">Boka via QR-kod</div>
      <canvas id="qr-canvas"></canvas>
      <div style="font-size:.78rem;color:var(--m);margin-top:8px">Skanna för att boka denna städare direkt</div>
    </div>

  </div>
</div>

<div class="cta-bar" id="cta-bar" style="display:none">
  <a class="btn-book" id="book-btn" href="boka.html">Boka denna städare →</a>
  <button class="btn-share" onclick="shareProfile()">🔗</button>
</div>

<script>
const SUPA = SPICK.SUPA_URL;
const KEY = SPICK.SUPA_KEY;
const H = {apikey: KEY, Authorization: 'Bearer ' + KEY};

let _cleaner = null;
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadProfile() {
  const params = new URLSearchParams(location.search);
  const slug = params.get('s') || params.get('slug');
  const id = params.get('id') || params.get('focus');

  if (!slug && !id) {
    showError('Ingen städare angiven. Gå till <a href="boka.html" style="color:var(--g)">boka.html</a> för att hitta en.');
    return;
  }

  var cleanerUrl = SUPA + '/rest/v1/cleaners?select=id,slug,full_name,city,bio,hourly_rate,avg_rating,review_count,services,avatar_url,identity_verified,pet_pref,elevator_pref,is_approved&is_approved=eq.true&';
  if (slug) cleanerUrl += 'slug=eq.' + encodeURIComponent(slug);
  else cleanerUrl += 'id=eq.' + encodeURIComponent(id);

  var cleanerRes = await fetch(cleanerUrl + '&apikey=' + KEY, {headers: H});
  var cleanerArr = cleanerRes.ok ? await cleanerRes.json() : [];
  var c = Array.isArray(cleanerArr) && cleanerArr.length > 0 ? cleanerArr[0] : null;

  if (!c) {
    showError('Städaren hittades inte eller är inte aktiv.');
    return;
  }
  _cleaner = c;

  // Populate profile
  const initial = (c.full_name || '?')[0].toUpperCase();
  document.getElementById('p-avatar').textContent = initial;
  document.getElementById('p-name').textContent = c.full_name || 'Städare';
  const cityDisplay = (c.city || 'Sverige').charAt(0).toUpperCase() + (c.city || 'Sverige').slice(1).toLowerCase();
  const verified = c.identity_verified ? ' · 🔐 ID-verifierad' : '';
  document.getElementById('p-city').textContent = cityDisplay + verified;
  document.title = (c.full_name || 'Städare') + ' | Spick';

  const rating = parseFloat(c.avg_rating || 0);
  if (rating > 0) {
    const stars = '⭐'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
    document.getElementById('p-stars').textContent = stars;
    document.getElementById('p-rating-text').textContent = rating.toFixed(1) + '/5 (' + (c.review_count || 0) + ' betyg)';
  } else {
    document.getElementById('p-stars').textContent = '';
    document.getElementById('p-rating-text').textContent = '🌟 Ny på Spick';
  }

  // Badges
  const badges = [];
  if (c.identity_verified) badges.push('<span class="badge badge-blue">🔐 ID-verifierad</span>');
  const tier = c.commission_tier || c.tier || 'new';
  const tierLabels = { new: null, established: '⭐ Silver', professional: '🏅 Gold', elite: '👑 Platinum' };
  if (tierLabels[tier]) badges.push('<span class="badge badge-purple">' + tierLabels[tier] + '</span>');
  if ((c.total_jobs || 0) >= 10) badges.push('<span class="badge badge-green">✅ Erfaren</span>');
  document.getElementById('p-badges').innerHTML = badges.join('');

  // Stats — visa bara det som finns i DB
  var statsHTML = '<div class="stat"><div class="stat-val">' + (c.hourly_rate || 350) + '</div><div class="stat-lbl">kr/h</div></div>';
  if (c.review_count > 0) {
    statsHTML += '<div class="stat"><div class="stat-val">' + c.review_count + '</div><div class="stat-lbl">omdömen</div></div>';
  }
  if (c.avg_rating) {
    statsHTML += '<div class="stat"><div class="stat-val">' + parseFloat(c.avg_rating).toFixed(1) + '</div><div class="stat-lbl">snittbetyg</div></div>';
  }
  document.getElementById('stats-grid').innerHTML = statsHTML;

  // Bio
  if (c.bio) {
    document.getElementById('p-bio').textContent = c.bio;
    document.getElementById('bio-card').style.display = 'block';
  }

  // Services
  const svcs = Array.isArray(c.services) ? c.services : (c.services || 'Hemstädning').split(',');
  document.getElementById('p-services').innerHTML = svcs.map(s => '<span class="service-tag">' + escHtml(s.trim()) + '</span>').join('');

  // Reviews
  var reviewsUrl = SUPA + '/rest/v1/reviews?select=rating,cleaner_rating,comment,created_at,customer_name&cleaner_id=eq.' + c.id + '&order=created_at.desc&limit=10';
  var reviewsRes = await fetch(reviewsUrl + '&apikey=' + KEY, {headers: H});
  var reviews = reviewsRes.ok ? await reviewsRes.json() : [];
  if (!Array.isArray(reviews)) reviews = [];

  if (reviews && reviews.length) {
    document.getElementById('p-reviews').innerHTML = reviews.map(r => {
      const date = new Date(r.created_at).toLocaleDateString('sv-SE', { year: 'numeric', month: 'short', day: 'numeric' });
      var reviewRating = r.rating || r.cleaner_rating;
      return '<div class="review">' +
        '<div class="review-head"><span class="review-name">' + escHtml(r.customer_name || 'Kund') + '</span><span class="review-date">' + date + '</span></div>' +
        (reviewRating ? '<div class="review-stars">' + '⭐'.repeat(Math.round(reviewRating)) + '</div>' : '') +
        (r.comment ? '<div class="review-text">' + escHtml(r.comment) + '</div>' : '') +
        '</div>';
    }).join('');
  }

  // QR code
  try {
    const bookUrl = 'https://spick.se/boka.html?id=' + c.id + '&name=' + encodeURIComponent(c.full_name || '') + '&rate=' + (c.hourly_rate || 350);
    new QRCode(document.getElementById('qr-canvas'), {
      text: bookUrl, width: 160, height: 160, colorDark: '#0F6E56', colorLight: '#ffffff'
    });
  } catch(e) { document.getElementById('qr-card').style.display = 'none'; }

  // Booking CTA
  document.getElementById('book-btn').href = 'boka.html?id=' + c.id + '&name=' + encodeURIComponent(c.full_name || '') + '&rate=' + (c.hourly_rate || 350);
  document.getElementById('cta-bar').style.display = 'flex';

  // Schema.org
  document.getElementById('schema-json').textContent = JSON.stringify({
    "@context": "https://schema.org",
    "@type": "Person",
    "name": c.full_name,
    "jobTitle": "Städare",
    "address": {"@type": "PostalAddress", "addressLocality": c.city || "Stockholm"},
    "worksFor": {"@type": "Organization", "name": "Spick", "url": "https://spick.se"},
    "url": window.location.href
  });

  // Done
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').innerHTML = msg;
  document.getElementById('error').style.display = 'block';
}

function shareProfile() {
  const url = _cleaner?.slug ? location.origin + '/stadare-profil.html?s=' + _cleaner.slug : location.href;
  const title = (_cleaner?.full_name || 'Städare') + ' — Spick';
  if (navigator.share) {
    navigator.share({ title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.btn-share');
      btn.textContent = '✅';
      setTimeout(() => btn.textContent = '🔗', 2000);
    }).catch(() => prompt('Kopiera länken:', url));
  }
}

loadProfile();
</script>
</body>
</html>

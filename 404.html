<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sidan hittades inte – Spick</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#0F6E56;--gm:#1D9E75;--gp:#E1F5EE;--gr:#F7F7F5;--grd:#E8E8E4;--t:#1C1C1A;--m:#6B6960}
body{font-family:'DM Sans',sans-serif;background:var(--gr);color:var(--t);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}
.logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;color:var(--g);text-decoration:none;margin-bottom:3rem;display:block}
.icon{font-size:5rem;margin-bottom:1.5rem}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--t);margin-bottom:.75rem}
p{color:var(--m);font-size:1rem;line-height:1.7;max-width:420px;margin-bottom:2.5rem}
.btns{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center}
.btn-main{padding:.875rem 2rem;background:var(--g);color:#fff;border-radius:100px;text-decoration:none;font-weight:600;font-size:.95rem;transition:background .2s}
.btn-main:hover{background:var(--gm)}
.btn-sec{padding:.875rem 1.75rem;border-radius:100px;text-decoration:none;font-weight:500;font-size:.9rem;color:var(--m);border:1.5px solid var(--grd);transition:all .2s}
.btn-sec:hover{border-color:var(--g);color:var(--g)}
</style>
</head>
<body>
<a href="index.html" class="logo">Spick</a>
<div class="icon">🧹</div>
<h1>Sidan städades bort</h1>
<p>Sidan du letar efter verkar ha försvunnit. Kolla att du stavat rätt, eller gå tillbaka till startsidan.</p>
<div class="btns">
  <a href="index.html" class="btn-main">← Startsidan</a>
  <a href="stadare.html" class="btn-sec">Hitta städare</a>
  <a href="boka.html" class="btn-sec">Boka städning</a>
</div>
</body>
</html>

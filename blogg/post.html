footer a{color:rgba(255,255,255,.6);text-decoration:none}
@media(max-width:600px){.hero h1{font-size:1.5rem}article{padding:2rem 1rem}}

<script>
(function(){
  // Sprint 6: dynamisk renderning av blog_posts via slug-param.
  // Routing: 404.html omdirigerar /blogg/{slug} → /blogg/post.html?slug={slug}.

  var SUPA = (window.SPICK && window.SPICK.SUPA_URL) || 'https://urjeijcncsyuletprydy.supabase.co';
  var KEY  = (window.SPICK && window.SPICK.SUPA_KEY) || '';
  var SITE = (window.SPICK && window.SPICK.SITE_URL) || 'https://spick.se';

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

  function getParam(name){
    var m = location.search.match(new RegExp('[?&]'+name+'=([^&]+)'));
    return m ? decodeURIComponent(m[1].replace(/\+/g,' ')) : '';
  }

  function fmtDate(iso){
    if(!iso) return '';
    try{
      var d = new Date(iso);
      return d.toLocaleDateString('sv-SE', {year:'numeric', month:'long', day:'numeric'});
    }catch(e){ return ''; }
  }

  function renderError(title, msg){
    document.getElementById('heroTitle').textContent = title;
    document.getElementById('articleContent').innerHTML =
      '<div class="error-state"><h2>'+esc(title)+'</h2><p>'+esc(msg)+'</p>'+
      '<p style="margin-top:1.5rem"><a href="/blogg/" class="btn">Till bloggen →</a></p></div>';
  }

  var slug = getParam('slug');
  if(!slug){
    renderError('Artikel saknas', 'Ingen artikel-slug angiven i URL:en.');
    return;
  }

  var url = SUPA + '/rest/v1/blog_posts?select=slug,title,html_content,meta_description,target_keyword,city,published_at,updated_at'
          + '&slug=eq.' + encodeURIComponent(slug)
          + '&published_at=not.is.null'
          + '&limit=1';

  fetch(url, { headers: { apikey: KEY, Authorization: 'Bearer '+KEY } })
    .then(function(r){ return r.ok ? r.json() : []; })
    .then(function(rows){
      if(!rows || rows.length === 0){
        renderError('Artikeln finns inte', 'Vi kunde inte hitta artikeln "'+slug+'". Den kan ha flyttats eller tagits bort.');
        return;
      }
      var p = rows[0];
      var canonical = SITE + '/blogg/' + encodeURIComponent(p.slug);
      var dateStr = fmtDate(p.published_at);

      // <head>
      document.title = (p.title || 'Artikel') + ' | Spick';
      document.getElementById('pageTitle').textContent = document.title;
      document.getElementById('pageDesc').setAttribute('content', p.meta_description || '');
      document.getElementById('pageCanonical').setAttribute('href', canonical);
      document.getElementById('ogTitle').setAttribute('content', p.title || '');
      document.getElementById('ogDesc').setAttribute('content', p.meta_description || '');
      document.getElementById('ogUrl').setAttribute('content', canonical);

      // Schema.org Article JSON-LD
      try {
        var ld = {
          "@context": "https://schema.org",
          "@type": "Article",
          "headline": p.title || '',
          "description": p.meta_description || '',
          "author": { "@type": "Organization", "name": "Spick" },
          "publisher": {
            "@type": "Organization",
            "name": "Spick",
            "logo": { "@type": "ImageObject", "url": SITE + "/favicon.ico" }
          },
          "datePublished": p.published_at || '',
          "dateModified": p.updated_at || p.published_at || '',
          "mainEntityOfPage": { "@type": "WebPage", "@id": canonical }
        };
        document.getElementById('ldJson').textContent = JSON.stringify(ld);
      } catch(e){ /* non-fatal */ }

      // Breadcrumb
      document.getElementById('bcCurrent').textContent = p.title || 'Artikel';

      // Hero
      document.getElementById('heroTitle').textContent = p.title || '';
      document.getElementById('heroCat').textContent = p.city || p.target_keyword || 'Guide';
      document.getElementById('heroMeta').textContent = '📅 ' + dateStr;

      // Body — html_content kommer från claude-haiku-4-5 via blog-generate-EF.
      // Modellen instrueras att INTE producera <script>/<style>/iframes och hålla sig till
      // p/h2/h3/ul/ol/li/blockquote/table/a/strong/em. Vi rensar bort potentiellt farliga
      // taggar som extra skydd (defense-in-depth utöver server-side prompt-instruktioner).
      var raw = String(p.html_content || '');
      // Strip <script>, <style>, <iframe>, on* attribut, javascript: URLs
      raw = raw.replace(/<\s*(script|style|iframe|object|embed|link)[^>]*>[\s\S]*?<\s*\/\s*\1\s*>/gi, '');
      raw = raw.replace(/<\s*(script|style|iframe|object|embed|link)[^>]*\/?>/gi, '');
      raw = raw.replace(/\son\w+\s*=\s*"[^"]*"/gi, '');
      raw = raw.replace(/\son\w+\s*=\s*'[^']*'/gi, '');
      raw = raw.replace(/javascript:/gi, '');
      document.getElementById('articleContent').innerHTML = raw;
    })
    .catch(function(e){
      renderError('Något gick fel', 'Vi kunde inte ladda artikeln just nu. Försök igen om en stund.');
    });
})();
</script>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matching-insights — Spick Admin</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --g:#0F6E56; --gm:#1D9E75; --gp:#E1F5EE; --gl:#9FE1CB; --gd:#085041;
  --b:#0E0E0E; --t:#1C1C1A; --m:#6B6960; --bg:#F7F7F5; --border:#E8E8E4;
  --w:#fff; --err:#DC2626; --warn:#D97706; --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;color:var(--t);background:var(--bg);line-height:1.6}
h1,h2,h3{font-family:'Playfair Display',Georgia,serif;color:var(--b);line-height:1.2;font-weight:700}

.page-header{background:linear-gradient(165deg,#0a2a1e 0%,#0F6E56 50%,#1D9E75 100%);color:var(--w);padding:2.5rem 1.5rem 1.5rem}
.page-header-inner{max-width:1100px;margin:0 auto}
.page-header h1{color:var(--w);font-size:clamp(1.5rem,3.5vw,2rem);margin-bottom:.25rem}
.page-header .sub{opacity:.9;font-size:1rem}
.container{max-width:1100px;margin:-1rem auto 4rem;padding:0 1.5rem;position:relative}
.card{background:var(--w);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem;box-shadow:0 4px 16px rgba(0,0,0,.04)}

.spinner{display:inline-block;width:24px;height:24px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:3rem 1rem;color:var(--m)}

table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:.5rem .75rem;border-bottom:2px solid var(--border);color:var(--m);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
td{padding:.5rem .75rem;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
tr:hover td{background:var(--bg)}

.histo-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem}
.histo-label{min-width:170px;font-size:.78rem;color:var(--m);font-family:monospace}
.histo-fill{background:var(--g);height:20px;border-radius:4px;min-width:2px;display:flex;align-items:center;padding-left:.4rem;color:var(--w);font-size:.75rem;font-weight:600}

.alert{padding:.9rem 1.1rem;border-radius:8px;font-size:.9rem;margin-bottom:1rem}
.alert-info{background:#DBEAFE;color:#1E40AF;border:1px solid #93C5FD}
.alert-error{background:#FEE2E2;color:#991B1B;border:1px solid #FCA5A5}

.tips{background:#DBEAFE;color:#1E3A8A;padding:1rem 1.25rem;border-radius:10px;font-size:.85rem;line-height:1.5;margin-bottom:1.25rem}
.tips strong{display:block;margin-bottom:.25rem;color:#1E40AF}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-header-inner">
    <h1>Matching-insights</h1>
    <div class="sub" id="subHeader">Laddar…</div>
  </div>
</div>

<div class="container">
  <div id="alertBox"></div>

  <div class="tips">
    <strong>ℹ️ Läs-vägledning (shadow-mode-metrik)</strong>
    top5_overlap 4-5 + spearman_rho nära 1.0 = v1 och v2 ger praktiskt lika resultat.
    Bred fördelning = algoritmerna skiljer sig meningsfullt → shadow-data är värdefull för go/no-go.
  </div>

  <div id="content">
    <div class="card empty">
      <div class="spinner"></div>
      <p style="margin-top:1rem">Laddar matching-data…</p>
    </div>
  </div>
</div>

<script src="js/supabase.min.js" defer></script>
<script src="js/config.js"></script>
<script>
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let SB;

async function init() {
  if (typeof SPICK === 'undefined' || !window.supabase) { setTimeout(init, 100); return; }
  SB = window.supabase.createClient(SPICK.SUPA_URL, SPICK.SUPA_KEY);

  const { data: sess } = await SB.auth.getSession();
  if (!sess?.session?.access_token) {
    showAlert('error', 'Du måste vara inloggad som admin. <a href="/mitt-konto.html">Logga in</a>');
    document.getElementById('content').innerHTML = '';
    return;
  }

  const { data: isAdmin, error: adminErr } = await SB.rpc('is_admin');
  if (adminErr || !isAdmin) {
    showAlert('error', 'Du har inte admin-rättigheter.');
    document.getElementById('content').innerHTML = '';
    return;
  }

  await loadAll();
}

async function loadAll() {
  const [statsRes, histoRes, recentRes] = await Promise.all([
    SB.from('v_shadow_mode_stats').select('*').limit(14),
    SB.from('v_shadow_mode_histogram').select('*'),
    SB.from('v_shadow_mode_recent').select('*').limit(30),
  ]);

  const stats = statsRes.data || [];
  const histo = histoRes.data || [];
  const recent = recentRes.data || [];

  document.getElementById('subHeader').textContent =
    `${stats.length} dag(ar) data · ${recent.length} sökningar senaste 48h`;

  if (stats.length === 0 && recent.length === 0) {
    document.getElementById('content').innerHTML =
      '<div class="card empty"><p style="font-size:1.1rem">Ingen matching-data ännu.</p><p>Shadow-mode börjar logga när första bokningen görs.</p></div>';
    return;
  }

  renderStats(stats);
  renderHistogram(histo);
  renderRecent(recent);
}

function renderStats(rows) {
  const existingContent = document.getElementById('content');
  existingContent.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>Daglig aggregation (senaste 14 dagar)</h2>
    ${rows.length === 0 ? '<p class="empty">Ingen data.</p>' : `
    <table>
      <thead>
        <tr><th>Dag</th><th>Sökn.</th><th>Snitt top5-overlap</th><th>Snitt rho</th><th>v1 count</th><th>v2 count</th></tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${esc(r.day)}</td>
            <td>${r.searches}</td>
            <td>${r.mean_top5_overlap ?? '–'}${r.stddev_top5_overlap != null ? ` <span style="color:var(--m)">±${r.stddev_top5_overlap}</span>` : ''}</td>
            <td>${r.mean_spearman_rho ?? '–'}${r.stddev_spearman_rho != null ? ` <span style="color:var(--m)">±${r.stddev_spearman_rho}</span>` : ''}</td>
            <td>${r.mean_v1_count ?? '–'}</td>
            <td>${r.mean_v2_count ?? '–'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  `;
  existingContent.appendChild(card);
}

function renderHistogram(rows) {
  const overlapRows = rows.filter(r => r.metric === 'top5_overlap').sort((a, b) => Number(a.bucket) - Number(b.bucket));
  const rhoRows = rows.filter(r => r.metric === 'spearman_rho');
  const maxFreq = Math.max(...rows.map(r => r.frequency || 0), 1);

  const content = document.getElementById('content');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>Histogram</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1rem">
      <div>
        <h3 style="font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--m);margin-bottom:.75rem">top5_overlap [0..5]</h3>
        ${overlapRows.length === 0 ? '<p class="empty" style="padding:1rem">Ingen data</p>' : overlapRows.map(r => `
          <div class="histo-bar">
            <span class="histo-label">overlap = ${esc(r.bucket)}</span>
            <div class="histo-fill" style="width:${(r.frequency / maxFreq) * 100}%">${r.frequency}</div>
          </div>
        `).join('')}
      </div>
      <div>
        <h3 style="font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--m);margin-bottom:.75rem">spearman_rho [-1..1]</h3>
        ${rhoRows.length === 0 ? '<p class="empty" style="padding:1rem">Ingen data</p>' : rhoRows.map(r => `
          <div class="histo-bar">
            <span class="histo-label">${esc(r.bucket)}</span>
            <div class="histo-fill" style="width:${(r.frequency / maxFreq) * 100}%">${r.frequency}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  content.appendChild(card);
}

function renderRecent(rows) {
  const content = document.getElementById('content');
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h2>Senaste 48h (max 30 sökningar)</h2>
    ${rows.length === 0 ? '<p class="empty" style="padding:1rem">Inga sökningar senaste 48h</p>' : `
    <table>
      <thead>
        <tr>
          <th>Tid</th><th>Overlap</th><th>Rho</th><th>v1/v2</th>
          <th>Plats</th><th>Bokning</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${new Date(r.created_at).toLocaleString('sv-SE', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })}</td>
            <td>${r.top5_overlap ?? '–'}</td>
            <td>${r.spearman_rho != null ? Number(r.spearman_rho).toFixed(2) : '–'}</td>
            <td>${r.v1_count ?? 0} / ${r.v2_count ?? 0}</td>
            <td style="font-size:.78rem;color:var(--m)">${r.customer_lat != null ? `${Number(r.customer_lat).toFixed(2)}, ${Number(r.customer_lng).toFixed(2)}` : '–'}</td>
            <td style="font-size:.78rem">${r.booking_id ? `<a href="/min-bokning.html?bid=${esc(r.booking_id)}" style="color:var(--g)">${esc(String(r.booking_id).slice(0,8))}</a>` : '–'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>`}
  `;
  content.appendChild(card);
}

function showAlert(type, html) {
  document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${html}</div>`;
}

init();
</script>
</body>
</html>

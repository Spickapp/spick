<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitta din städare – Spick</title>
<meta name="description" content="Välj bland betygsatta städare i Stockholm. Boka direkt med RUT-avdrag 50%.">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g:#0F6E56;--gm:#1D9E75;--gp:#E1F5EE;--gl:#9FE1CB;--b:#0E0E0E;--gr:#F7F7F5;--grd:#E8E8E4;--t:#1C1C1A;--m:#6B6960;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--t);background:var(--gr);}
nav{background:#fff;padding:1.25rem 5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--grd);position:sticky;top:0;z-index:10;}
.logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--g);text-decoration:none;}
.nav-right{display:flex;align-items:center;gap:1rem;}
.back{font-size:.875rem;color:var(--m);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s;}
.back:hover{color:var(--g);}
.hero{background:linear-gradient(135deg,#0a2a1e 0%,var(--g) 100%);padding:3.5rem 5rem 3rem;color:#fff;}
.hero h1{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:700;margin-bottom:.5rem;}
.hero p{font-size:1rem;color:rgba(255,255,255,.75);margin-bottom:2rem;}
.search-bar{display:flex;gap:.75rem;max-width:620px;}
.sinput{flex:1;padding:.875rem 1.25rem;border:none;border-radius:12px;font-size:.95rem;font-family:'DM Sans',sans-serif;outline:none;box-shadow:0 4px 16px rgba(0,0,0,.15);}
.sbtn{padding:.875rem 1.5rem;background:#fff;color:var(--g);border:none;border-radius:12px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;}
.sbtn:hover{background:var(--gp);}
.page{max-width:1200px;margin:0 auto;padding:2.5rem 2rem 6rem;}
.toolbar{display:flex;gap:.625rem;margin-bottom:2rem;flex-wrap:wrap;align-items:center;}
.fbtn{padding:.45rem 1.1rem;border-radius:100px;border:1.5px solid var(--grd);font-size:.8rem;font-weight:500;cursor:pointer;background:#fff;color:var(--m);transition:all .2s;font-family:'DM Sans',sans-serif;}
.fbtn:hover{border-color:var(--g);color:var(--g);}
.fbtn.on{background:var(--g);color:#fff;border-color:var(--g);}
.sort{padding:.45rem 1rem;border-radius:100px;border:1.5px solid var(--grd);font-size:.8rem;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;background:#fff;color:var(--m);margin-left:auto;}
.cnt{font-size:.82rem;color:var(--m);margin-left:.5rem;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;}
.card{background:#fff;border-radius:20px;border:1px solid var(--grd);overflow:hidden;transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;}
.card:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.1);}
.card.top{border:2px solid var(--g);}
.card-head{padding:1.5rem 1.5rem 1rem;display:flex;gap:1rem;align-items:flex-start;}
.av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff;flex-shrink:0;position:relative;}
.dot{width:14px;height:14px;background:#22c55e;border-radius:50%;position:absolute;bottom:2px;right:2px;border:2px solid #fff;}
.top-badge{background:var(--g);color:#fff;font-size:.68rem;font-weight:600;padding:.2rem .65rem;border-radius:100px;display:inline-block;margin-bottom:4px;}
.cname{font-size:1.05rem;font-weight:600;color:var(--b);}
.cloc{font-size:.78rem;color:var(--m);margin:3px 0 5px;}
.stars{color:#F59E0B;font-size:.85rem;}
.rating{font-size:.82rem;font-weight:600;color:var(--b);margin-left:3px;}
.jobs{font-size:.72rem;color:var(--m);}
.card-body{padding:0 1.5rem 1rem;flex:1;}
.tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.875rem;}
.tag{font-size:.7rem;padding:.25rem .7rem;border-radius:100px;background:var(--gp);color:var(--g);font-weight:500;}
.bio{font-size:.82rem;color:var(--m);line-height:1.6;margin-bottom:1rem;}
.price-row{display:flex;align-items:baseline;gap:.25rem;margin-bottom:.25rem;}
.price{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--b);}
.punit{font-size:.8rem;color:var(--m);}
.rut{font-size:.72rem;color:var(--g);font-weight:500;background:var(--gp);padding:.2rem .6rem;border-radius:100px;margin-left:4px;}
.card-foot{padding:0 1.5rem 1.25rem;display:flex;gap:.625rem;}
.book-btn{flex:2;display:block;text-align:center;padding:.75rem;background:var(--g);color:#fff;border:none;border-radius:100px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none;}
.book-btn:hover{background:var(--gm);}
.prof-btn{flex:1;display:block;text-align:center;padding:.75rem;background:var(--gr);color:var(--m);border:1.5px solid var(--grd);border-radius:100px;font-size:.82rem;font-weight:500;text-decoration:none;transition:all .2s;}
.prof-btn:hover{border-color:var(--g);color:var(--g);}
.empty{text-align:center;padding:5rem 2rem;grid-column:1/-1;color:var(--m);}
.ei{font-size:3rem;margin-bottom:1rem;}
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){nav{padding:1rem 1.5rem;}.hero{padding:2.5rem 1.5rem;}.hero h1{font-size:1.8rem;}.page{padding:1.5rem 1rem 4rem;}.grid{grid-template-columns:1fr;}.search-bar{flex-direction:column;}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">Spick</a>
  <div class="nav-right">
    <a href="index.html" class="back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Tillbaka
    </a>
  </div>
</nav>
<div class="hero">
  <h1>Hitta din perfekta städare</h1>
  <p>Välj bland betygsatta städare nära dig – boka samma person varje gång.</p>
  <div class="search-bar">
    <input class="sinput" type="text" id="sq" placeholder="🔍  Sök på namn, stad eller tjänst..." oninput="doSearch(this.value)">
    <button class="sbtn" onclick="doSearch(document.getElementById('sq').value)">Sök städare</button>
  </div>
</div>
<div class="page">
  <div class="toolbar">
    <button class="fbtn on" onclick="setF('alla',this)">Alla</button>
    <button class="fbtn" onclick="setF('hem',this)">🏠 Hemstädning</button>
    <button class="fbtn" onclick="setF('stor',this)">✨ Storstädning</button>
    <button class="fbtn" onclick="setF('flytt',this)">📦 Flyttstädning</button>
    <button class="fbtn" onclick="setF('fonster',this)">🪟 Fönsterputs</button>
    <span class="cnt" id="cnt"></span>
    <select class="sort" onchange="setS(this.value)">
      <option value="betyg">⭐ Högst betyg</option>
      <option value="pris-upp">💰 Lägsta pris</option>
      <option value="pris-ner">💰 Högsta pris</option>
      <option value="jobb">🏆 Flest jobb</option>
    </select>
  </div>
  <div class="grid" id="grid">
    <div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--m)">Laddar städare...</div>
  </div>
</div>
<script>
const SB=supabase.createClient('https://urjeijcncsyuletprydy.supabase.co','sb_publishable_PK2XJ5jxU9c1jqaiG-TApg_pCWhc4_3');
const C=['#0F6E56','#534AB7','#D85A30','#0C447C','#854F0B','#3B6D11','#7C3AED','#B45309'];
let ALL=[],fv='alla',sv='betyg',sq='';
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const st=r=>'★'.repeat(Math.floor(r||0))+'☆'.repeat(5-Math.floor(r||0));
async function init(){
  const {data,error}=await SB.from('cleaners').select('*').eq('status','godkänd').order('rating',{ascending:false});
  if(error||!data?.length){document.getElementById('grid').innerHTML='<div class="empty"><div class="ei">🧹</div>Inga städare hittades just nu.</div>';return;}
  ALL=data.map((r,i)=>({id:r.id,name:r.full_name||'Okänd',city:r.city||'Stockholm',price:r.hourly_rate||350,rating:r.rating||0,bio:r.bio||'Professionell städare.',tags:Array.isArray(r.services)?r.services:(r.services||'Hemstädning').split(',').map(s=>s.trim()),color:C[i%C.length],top:i===0,jobs:r.jobs_completed||0}));
  render();
}
function setF(v,btn){fv=v;document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');render();}
function setS(v){sv=v;render();}
function doSearch(v){sq=v.toLowerCase();render();}
function render(){
  let d=[...ALL];
  if(sq)d=d.filter(c=>c.name.toLowerCase().includes(sq)||c.city.toLowerCase().includes(sq)||c.tags.join(' ').toLowerCase().includes(sq));
  if(fv==='hem')d=d.filter(c=>c.tags.some(t=>t.toLowerCase().includes('hem')));
  else if(fv==='stor')d=d.filter(c=>c.tags.some(t=>t.toLowerCase().includes('stor')));
  else if(fv==='flytt')d=d.filter(c=>c.tags.some(t=>t.toLowerCase().includes('flytt')));
  else if(fv==='fonster')d=d.filter(c=>c.tags.some(t=>t.toLowerCase().includes('fönster')));
  if(sv==='betyg')d.sort((a,b)=>b.rating-a.rating);
  else if(sv==='pris-upp')d.sort((a,b)=>a.price-b.price);
  else if(sv==='pris-ner')d.sort((a,b)=>b.price-a.price);
  else if(sv==='jobb')d.sort((a,b)=>b.jobs-a.jobs);
  document.getElementById('cnt').textContent=d.length+' städare';
  const g=document.getElementById('grid');
  if(!d.length){g.innerHTML='<div class="empty"><div class="ei">🔍</div>Inga städare matchar din sökning.</div>';return;}
  g.innerHTML=d.map(c=>`<div class="card ${c.top?'top':''}">
    <div class="card-head">
      <div class="av" style="background:${c.color}">${ini(c.name)}<div class="dot"></div></div>
      <div style="flex:1">
        ${c.top?'<span class="top-badge">⭐ Toppvald</span><br>':''}
        <div class="cname">${c.name}</div>
        <div class="cloc">📍 ${c.city}</div>
        <div><span class="stars">${st(c.rating)}</span><span class="rating">${c.rating||'–'}</span></div>
        ${c.jobs>0?'<div class="jobs">'+c.jobs+' städningar utförda</div>':''}
      </div>
    </div>
    <div class="card-body">
      <div class="tags">${c.tags.slice(0,4).map(t=>'<span class="tag">'+t+'</span>').join('')}</div>
      <div class="bio">${c.bio.slice(0,95)}...</div>
      <div class="price-row"><span class="price">${c.price} kr</span><span class="punit">/h</span><span class="rut">${Math.round(c.price*.5)} kr m. RUT</span></div>
    </div>
    <div class="card-foot">
      <a class="book-btn" href="boka.html?name=${encodeURIComponent(c.name)}&rate=${c.price}&rating=${c.rating}&id=${c.id}">Boka ${c.name.split(' ')[0]} →</a>
      <a class="prof-btn" href="profil.html?id=${c.id}">Profil</a>
    </div>
  </div>`).join('');
}
init();
</script>

<style>
#spick-fab{position:fixed;bottom:1.75rem;right:1.75rem;width:56px;height:56px;background:linear-gradient(135deg,#0F6E56,#1D9E75);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 28px rgba(15,110,86,.45);z-index:999;font-size:1.4rem;transition:transform .2s;border:none;}
#spick-fab:hover{transform:scale(1.1);}
#spick-chat{position:fixed;bottom:1.75rem;right:1.75rem;width:360px;max-height:500px;background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.2);z-index:1000;display:none;flex-direction:column;overflow:hidden;font-family:'DM Sans',sans-serif;}
#spick-chat-head{background:linear-gradient(135deg,#0a2a1e,#0F6E56);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
#spick-chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem;min-height:200px;max-height:300px;}
#spick-chat-inp{border-top:1px solid #E8E8E4;padding:.75rem 1rem;display:flex;gap:.5rem;flex-shrink:0;}
#spick-chat-inp input{flex:1;padding:.6rem .875rem;border:1.5px solid #E8E8E4;border-radius:100px;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;}
#spick-chat-inp input:focus{border-color:#0F6E56;}
#spick-chat-inp button{padding:.6rem 1rem;background:#0F6E56;color:#fff;border:none;border-radius:100px;font-size:.82rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
.sc-msg-bot{background:#F7F7F5;color:#1C1C1A;border-radius:12px 12px 12px 4px;padding:.75rem .875rem;font-size:.845rem;line-height:1.6;max-width:88%;}
.sc-msg-usr{background:#0F6E56;color:#fff;border-radius:12px 12px 4px 12px;padding:.75rem .875rem;font-size:.845rem;line-height:1.6;max-width:85%;align-self:flex-end;}
.sc-pulse{width:7px;height:7px;background:#22c55e;border-radius:50%;display:inline-block;animation:scpulse 2s infinite;margin-right:.3rem;}
@keyframes scpulse{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
<button id="spick-fab" onclick="spickOpen()" title="AI-support">💬</button>
<div id="spick-chat">
  <div id="spick-chat-head">
    <div><div style="font-size:.68rem;color:#9FE1CB;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.2rem;"><span class="sc-pulse"></span>AI-support</div><div style="font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:#fff;">Spick Assistent</div></div>
    <button onclick="spickClose()" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.85rem;">✕</button>
  </div>
  <div id="spick-chat-msgs"></div>
  <div id="spick-chat-inp"><input id="spick-inp" type="text" placeholder="Fråga om bokning, RUT, priser..." onkeydown="if(event.key==='Enter')spickSend()"><button onclick="spickSend()">Skicka</button></div>
</div>
<script>
(function(){const R={rut:'RUT-avdraget ger <strong>50% rabatt</strong>! Max 75 000 kr/år. <a href="priser.html" style="color:#1D9E75">Se priser →</a>',boka:'Boka enkelt – välj städare, datum och tid. Bekräftelse inom 2h. <a href="stadare.html" style="color:#1D9E75">Hitta städare →</a>',pris:'250–600 kr/h, med RUT betalar du bara hälften. <a href="priser.html" style="color:#1D9E75">Se priser →</a>',avbok:'Avbokning gratis upp till 24h. Maila hello@spick.se.',flytt:'Besiktningsgodkänd flyttstädning. <a href="stadare.html" style="color:#1D9E75">Boka →</a>',städare:'9 betygsatta städare, 4.9★ snitt. <a href="stadare.html" style="color:#1D9E75">Se alla →</a>',default:'Maila <a href="mailto:hello@spick.se" style="color:#1D9E75">hello@spick.se</a> – svar inom 2h. 😊'};
let o=false;
function add(t,u){const c=document.getElementById('spick-chat-msgs');const d=document.createElement('div');d.className=u?'sc-msg-usr':'sc-msg-bot';d.style.alignSelf=u?'flex-end':'flex-start';d.innerHTML=t;c.appendChild(d);c.scrollTop=c.scrollHeight;}
function reply(m){const ml=m.toLowerCase();return ml.includes('rut')||ml.includes('avdrag')?R.rut:ml.includes('boka')||ml.includes('bokning')?R.boka:ml.includes('pris')||ml.includes('kostar')?R.pris:ml.includes('avbok')?R.avbok:ml.includes('flytt')?R.flytt:ml.includes('städare')||ml.includes('hitta')?R.städare:R.default;}
window.spickOpen=function(){document.getElementById('spick-fab').style.display='none';document.getElementById('spick-chat').style.display='flex';if(!o){o=true;setTimeout(()=>add('Hej! 👋 Hur kan jag hjälpa dig med bokning, RUT-avdrag eller städare?',false),200);}document.getElementById('spick-inp').focus();};
window.spickClose=function(){document.getElementById('spick-fab').style.display='flex';document.getElementById('spick-chat').style.display='none';};
window.spickSend=function(){const i=document.getElementById('spick-inp');const m=i.value.trim();if(!m)return;add(m,true);i.value='';setTimeout(()=>add(reply(m),false),500);};
})();
</script>
</body>
</html>

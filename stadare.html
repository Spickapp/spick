<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hitta din städare – Spick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green:#0F6E56;--green-mid:#1D9E75;--green-light:#9FE1CB;--green-pale:#E1F5EE;
  --black:#0E0E0E;--gray:#F7F7F5;--gray-mid:#E8E8E4;--text:#1C1C1A;--muted:#6B6960;--white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--gray);min-height:100vh;}
nav{background:white;padding:1.25rem 4rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-mid);position:sticky;top:0;z-index:10;}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--green);text-decoration:none;}
.nav-back{font-size:0.875rem;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:0.5rem;transition:color 0.2s;}
.nav-back:hover{color:var(--green);}
.page{max-width:1100px;margin:0 auto;padding:3rem 1.5rem 6rem;}
.page-header{margin-bottom:2.5rem;}
.page-tag{display:inline-block;background:var(--green-pale);color:var(--green);font-size:0.8rem;font-weight:500;padding:0.35rem 1rem;border-radius:100px;margin-bottom:1rem;}
.page-title{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--black);margin-bottom:0.5rem;letter-spacing:-0.02em;}
.page-sub{font-size:1rem;color:var(--muted);font-weight:300;}

/* FILTER */
.filter-bar{display:flex;gap:0.75rem;margin-bottom:2rem;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:0.8rem;color:var(--muted);font-weight:500;}
.filter-btn{padding:0.45rem 1.1rem;border-radius:100px;border:1.5px solid var(--gray-mid);font-size:0.8rem;font-weight:500;cursor:pointer;background:white;color:var(--muted);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.filter-btn:hover{border-color:var(--green);color:var(--green);}
.filter-btn.active{background:var(--green);color:white;border-color:var(--green);}
.sort-select{padding:0.45rem 1rem;border-radius:100px;border:1.5px solid var(--gray-mid);font-size:0.8rem;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;background:white;color:var(--muted);margin-left:auto;}

/* GRID */
.cleaners-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1.25rem;}
.cleaner-card{background:white;border-radius:20px;border:1px solid var(--gray-mid);overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:pointer;}
.cleaner-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,0.08);}
.cleaner-card.featured{border:2px solid var(--green);}
.card-top{padding:1.5rem 1.5rem 1rem;display:flex;gap:1rem;align-items:flex-start;}
.avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:white;flex-shrink:0;position:relative;}
.online-dot{width:14px;height:14px;background:#22c55e;border-radius:50%;position:absolute;bottom:2px;right:2px;border:2px solid white;}
.card-info{flex:1;}
.card-name{font-size:1.05rem;font-weight:600;color:var(--black);margin-bottom:2px;}
.card-location{font-size:0.8rem;color:var(--muted);margin-bottom:6px;}
.card-stars{display:flex;align-items:center;gap:4px;}
.stars{color:#F59E0B;font-size:0.85rem;letter-spacing:-1px;}
.rating-num{font-size:0.8rem;font-weight:500;color:var(--black);}
.rating-count{font-size:0.75rem;color:var(--muted);}
.card-body{padding:0 1.5rem 1rem;}
.card-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.875rem;}
.tag{font-size:0.7rem;padding:0.25rem 0.7rem;border-radius:100px;background:var(--green-pale);color:var(--green);font-weight:500;}
.card-bio{font-size:0.8rem;color:var(--muted);line-height:1.55;margin-bottom:1rem;}
.card-price{display:flex;align-items:baseline;gap:0.25rem;margin-bottom:1rem;}
.price-num{font-size:1.3rem;font-weight:700;color:var(--black);font-family:'Playfair Display',serif;}
.price-unit{font-size:0.8rem;color:var(--muted);}
.price-rut{font-size:0.75rem;color:var(--green);font-weight:500;background:var(--green-pale);padding:0.2rem 0.6rem;border-radius:100px;margin-left:4px;}
.card-footer{padding:0 1.5rem 1.25rem;display:flex;gap:0.75rem;}
.btn-book{flex:1;padding:0.75rem;background:var(--green);color:white;border:none;border-radius:100px;font-size:0.875rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-book:hover{background:var(--green-mid);}
.btn-profile{padding:0.75rem 1rem;background:transparent;color:var(--green);border:1.5px solid var(--green);border-radius:100px;font-size:0.875rem;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-profile:hover{background:var(--green-pale);}
.featured-badge{background:var(--green);color:white;font-size:0.7rem;font-weight:600;padding:0.25rem 0.75rem;border-radius:100px;margin-bottom:0.5rem;display:inline-block;}
.avail-badge{font-size:0.72rem;color:#22c55e;font-weight:500;display:flex;align-items:center;gap:4px;}
.avail-dot{width:6px;height:6px;background:#22c55e;border-radius:50%;}
.no-results{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:1rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal{background:white;border-radius:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-header{padding:1.5rem 1.5rem 0;display:flex;justify-content:space-between;align-items:flex-start;}
.modal-close{background:var(--gray);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:1.25rem 1.5rem 1.5rem;}
.modal-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:white;margin-bottom:1rem;}
.modal-name{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--black);margin-bottom:4px;}
.modal-location{font-size:0.875rem;color:var(--muted);margin-bottom:1rem;}
.modal-section{margin-bottom:1.25rem;}
.modal-section-title{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.5rem;}
.modal-bio{font-size:0.9rem;color:var(--text);line-height:1.65;font-weight:300;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.75rem;}
.stat{background:var(--gray);border-radius:12px;padding:0.875rem;text-align:center;}
.stat-val{font-size:1.2rem;font-weight:700;color:var(--black);font-family:'Playfair Display',serif;}
.stat-lbl{font-size:0.7rem;color:var(--muted);margin-top:2px;}
.times-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.day{background:var(--gray);border-radius:8px;padding:0.4rem;text-align:center;}
.day.avail{background:var(--green-pale);}
.day-name{font-size:0.6rem;color:var(--muted);margin-bottom:2px;}
.day-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-mid);margin:0 auto;}
.day.avail .day-dot{background:var(--green);}
.book-form{background:var(--gray);border-radius:16px;padding:1.25rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;}
.form-group{display:flex;flex-direction:column;gap:0.35rem;}
.form-label{font-size:0.75rem;font-weight:500;color:var(--muted);}
.form-input{padding:0.7rem 0.875rem;border:1.5px solid var(--gray-mid);border-radius:10px;font-size:0.9rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;background:white;}
.form-input:focus{border-color:var(--green);}
.recurring-toggle{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:12px;padding:0.875rem 1rem;margin-bottom:0.75rem;cursor:pointer;border:1.5px solid var(--gray-mid);transition:border-color 0.2s;}
.recurring-toggle.on{border-color:var(--green);background:var(--green-pale);}
.recurring-label{font-size:0.875rem;font-weight:500;color:var(--black);}
.recurring-sub{font-size:0.75rem;color:var(--muted);}
.toggle-sw{width:40px;height:22px;border-radius:11px;background:var(--gray-mid);position:relative;transition:background 0.2s;flex-shrink:0;}
.recurring-toggle.on .toggle-sw{background:var(--green);}
.toggle-th{width:16px;height:16px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform 0.2s;}
.recurring-toggle.on .toggle-th{transform:translateX(18px);}
.btn-confirm{width:100%;padding:0.875rem;background:var(--green);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-confirm:hover{background:var(--green-mid);}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.success-msg{text-align:center;padding:2rem;}
.success-msg h3{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--black);margin-bottom:0.5rem;}
.success-msg p{font-size:0.9rem;color:var(--muted);line-height:1.6;}
@media(max-width:768px){
  nav{padding:1rem 1.5rem;}
  .cleaners-grid{grid-template-columns:1fr;}
  .page{padding:2rem 1rem 4rem;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Spick</a>
  <a href="index.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Tillbaka
  </a>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-tag">Välj din städare</div>
    <h1 class="page-title">Hitta din perfekta städare</h1>
    <p class="page-sub">Välj en betygsatt städare nära dig – och boka samma person varje gång.</p>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Visa:</span>
    <button class="filter-btn active" onclick="filterCards('alla',this)">Alla</button>
    <button class="filter-btn" onclick="filterCards('tillganglig',this)">Tillgängliga nu</button>
    <button class="filter-btn" onclick="filterCards('hemstadning',this)">Hemstädning</button>
    <button class="filter-btn" onclick="filterCards('flyttstadning',this)">Flyttstädning</button>
    <button class="filter-btn" onclick="filterCards('storstadning',this)">Storstädning</button>
    <select class="sort-select" onchange="sortCards(this.value)">
      <option value="betyg">Högst betyg</option>
      <option value="pris">Lägsta pris</option>
      <option value="jobb">Flest jobb</option>
    </select>
  </div>

  <div class="cleaners-grid" id="cleanersGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<script>
const SUPABASE_URL = 'https://urjeijcncsyuletprydy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_PK2XJ5jxU9c1jqaiG-TApg_pCWhc4_3';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const AVATAR_COLORS = ['#1D9E75','#534AB7','#D85A30','#0C447C','#854F0B','#3B6D11','#C0396B','#0F6E56'];

const DEMO_CLEANERS = [
  { id:'demo-1', name:'Sara Karlsson', location:'Stockholm · Östermalm', rating:4.97, reviews:47, jobs:89, price:350, bio:'Noggrann och pålitlig städare med 4 års erfarenhet. Specialiserad på hemstädning och storstädning. Allergiker-vänliga produkter på begäran.', tags:['Hemstädning','Storstädning','Fönsterputs'], color:'#1D9E75', avail:true, days:[1,1,1,0,1,1,0], featured:true },
  { id:'demo-2', name:'Olena Kovalenko', location:'Stockholm · Södermalm', rating:4.89, reviews:19, jobs:34, price:330, bio:'Ukrainsk städare med höga standarder. Extremt noggrann med detaljer. Perfekt för regelbunden hemstädning.', tags:['Hemstädning','Storstädning'], color:'#0C447C', avail:true, days:[1,1,0,1,0,1,0], featured:false },
];

let ALL_CLEANERS = [];
let currentFilter = 'alla';
let currentSort = 'betyg';
let recurringOn = false;
let selectedCleaner = null;
let isLoading = true;

function getInitials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2); }
function starsHtml(r) { const full=Math.floor(r); return '★'.repeat(full)+'☆'.repeat(5-full); }

function mapCleaner(row, idx) {
  const services = [];
  if (row.services) {
    if (Array.isArray(row.services)) services.push(...row.services);
    else services.push(...row.services.split(',').map(s=>s.trim()));
  } else {
    services.push('Hemstädning');
  }
  let days = [1,1,1,1,1,0,0];
  if (row.days && Array.isArray(row.days)) days = row.days;
  const price = row.hourly_rate || row.price || 350;
  const rating = row.rating || 0;
  const reviews = row.reviews || 0;
  const jobs = row.jobs_completed || row.jobs || 0;
  return {
    id: row.id,
    name: row.full_name || row.name || 'Okänd',
    location: row.city ? `${row.city}` : 'Stockholm',
    rating, reviews, jobs, price,
    bio: row.bio || row.description || row.message || 'Professionell och pålitlig städare.',
    tags: services,
    color: AVATAR_COLORS[idx % AVATAR_COLORS.length],
    avail: row.available !== false,
    days,
    featured: row.featured || idx === 0,
  };
}

function showLoading() {
  const grid = document.getElementById('cleanersGrid');
  grid.innerHTML = Array(3).fill(`
    <div class="cleaner-card" style="pointer-events:none;">
      <div class="card-top">
        <div class="avatar" style="background:var(--gray-mid);"></div>
        <div class="card-info">
          <div style="height:14px;background:var(--gray-mid);border-radius:4px;width:60%;margin-bottom:8px;"></div>
          <div style="height:11px;background:var(--gray-mid);border-radius:4px;width:40%;"></div>
        </div>
      </div>
      <div class="card-body">
        <div style="height:11px;background:var(--gray-mid);border-radius:4px;width:80%;margin-bottom:8px;"></div>
        <div style="height:11px;background:var(--gray-mid);border-radius:4px;width:55%;"></div>
      </div>
      <div class="card-footer" style="padding-top:0.5rem;">
        <div style="height:40px;background:var(--gray-mid);border-radius:100px;flex:1;"></div>
      </div>
    </div>
  `).join('');
}

async function loadCleaners() {
  showLoading();
  try {
    let { data, error } = await db
      .from('cleaners')
      .select('*')
      .eq('status', 'godkand')
      .order('rating', { ascending: false });
    if (error || !data || data.length === 0) {
      const res2 = await db
        .from('applications')
        .select('*')
        .eq('status', 'godkand')
        .order('created_at', { ascending: false });
      if (!res2.error && res2.data && res2.data.length > 0) {
        data = res2.data;
        error = null;
      }
    }
    if (!error && data && data.length > 0) {
      ALL_CLEANERS = data.map((row, idx) => mapCleaner(row, idx));
    } else {
      ALL_CLEANERS = DEMO_CLEANERS;
      showDemoBanner();
    }
  } catch(e) {
    console.warn('Supabase-fel:', e);
    ALL_CLEANERS = DEMO_CLEANERS;
    showDemoBanner();
  }
  isLoading = false;
  renderCleaners();
}

function showDemoBanner() {
  const header = document.querySelector('.page-header');
  if (!document.getElementById('demoBanner')) {
    const banner = document.createElement('div');
    banner.id = 'demoBanner';
    banner.style.cssText = 'background:#FEF3C7;border:1px solid #F59E0B;border-radius:12px;padding:0.75rem 1rem;font-size:0.8rem;color:#92400E;margin-top:1rem;';
    banner.innerHTML = '⚠️ <strong>Admin:</strong> Inga godkända städare i databasen ännu – visar exempeldata. Godkänn ansökningar i <a href="admin.html" style="color:#92400E;">admin-panelen</a>.';
    header.appendChild(banner);
  }
}

function filterCards(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCleaners();
}

function sortCards(val) { currentSort=val; renderCleaners(); }

function renderCleaners() {
  let data = [...ALL_CLEANERS];
  if (currentFilter==='tillganglig') data=data.filter(c=>c.avail);
  else if (currentFilter==='hemstadning') data=data.filter(c=>c.tags.includes('Hemstädning'));
  else if (currentFilter==='flyttstadning') data=data.filter(c=>c.tags.includes('Flyttstädning'));
  else if (currentFilter==='storstadning') data=data.filter(c=>c.tags.includes('Storstädning'));
  if (currentSort==='betyg') data.sort((a,b)=>b.rating-a.rating);
  else if (currentSort==='pris') data.sort((a,b)=>a.price-b.price);
  else if (currentSort==='jobb') data.sort((a,b)=>b.jobs-a.jobs);
  const grid = document.getElementById('cleanersGrid');
  if (!data.length) { grid.innerHTML='<div class="no-results">Inga städare hittades för detta filter.</div>'; return; }
  grid.innerHTML = data.map(c => `
    <div class="cleaner-card ${c.featured?'featured':''}" onclick="openModal('${c.id}')">
      <div class="card-top">
        <div class="avatar" style="background:${c.color};">
          ${getInitials(c.name)}
          ${c.avail?'<div class="online-dot"></div>':''}
        </div>
        <div class="card-info">
          ${c.featured?'<span class="featured-badge">Toppvald</span><br>':''}
          <div class="card-name">${c.name}</div>
          <div class="card-location">${c.location}</div>
          <div class="card-stars">
            <span class="stars">${starsHtml(c.rating)}</span>
            <span class="rating-num">${c.rating}</span>
            <span class="rating-count">(${c.reviews})</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-bio">${c.bio.slice(0,90)}...</div>
        <div class="card-price">
          <span class="price-num">${c.price} kr</span>
          <span class="price-unit">/timme</span>
          <span class="price-rut">${Math.round(c.price*0.5)} kr med RUT</span>
        </div>
        ${c.avail?'<div class="avail-badge"><div class="avail-dot"></div>Tillgänglig denna vecka</div>':'<div style="font-size:0.72rem;color:var(--muted);">Nästa lediga tid: nästa vecka</div>'}
      </div>
      <div class="card-footer">
        <button class="btn-book" onclick="event.stopPropagation();openModal('${c.id}')">Boka ${c.name.split(' ')[0]}</button>
        <button class="btn-profile" onclick="event.stopPropagation();openModal('${c.id}')">Profil</button>
      </div>
    </div>
  `).join('');
}

function openModal(id) {
  selectedCleaner = ALL_CLEANERS.find(c=>String(c.id)===String(id));
  const c = selectedCleaner;
  const days = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate()+1);
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <div></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-avatar" style="background:${c.color};">${getInitials(c.name)}</div>
      <div class="modal-name">${c.name}</div>
      <div class="modal-location">${c.location} · ${c.price} kr/h <span style="color:var(--green);font-size:0.8rem;">(${Math.round(c.price*0.5)} kr/h med RUT)</span></div>
      <div class="modal-section">
        <div class="modal-section-title">Om ${c.name.split(' ')[0]}</div>
        <div class="modal-bio">${c.bio}</div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Statistik</div>
        <div class="stats-grid">
          <div class="stat"><div class="stat-val">${c.rating}</div><div class="stat-lbl">Snittbetyg</div></div>
          <div class="stat"><div class="stat-val">${c.reviews}</div><div class="stat-lbl">Recensioner</div></div>
          <div class="stat"><div class="stat-val">${c.jobs}</div><div class="stat-lbl">Utförda jobb</div></div>
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Tillgänglighet denna vecka</div>
        <div class="times-grid">
          ${days.map((d,i)=>`<div class="day ${c.days[i]?'avail':''}"><div class="day-name">${d}</div><div class="day-dot"></div></div>`).join('')}
        </div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">Boka ${c.name.split(' ')[0]}</div>
        <div class="book-form">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Datum</label>
              <input type="date" class="form-input" id="m-date" min="${tomorrow.toISOString().split('T')[0]}">
            </div>
            <div class="form-group">
              <label class="form-label">Tid</label>
              <select class="form-input" id="m-time">
                ${['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'].map(t=>`<option>${t}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Tjänst</label>
              <select class="form-input" id="m-service">
                ${c.tags.map(t=>`<option>${t}</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Timmar</label>
              <select class="form-input" id="m-hours">
                ${[1,2,3,4,5,6].map(h=>`<option value="${h}"${h===3?' selected':''}>${h} ${h===1?'timme':'timmar'}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="recurring-toggle" id="recurringToggle" onclick="toggleRecurring()">
            <div>
              <div class="recurring-label">Boka återkommande</div>
              <div class="recurring-sub">Samma tid varje vecka med ${c.name.split(' ')[0]}</div>
            </div>
            <div class="toggle-sw" id="toggleSw"><div class="toggle-th"></div></div>
          </div>
          <div id="recurringOptions" style="display:none;margin-bottom:0.75rem;">
            <select class="form-input" id="m-freq">
              <option value="weekly">Varje vecka</option>
              <option value="biweekly">Varannan vecka</option>
              <option value="monthly">En gång i månaden</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Ditt namn</label>
              <input type="text" class="form-input" id="m-name" placeholder="Anna Svensson">
            </div>
            <div class="form-group">
              <label class="form-label">Telefon</label>
              <input type="tel" class="form-input" id="m-phone" placeholder="070 123 45 67">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0.75rem;">
            <label class="form-label">E-post</label>
            <input type="email" class="form-input" id="m-email" placeholder="anna@email.se">
          </div>
          <div class="form-group" style="margin-bottom:0.75rem;">
            <label class="form-label">Adress</label>
            <input type="text" class="form-input" id="m-address" placeholder="Storgatan 1, Stockholm">
          </div>
          <button class="btn-confirm" id="confirmBtn" onclick="confirmBooking()">
            Boka ${c.name.split(' ')[0]} →
          </button>
        </div>
      </div>
    </div>`;
  document.getElementById('modalOverlay').style.display='flex';
  document.body.style.overflow='hidden';
}

function toggleRecurring() {
  recurringOn = !recurringOn;
  document.getElementById('recurringToggle').classList.toggle('on', recurringOn);
  document.getElementById('recurringOptions').style.display = recurringOn ? 'block' : 'none';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
  recurringOn = false;
}

async function confirmBooking() {
  const btn = document.getElementById('confirmBtn');
  const name = document.getElementById('m-name').value;
  const email = document.getElementById('m-email').value;
  const phone = document.getElementById('m-phone').value;
  const date = document.getElementById('m-date').value;
  const time = document.getElementById('m-time').value;
  const address = document.getElementById('m-address').value;
  if (!name||!email||!phone||!date||!address) {
    alert('Fyll i alla fält för att boka.');
    return;
  }
  btn.disabled=true;
  btn.innerHTML='<div class="spinner"></div> Bokar...';
  const booking = {
    name, email, phone, address, city: 'Stockholm',
    service: document.getElementById('m-service').value,
    date, time,
    hours: parseInt(document.getElementById('m-hours').value),
    rut: true,
    message: `Städare: ${selectedCleaner.name}${recurringOn?' · Återkommande: '+document.getElementById('m-freq').value:''}`,
    status: 'ny'
  };
  try {
    const { error } = await db.from('bookings').insert([booking]);
    if (error) throw error;
    document.getElementById('modal').querySelector('.modal-body').innerHTML = `
      <div class="success-msg">
        <div style="font-size:3rem;margin-bottom:1rem;">✅</div>
        <h3>Bokning bekräftad!</h3>
        <p>Du har bokat <strong>${selectedCleaner.name}</strong> för ${booking.service} den ${date} kl ${time}.<br><br>
        ${recurringOn?'Din återkommande bokning är inlagd.<br><br>':''}
        Vi återkommer till <strong>${email}</strong> med bekräftelse inom 2 timmar.</p>
        <button class="btn-confirm" style="margin-top:1.5rem;" onclick="closeModal()">Stäng</button>
      </div>`;
  } catch(e) {
    alert('Något gick fel – försök igen eller kontakta hello@spick.se');
    btn.disabled=false;
    btn.innerHTML=`Boka ${selectedCleaner.name.split(' ')[0]} →`;
  }
}

loadCleaners();
</script>
</body>
</html>

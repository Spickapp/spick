<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; }
  
  header { background: #1a1a2e; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
  header a { color: white; text-decoration: none; font-size: 14px; opacity: 0.7; }
  header h1 { color: white; font-size: 20px; flex: 1; text-align: center; }
  .badge { background: #00d084; color: white; font-size: 11px; padding: 2px 8px; border-radius: 99px; }

  .chat-container { max-width: 680px; margin: 0 auto; padding: 20px; height: calc(100vh - 140px); display: flex; flex-direction: column; }
  
  .welcome { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .welcome h2 { font-size: 20px; color: #1a1a2e; margin-bottom: 8px; }
  .welcome p { color: #666; font-size: 14px; line-height: 1.5; }
  
  .quick-questions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .quick-q { background: #f0f4ff; border: 1px solid #c7d2fe; color: #4338ca; padding: 6px 14px; border-radius: 99px; font-size: 13px; cursor: pointer; transition: all 0.2s; }
  .quick-q:hover { background: #4338ca; color: white; }

  .messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 4px 0; }
  
  .msg { display: flex; gap: 10px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .msg.assistant .msg-avatar { background: #1a1a2e; }
  .msg.user .msg-avatar { background: #4338ca; }
  .msg-bubble { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; }
  .msg.assistant .msg-bubble { background: white; color: #1a1a2e; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: #4338ca; color: white; border-bottom-right-radius: 4px; }
  
  .typing { display: flex; gap: 4px; padding: 12px 16px; background: white; border-radius: 18px; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .typing span { width: 8px; height: 8px; background: #999; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-area { background: white; border-radius: 16px; padding: 12px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; gap: 10px; align-items: flex-end; margin-top: 12px; }
  textarea { flex: 1; border: none; outline: none; font-size: 14px; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
  .send-btn { background: #4338ca; color: white; border: none; border-radius: 10px; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
  .send-btn:hover { background: #3730a3; }
  .send-btn:disabled { background: #c7d2fe; cursor: not-allowed; }
  
  .book-cta { background: #00d084; color: white; text-align: center; padding: 10px; border-radius: 10px; margin-top: 8px; text-decoration: none; display: block; font-weight: 600; font-size: 14px; }
</style>
</head>
<body>
<header>
  <a href="/">← Tillbaka</a>
  <h1>🧹 Spick AI-support</h1>
  <span class="badge">Online 24/7</span>
</header>

<div class="chat-container">
  <div class="welcome">
    <h2>Hej! Jag är Spicks AI-assistent 👋</h2>
    <p>Ställ frågor om städning, priser, RUT-avdrag eller boka direkt. Jag svarar direkt dygnet runt!</p>
    <div class="quick-questions">
      <button class="quick-q" onclick="sendQuick(this)">Vad kostar en städning?</button>
      <button class="quick-q" onclick="sendQuick(this)">Hur fungerar RUT-avdrag?</button>
      <button class="quick-q" onclick="sendQuick(this)">Hur bokar jag?</button>
      <button class="quick-q" onclick="sendQuick(this)">Vilka städer finns ni i?</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>
  
  <a href="/boka" class="book-cta">📅 Boka städning direkt →</a>

  <div class="input-area">
    <textarea id="input" placeholder="Skriv din fråga..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const CLAUDE_URL = 'https://urjeijcncsyuletprydy.supabase.co/functions/v1/swift-endpoint';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzIyNDQsImV4cCI6MjA4OTg0ODI0NH0.CH5MSMaWTBfkuzZQOBKgxu-B6Vfy8w9DLh49WPU1Vd0';
let messages = [];
let isLoading = false;

function addMsg(role, text) {
  messages.push({ role, content: text });
  const div = document.getElementById('messages');
  const emoji = role === 'assistant' ? '🧹' : '👤';
  div.innerHTML += `
    <div class="msg ${role}">
      <div class="msg-avatar">${emoji}</div>
      <div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>
    </div>`;
  div.scrollTop = div.scrollHeight;
}

function showTyping() {
  const div = document.getElementById('messages');
  div.innerHTML += `<div class="msg assistant" id="typing">
    <div class="msg-avatar">🧹</div>
    <div class="typing"><span></span><span></span><span></span></div>
  </div>`;
  div.scrollTop = div.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || isLoading) return;
  
  input.value = '';
  input.style.height = 'auto';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  
  addMsg('user', text);
  showTyping();
  
  try {
    const res = await fetch(CLAUDE_URL, {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SUPA_KEY}`,
        'apikey': SUPA_KEY
      },
      body: JSON.stringify({ messages, mode: 'customer' })
    });
    const data = await res.json();
    document.getElementById('typing')?.remove();
    addMsg('assistant', data.reply || 'Tyvärr kunde jag inte svara. Kontakta hello@spick.se');
  } catch(e) {
    document.getElementById('typing')?.remove();
    addMsg('assistant', 'Något gick fel. Kontakta oss på hello@spick.se eller ring 08-XX XX XX');
  }
  
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
}

function sendQuick(btn) {
  document.getElementById('input').value = btn.textContent;
  sendMessage();
  btn.closest('.quick-questions').style.display = 'none';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// Välkomstmeddelande
setTimeout(() => addMsg('assistant', 'Hej! 👋 Välkommen till Spick. Hur kan jag hjälpa dig idag? Du kan fråga om priser, städare, RUT-avdrag eller hur du bokar!'), 500);
</script>
</body>
</html>

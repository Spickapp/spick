<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Betygsätt din städning – Spick</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:white;border-radius:24px;padding:40px;max-width:480px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.08);text-align:center}
.btn{display:block;background:#0F6E56;color:white;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;margin-top:24px}
</style></head>
<body><div class="card">
<div style="font-size:48px">🧹</div>
<h1 style="font-size:22px;margin:16px 0 8px">Hur gick städningen?</h1>
<p style="color:#888;font-size:14px;margin-bottom:24px">Din feedback hjälper oss att hålla hög kvalitet.</p>
<div style="display:flex;justify-content:center;gap:12px;margin-bottom:24px" id="stars">
<span style="font-size:48px;cursor:pointer" data-v="1">⭐</span><span style="font-size:48px;cursor:pointer" data-v="2">⭐</span><span style="font-size:48px;cursor:pointer" data-v="3">⭐</span><span style="font-size:48px;cursor:pointer" data-v="4">⭐</span><span style="font-size:48px;cursor:pointer" data-v="5">⭐</span>
</div>
<textarea id="cmnt" placeholder="Kommentar (valfritt)" style="width:100%;height:80px;border:2px solid #e0e0e0;border-radius:12px;padding:12px;font-size:14px;margin-bottom:16px;resize:none"></textarea>
<button onclick="submit()" id="btn" disabled style="width:100%;padding:14px;background:#ccc;color:white;border:none;border-radius:12px;font-size:16px;cursor:not-allowed">Skicka betyg</button>
<div id="succ" style="display:none"><div style="font-size:64px">⭐</div><h2 style="margin:16px 0 8px">Tack för ditt betyg!</h2><a href="/" style="display:inline-block;background:#0F6E56;color:white;padding:12px 24px;border-radius:12px;text-decoration:none;font-weight:700;margin-top:16px">Tillbaka till Spick</a></div>
<script>
const S='https://urjeijcncsyuletprydy.supabase.co';
const K='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzIyNDQsImV4cCI6MjA4OTg0ODI0Li.CH5MSMaWTBfkuzZQOBKgxu-B6Vfy8w9DLh49WPU1Vd0';
let r=0;
document.querySelectorAll('#stars span').forEach((s,i) => {
  s.onclick=()=>{r=i;
    document.querySelectorAll('#stars span').forEach((x,j)=>x.style.opacity=j<=i?1:.3);
    document.getElementById('btn').disabled=false;
    document.getElementById('btn').style.background='#0F6E56';
    document.getElementById('btn').style.cursor='pointer';};});
async function submit(){
  if(!r) return;
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(id) await fetch(SURL+'/rest/v1/reviews',{
    method:'POST',headers:{apikey:K,Authorization:'Bearer '+K,'Content-Type':'application/json',Prefer:'return=minimal'},
    body:JSON.stringify({booking_id:id,cleaner_rating:r+1,cleaner_comment:document.getElementById('cmnt').value})});
  document.getElementById('btn').style.display='none';
  document.getElementById('succ').style.display='block';
}
<script></div></body></html>

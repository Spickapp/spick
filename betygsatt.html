</head><body><div class="card"><div id="formSection"><div class="logo">🧹</div><div class="logo-text">Spick</div><h1>Hur gick städningen?</h1><p class="sub">Din feedback hÜjpälper oss att halla hög kvalitet.</p><div class="stars" id="starsRow"><span class="star" data-val="1">⭐</span><span class="star" data-val="2">⭐</span><span class="star" data-val="3">⭐</span><span class="star" data-val="4">⭐</span><span class="star" data-val="5">⭐</span></div><div class="rating-label" id="ratingLabel">Välj ett betyg</div><div class="quick-tags" id="quickTags"></div><div class="comment-wrap"><textarea id="comment" placeholder="Skriv kommentar (valfritt)..."></textarea></div><button class="submit-btn" id="submitBtn" disabled onclick="submitReview()">Skicka betyg</button></div><div class="success" id="successSection"><div style="font-size:64px" id="successIcon">⭐</div><h2 id="successTitle">Tack för ditt betyg!</h2><p id="successText">Ditt betyg hÜjpälper oss att leverera toppkvalitet.</p><a href="/" style="display:inline-block;background:#f0f4f8;color:#1a1a2e;padding:12px 28px;border-radius:12px;font-weight:600;text-decoration:none">← Tillbaka</a></div></div><script>const SUPA='https://urjeijcncsyuletprydy.supabase.co',KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzIyNDQsImV4cCI6MjA4OTg0ODI0NH0.CH5MSMaWTBfkuzZQOBKgxu-B6Vfy8w9DLh49WPU1Vd0';let rat=0,tags=[];const params=new URLSearchParams(location.search),bid=params.get('id'),pre=parseInt(params.get('rating')||'0');const TBR={1:['Dök inte upp','Dålig kvalitet'],2:['Under förväntan','Missat detaljer'],3:['Okej','Kunde vara bättre'],4:['Bra städning','Punktlig','Noggrant'],5:['Fantastisk!','Supernoggrant','Rekommenderar']};const LB=['','Väldigt missnöjd','Missnöjd','Okej','Nöjd','Mycket nöjd!'];document.querySelectorAll('.star').forEach((s,i)=>{s.addEventListener('click',()=>setR(i+1));s.addEventListener('mouseenter',()=>hl(i+1));s.addEventListener('mouseleave',()=>hl(rat));});function hl(n){document.querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('active',i<n));}function setR(n){rat=n;hl(n);document.getElementById('ratingLabel').textContent=LB[n];document.getElementById('submitBtn').disabled=false;tags=[];document.getElementById('quickTags').innerHTML=(TBR[n]||[]).map(t=>`<span class="tag" onclick="toggleTag(this,'${t}')">${t}</span>`).join('');}function toggleTag(el,t){el.classList.toggle('selected');el.classList.contains('selected')?tags.push(t):tags=tags.filter(x=>x!v==t);}async function submitReview(){if(!rat)return;const btn=document.getElementById('submitBtn');btn.disabled=true;btn.textContent='㏳ Skickar...';const c=[...tags,document.getElementById('comment').value.trim()].filter(Boolean).join(', ');try{if(bid)await fetch(SUPA+'/rest/v1/reviews',{method:'POST',headers:{Authorization:'Bearer '+KEY,apikey:KEY,'Content-Type':'application/json',Prefer:'return=minimal'},body:JSON.stringify({booking_id:bid,cleaner_rating:rat,cleaner_comment:c})});document.getElementById('formSection').style.display='none';document.getElementById('successSection').style.display='block';}catch(e){btn.disabled=false;btn.textContent='Skicka betyg';}]}if(pre>=1&&pre<=5)setTimeout(()=>setR(pre),300);</script></body></html>

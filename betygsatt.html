.star:hover,.star.active{transform:scale(1.1)}

textarea,input{width:100%;padding:12px 16px;border:1.5px solid #E8E8E4;border-radius:12px;font-size:.95rem;font-family:'DM Sans',sans-serif;resize:vertical;transition:border-color .2s;outline:none}
textarea:focus,input:focus{border-color:var(--g)}

.aspect{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;border:1.5px solid #E8E8E4;border-radius:12px;cursor:pointer;transition:all .2s;text-align:center}
.aspect.on{border-color:var(--g);background:var(--gr)}
.aspect-icon{font-size:1.4rem}
.aspect-label{font-size:.75rem;font-weight:600;color:var(--m)}
.aspect.on .aspect-label{color:var(--g)}
.btn{width:100%;padding:14px;background:var(--g);color:#fff;border:none;border-radius:100px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.btn:hover:not(:disabled){background:var(--gm)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.success{text-align:center;padding:20px 0}
.success-icon{font-size:4rem;margin-bottom:16px}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.aspect-btn{
  padding:.4rem .9rem;
  border:1.5px solid #E8E8E4;
  border-radius:99px;
  font-size:.78rem;
  cursor:pointer;
  font-family:inherit;
  background:#fff;
  transition:all .12s;
  color:#1C1C1A;
}
.aspect-btn.selected{
  background:#E1F5EE;
  border-color:#0F6E56;
  color:#0F6E56;
  font-weight:600;

<body>
<a href="index.html" class="logo">Spick</a>
<div class="card" id="form-card">
  <h1>Hur gick städningen?</h1>
  <p class="sub">Din recension hjälper oss att hålla hög kvalitet och hjälper din städare att växa</p>

  <div class="stars-wrap" id="stars">
    <span class="star" data-v="1">⭐</span>
    <span class="star" data-v="2">⭐</span>
    <span class="star" data-v="3">⭐</span>
    <span class="star" data-v="4">⭐</span>
    <span class="star" data-v="5">⭐</span>
  </div>
  <div class="star-label" id="star-label">Välj ett betyg</div>

  <div class="aspects">
    <div class="aspect" data-a="Punktlighet" onclick="toggleAspect(this)">
      <span class="aspect-icon">⏰</span>
      <span class="aspect-label">Punktlighet</span>
    </div>
    <div class="aspect" data-a="Noggrannhet" onclick="toggleAspect(this)">
      <span class="aspect-icon">✨</span>
      <span class="aspect-label">Noggrannhet</span>
    </div>
    <div class="aspect" data-a="Bemötande" onclick="toggleAspect(this)">
      <span class="aspect-icon">😊</span>
      <span class="aspect-label">Bemötande</span>
    </div>
    <div class="aspect" data-a="Resultat" onclick="toggleAspect(this)">
      <span class="aspect-icon">🏠</span>
      <span class="aspect-label">Slutresultat</span>
    </div>
  </div>

  <div class="f">
    <label>Kommentar (valfritt)</label>
    <textarea id="comment" rows="3" placeholder="Berätta om din upplevelse..."></textarea>
  </div>

  <button class="btn" id="sbtn" onclick="submit()" disabled>Skicka betyg →</button>
</div>

<script>
const SB = supabase.createClient(
  SPICK.SUPA_URL, SPICK.SUPA_KEY);

const params = new URLSearchParams(window.location.search);
const bid = params.get('bid');
let rating = 0;
const aspects = [];
const labels = ['','Inte bra alls','Kunde vara bättre','Okej','Bra!','Utmärkt! ⭐'];

document.querySelectorAll('.star').forEach(s => {
  s.addEventListener('click', () => {
    rating = +s.dataset.v;
    document.querySelectorAll('.star').forEach((st,i) => st.classList.toggle('active', i < rating));
    document.getElementById('star-label').textContent = labels[rating] || '';
    document.getElementById('sbtn').disabled = false;
  });
});

function toggleAspect(el) {
  el.classList.toggle('on');
  const a = el.dataset.a;
  const i = aspects.indexOf(a);
  if (i > -1) aspects.splice(i, 1);
  else aspects.push(a);
}

async function submit() {
  if (!rating) return;
  const btn = document.getElementById('sbtn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';

  // Hämta bokning för cleaner_id
  let cleanerId = null;
  if (bid) {
    const { data } = await SB.from('bookings').select('cleaner_id').eq('id', bid);
    cleanerId = data?.[0]?.cleaner_id || null;
  }

  // Spara recension
  const { error } = await SB.from('reviews').insert([{
    booking_id: bid || null,
    cleaner_id: cleanerId,
    rating,
    aspects: aspects.join(', '),
    comment: document.getElementById('comment').value.trim() || null,
    created_at: new Date().toISOString()
  }]);

  // Uppdatera städarens snittbetyg om vi har cleaner_id
  if (cleanerId && !error) {
    const { data: reviews } = await SB.from('reviews').select('rating').eq('cleaner_id', cleanerId);
    if (reviews?.length) {
      const avg = reviews.reduce((s,r) => s + r.cleaner_rating, 0) / reviews.length;
      await SB.from('cleaners').update({ avg_rating: Math.round(avg * 10) / 10 }).eq('id', cleanerId);
    }
  }

  // Visa success
  document.getElementById('form-card').innerHTML = `
<div class="success">
  <div class="success-icon">🌟</div>
  <h1>Tack för ditt betyg!</h1>
  <p style="color:var(--m);margin:12px 0 28px;line-height:1.6">Ditt betyg hjälper oss att hålla hög kvalitet och hjälper din städare att växa.</p>
  <a href="boka.html" style="display:block;background:var(--g);color:#fff;padding:14px;border-radius:100px;text-decoration:none;font-weight:600">Boka nästa städning →</a>
  <a href="index.html" style="display:block;color:var(--g);padding:12px;text-decoration:none;font-weight:600;margin-top:8px">Tillbaka till startsidan</a>
</div>`;
}
</script>
<style>
#spick-cookie{position:fixed;bottom:0;left:0;right:0;background:#1C1C1A;color:white;padding:16px 24px;z-index:9999;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 -4px 24px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .4s ease;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#spick-cookie.show{transform:translateY(0)}
#spick-cookie p{font-size:13px;line-height:1.5;flex:1;min-width:200px;opacity:.9}
#spick-cookie a{color:#0F6E56;text-decoration:none}
.cookie-btns{display:flex;gap:10px;flex-shrink:0}
.cookie-accept{background:#0F6E56;color:white;border:none;padding:10px 22px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
.cookie-decline{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);padding:10px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit}
</style>
<div id="spick-cookie">
  <p>🍪 Vi använder cookies för att förbättra din upplevelse. Läs mer i vår <a href="integritetspolicy.html">integritetspolicy</a>.</p>
  <div class="cookie-btns">
    <button class="cookie-decline" onclick="cookieChoice(false)">Endast nödvändiga</button>
    <button class="cookie-accept" onclick="cookieChoice(true)">Acceptera alla</button>
  </div>
</div>
<script>
(function(){var c=document.getElementById('spick-cookie');if(!c)return;var ch=localStorage.getItem('spick-cookie-consent');if(!ch)setTimeout(function(){c.classList.add('show');},1500);})();
function cookieChoice(accept){localStorage.setItem('spick-cookie-consent',accept?'all':'necessary');var c=document.getElementById('spick-cookie');if(c){c.style.transform='translateY(100%)';setTimeout(function(){c.remove();},400);}if(accept&&window.gtag)gtag('consent','update',{analytics_storage:'granted',ad_storage:'granted'});}

// Touch-support för stjärnor på mobil
document.addEventListener('DOMContentLoaded', function() {
  const starsEl = document.getElementById('stars');
  if(!starsEl) return;
  starsEl.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = starsEl.getBoundingClientRect();
    const x = touch.clientX - rect.left;
    const starWidth = rect.width / 5;
    const starNum = Math.ceil(x / starWidth);
    if(starNum >= 1 && starNum <= 5 && typeof setRating === 'function') {
      setRating(starNum);
    }
  }, {passive: false});
});

const selectedAspects = new Set();
function toggleAspect(btn, aspect) {
  btn.classList.toggle('selected');
  if(selectedAspects.has(aspect)) selectedAspects.delete(aspect);
  else selectedAspects.add(aspect);
}
</script>

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Tack för din bokning – Spick</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--g:#0F6E56;--gm:#1D9E75;--gp:#E1F5EE;--gl:#9FE1CB;--b:#0E0E0E;--gr:#F7F7F5;--grd:#E8E8E4;--m:#6B6960;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--g);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border-radius:28px;padding:3.5rem;max-width:500px;width:100%;text-align:center;box-shadow:0 40px 80px rgba(0,0,0,.25);}
.check{width:88px;height:88px;background:var(--gp);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.75rem;font-size:2.5rem;}
h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--b);margin-bottom:.75rem;}
.sub{font-size:1rem;color:var(--m);line-height:1.7;margin-bottom:2rem;}
.steps{display:flex;gap:.75rem;margin-bottom:2rem;}
.step{flex:1;background:var(--gr);border-radius:12px;padding:1rem .75rem;text-align:center;}
.sn{width:28px;height:28px;background:var(--g);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;margin:0 auto .5rem;}
.st{font-size:.75rem;color:var(--m);line-height:1.4;}
.info{background:var(--gr);border-radius:14px;padding:1.25rem;margin-bottom:2rem;}
.ir{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--grd);font-size:.875rem;}
.ir:last-child{border:none;}
.ik{color:var(--m);}
.iv{font-weight:500;color:var(--b);}
.btns{display:flex;flex-direction:column;gap:.75rem;}
.btn-g{display:block;padding:.875rem;background:var(--g);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:.95rem;transition:background .2s;}
.btn-g:hover{background:var(--gm);}
.btn-o{display:block;padding:.875rem;background:var(--gp);color:var(--g);border-radius:12px;text-decoration:none;font-weight:600;font-size:.875rem;}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1>Bokning bekräftad!</h1>
  <p class="sub">Tack! Vi bekräftar din bokning inom 2 timmar via SMS och e-post.</p>
  <div class="steps">
    <div class="step"><div class="sn">1</div><div class="st">Bekräftelse via SMS</div></div>
    <div class="step"><div class="sn">2</div><div class="st">Städaren kontaktar dig</div></div>
    <div class="step"><div class="sn">3</div><div class="st">Betala via Swish efter</div></div>
  </div>
  <div class="info">
    <div class="ir"><span class="ik">📞 Frågor?</span><span class="iv">076-050 51 53</span></div>
    <div class="ir"><span class="ik">✉️ E-post</span><span class="iv">hello@spick.se</span></div>
    <div class="ir"><span class="ik">🔄 Avbokning</span><span class="iv">Gratis upp till 24h</span></div>
  </div>
  <div class="btns">
    <a href="stadare.html" class="btn-g">Boka en städare till →</a>
    <a href="index.html" class="btn-o">Tillbaka till startsidan</a>
  </div>
</div>
</body>
</html>

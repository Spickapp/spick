name: Bootstrap Prod Schema

# H19-fix (2026-04-24): schema-drift-check kräver prod-schema.sql
# som baseline i repo. Denna workflow dumpar nuvarande prod-schema
# och commitar som baseline. Körs EN gång manuellt, sen tar
# schema-drift-check över för löpande jämförelse.
#
# Efter första bootstrap: kör schema-drift-check för att se vilka
# migrations i repo saknas i prod (drift-fynd).

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref urjeijcncsyuletprydy

      - name: Dump prod-schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db dump --schema public -f prod-schema.sql
          SIZE=$(wc -c < prod-schema.sql)
          LINES=$(wc -l < prod-schema.sql)
          echo "Dump: $SIZE bytes, $LINES rader"
          if [ "$SIZE" -lt 1000 ]; then
            echo "::error::Dump verkar misstänkt liten — abort"
            exit 1
          fi

      - name: Upload schema som artifact
        uses: actions/upload-artifact@v4
        with:
          name: prod-schema-snapshot
          path: prod-schema.sql
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Bootstrap Prod Schema" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f prod-schema.sql ]; then
            SIZE=$(wc -c < prod-schema.sql)
            LINES=$(wc -l < prod-schema.sql)
            echo "- prod-schema.sql: **$SIZE bytes, $LINES rader**" >> $GITHUB_STEP_SUMMARY
            echo "- Uppladdad som artifact: **prod-schema-snapshot**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Nästa steg (Farhads hand)" >> $GITHUB_STEP_SUMMARY
            echo "1. Scrolla upp till denna körnings **Artifacts**-sektion" >> $GITHUB_STEP_SUMMARY
            echo "2. Ladda ner **prod-schema-snapshot.zip**" >> $GITHUB_STEP_SUMMARY
            echo "3. Extrahera \`prod-schema.sql\` till repo-root" >> $GITHUB_STEP_SUMMARY
            echo "4. \`git add prod-schema.sql && git commit -m \"chore: prod-schema baseline\" && git push\`" >> $GITHUB_STEP_SUMMARY
            echo "5. Kör 'Schema Drift Check' workflow" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ prod-schema.sql skapades inte" >> $GITHUB_STEP_SUMMARY
          fi

name: Bonus Level Check
on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:
jobs:
  bonus-check:
    runs-on: ubuntu-latest
    env:
      SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
      SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Check and upgrade bonus levels
        run: |
          CLEANERS=$(curl -s "${SUPA_URL}/rest/v1/cleaners?status=eq.godkänd&select=id,full_name,email,avg_rating,review_count,bonus_level" \
            -H "apikey: $SUPA_KEY" -H "Authorization: Bearer $SUPA_KEY")

          echo "$CLEANERS" | python3 << 'PYEOF'
import json, sys, os, urllib.request

SUPA_URL = os.environ['SUPA_URL']
SUPA_KEY = os.environ['SUPA_KEY']

d = json.load(sys.stdin)
if not isinstance(d, list):
    print("Inga städare hittades")
    sys.exit(0)

LEVELS = [
    ('Platinum', 301, 4.9),
    ('Guld',     101, 4.7),
    ('Silver',    21, 4.5),
    ('Brons',      0, 0.0),
]

def get_level(jobs, rating):
    for name, min_jobs, min_rating in LEVELS:
        if jobs >= min_jobs and (rating >= min_rating or min_rating == 0.0):
            return name
    return 'Brons'

for c in d:
    jobs   = c.get('review_count', 0) or 0
    rating = float(c.get('avg_rating', 0) or 0)
    cur    = c.get('bonus_level', 'Brons') or 'Brons'
    new    = get_level(jobs, rating)
    if new != cur:
        body = json.dumps({'bonus_level': new}).encode()
        url  = f"{SUPA_URL}/rest/v1/cleaners?id=eq.{c['id']}"
        req  = urllib.request.Request(url, body, {
            'Content-Type': 'application/json',
            'Authorization': f'Bearer {SUPA_KEY}',
            'apikey': SUPA_KEY,
            'Prefer': 'return=minimal'
        }, method='PATCH')
        try:
            urllib.request.urlopen(req, timeout=10)
            print(f"Uppgraderad {c['full_name']}: {cur} -> {new}")
        except Exception as e:
            print(f"Fel: {e}")
    else:
        print(f"OK {c['full_name']}: {cur}")

print("✅ Bonus check klar!")
PYEOF

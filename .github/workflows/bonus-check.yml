name: Bonus Level Check
on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:
jobs:
  bonus-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check and upgrade bonus levels
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/bonus_check.py

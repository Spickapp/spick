name: Nightly Backup & Health Check
'on':
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Backup Supabase data
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p backups
          DATE=$(date +%Y%m%d)

          for TABLE in bookings cleaners cleaner_applications reviews referrals subscriptions emails invoices gift_cards cleaner_availability analytics_events customer_profiles guarantee_requests; do
            curl -sf "$SUPA_URL/rest/v1/${TABLE}?select=*&limit=10000" \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -o "backups/${TABLE}_${DATE}.json" \
              && echo "✅ $TABLE" || echo "⚠️ $TABLE (kan vara tom)"
          done

          # Rensa backups äldre än 30 dagar
          find backups/ -name "*.json" -mtime +30 -delete
          echo "✅ Backup klar: $(date)"

      - name: Verifiera och komprimera backups
        run: |
          echo "=== Backup-verifiering ==="
          for f in backups/*_$(date +%Y%m%d).json; do
            SIZE=$(wc -c < "$f")
            ROWS=$(python3 -c "import json,sys; d=json.load(open('$f')); print(len(d) if isinstance(d,list) else 'N/A')" 2>/dev/null || echo "?")
            echo "  $f – $SIZE bytes – $ROWS rader"
            # Varna om fil är tom (kan tyda på RLS-problem)
            if [ "$SIZE" -lt 10 ]; then
              echo "  ⚠️ VARNING: $f är misstänkt liten – kontrollera RLS-policies"
            fi
          done
          
          # Statistik
          TOTAL=$(du -sh backups/ | cut -f1)
          COUNT=$(ls backups/*.json 2>/dev/null | wc -l)
          echo "Totalt: $COUNT filer, $TOTAL"

      - name: Commit backup
        run: |
          git config user.email "backup@spick.se"
          git config user.name "Spick Backup"
          git add -f backups/
          git diff --staged --quiet || git commit -m "Backup $(date +%Y-%m-%d) [skip ci]"
          git push || true

  health-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check spick.se
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://spick.se)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ spick.se är uppe!"
          else
            echo "❌ spick.se svarar med $STATUS"
            # Notifiera via Supabase
            curl -s -X POST "$SUPA_URL/functions/v1/notify" \
              -H "Content-Type: application/json" \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -d "{\"type\":\"uptime_alert\",\"record\":{\"message\":\"spick.se svarar med HTTP $STATUS\"}}"
            exit 1
          fi

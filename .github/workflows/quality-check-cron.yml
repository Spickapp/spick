name: Quality-check cron (T+24h follow-up, 2x/dag)
# Sprint 5 (forts.) — kör quality-check-cron 2x/dag för att fånga
# missnöjda kunder INNAN de blir dispute eller dåliga publika betyg.
#
# Pattern: identisk struktur som rating-reminder.yml.
# Skickar service_role JWT i Authorization + CRON_SECRET via x-cron-secret-header — verifieras via _shared/cron-auth.ts.
'on':
  schedule:
    # 2x/dag: 10:00 UTC (≈ 12 CET) + 18:00 UTC (≈ 20 CET)
    # Fönstret är 24-48h sedan completed_at, så två körningar/dygn räcker.
    - cron: '0 10 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch: {}

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör quality-check-cron
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/quality-check-cron" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::quality-check-cron failed with HTTP $HTTP_CODE"
            exit 1
          fi

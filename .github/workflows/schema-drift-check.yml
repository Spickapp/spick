name: Schema Drift Check

on:
  schedule:
    # Varje måndag 06:00 UTC (08:00 lokal tid)
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  issues: write
  contents: read

jobs:
  drift-check:
    name: Compare prod schema vs repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref urjeijcncsyuletprydy

      - name: Dump current prod schema
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db dump --schema public -f /tmp/prod-schema-current.sql
          echo "Dump size: $(wc -c < /tmp/prod-schema-current.sql) bytes"

      - name: Prepare schemas for comparison
        run: |
          # Enkel normalisering: ta bort tomma rader + normalisera line endings
          # Sortering är fel strategi för multi-line SQL-strukturer.
          # pg_dump är vanligtvis deterministisk inom samma projekt.

          prepare() {
            local input="$1"
            local output="$2"
            # Normalisera line endings och ta bort tomma rader
            tr -d '\r' < "$input" | grep -v '^[[:space:]]*$' > "$output"
          }

          prepare prod-schema.sql /tmp/repo-prepared.sql
          prepare /tmp/prod-schema-current.sql /tmp/prod-prepared.sql

          echo "Repo prepared: $(wc -l < /tmp/repo-prepared.sql) rader"
          echo "Prod prepared: $(wc -l < /tmp/prod-prepared.sql) rader"

      - name: Compare schemas
        id: diff
        run: |
          # Direkt diff utan sortering — pg_dump är deterministisk
          # inom samma projekt. Eventuella ordnings-skillnader är
          # edge case som hanteras manuellt.

          if diff -q /tmp/repo-prepared.sql /tmp/prod-prepared.sql > /dev/null; then
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            echo "✓ Ingen drift upptäckt — prod matchar repot"
          else
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
            echo "⚠ DRIFT UPPTÄCKT"

            # Spara unified diff för rapport
            diff -u /tmp/repo-prepared.sql /tmp/prod-prepared.sql > /tmp/drift-diff.txt || true

            # Räkna rader som skiljer (säkrad syntax)
            set +e
            added=$(grep -c "^+[^+]" /tmp/drift-diff.txt)
            if [ $? -ne 0 ]; then added=0; fi
            removed=$(grep -c "^-[^-]" /tmp/drift-diff.txt)
            if [ $? -ne 0 ]; then removed=0; fi
            set -e

            added=${added:-0}
            removed=${removed:-0}

            echo "Added lines: $added"
            echo "Removed lines: $removed"
            echo "added_lines=${added}" >> "$GITHUB_OUTPUT"
            echo "removed_lines=${removed}" >> "$GITHUB_OUTPUT"

            # Skapa summary för Issue body
            cat > /tmp/issue-body.md <<EOF
          ## Schema Drift Detected

          Automatic weekly check (schema-drift-check workflow) upptäckte skillnader mellan prod-databasen och \`prod-schema.sql\` i repot.

          ### Sammanfattning
          - **Rader tillagda i prod (+):** $added
          - **Rader borttagna från prod (-):** $removed

          ### Nästa steg
          1. Granska driften genom att köra lokalt:
             \`\`\`powershell
             supabase db dump --schema public -f prod-schema-new.sql
             git diff prod-schema.sql prod-schema-new.sql
             \`\`\`
          2. Om driften är **förväntad** (t.ex. ny migration applicerad):
             - Ersätt \`prod-schema.sql\` med den nya dumpen
             - Commita: \`chore: uppdatera prod-schema.sql (drift-check YYYY-MM-DD)\`
          3. Om driften är **oförväntad** (Studio-ändring utan migration):
             - Identifiera ändringen
             - Skapa retroaktiv migration enligt §2.1.1-mönstret
             - Uppdatera \`prod-schema.sql\`
          4. **Om drift bara är ordnings-skillnader från pg_dump**:
             - Uppdatera \`prod-schema.sql\` med senaste dumpen
             - Ingen migration behövs

          ### Workflow
          - Run: [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Tidpunkt: $(date -u '+%Y-%m-%d %H:%M UTC')

          ### Diff-sammanfattning (första 100 rader)

          \`\`\`diff
          $(head -n 100 /tmp/drift-diff.txt)
          \`\`\`

          ---

          *Detta issue skapades automatiskt av schema-drift-check workflow. Stäng när drift är hanterad.*
          EOF

            echo "Issue body sparad i /tmp/issue-body.md"
          fi

      - name: Create Issue on drift
        if: steps.diff.outputs.has_drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue-body.md', 'utf8');
            const today = new Date().toISOString().split('T')[0];

            // Kolla om det redan finns en öppen issue för schema-drift denna vecka
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'schema-drift'
            });

            if (existing.data.length > 0) {
              console.log(`${existing.data.length} existing schema-drift issue(s) already open. Skipping creation.`);
              // Kommentera på första existerande issue istället
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Update ${today}: drift fortfarande detekterad (run ${context.runId}). Se workflow för detaljer.`
              });
              return;
            }

            // Skapa ny issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Schema drift detected — ${today}`,
              body: body,
              labels: ['schema-drift', 'infrastructure']
            });
            console.log('Created new schema-drift issue');

      - name: Report no-drift status
        if: steps.diff.outputs.has_drift == 'false'
        run: |
          echo "✓ Workflow completed: no schema drift detected"
          echo "::notice title=Schema Check::prod-schema.sql matches current prod state"

name: Run SQL Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase link --project-ref $PROJECT_ID
      # Reparera: ta bort gamla version 20260325 från historiken (kördes manuellt)
      - run: supabase migration repair --status reverted 20260325 || true
      # Markera alla manuellt körda migrationer som applied
      - run: supabase migration repair --status applied 20260325000001 || true
      - run: supabase migration repair --status applied 20260325000002 || true
      - run: supabase migration repair --status applied 20260325000003 || true
      - run: supabase migration repair --status applied 20260325000004 || true
      - run: supabase migration repair --status applied 20260325000005 || true
      - run: supabase migration repair --status applied 20260325000006 || true
      - run: supabase migration repair --status applied 20260326000001 || true
      - run: supabase migration repair --status applied 20260326000002 || true
      # Pusha eventuella nya migrationer
      - run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

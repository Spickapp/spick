name: Run SQL Migrations
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migrations.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Debug - lista tillgängliga CLI-kommandon
        run: |
          supabase --version
          echo "--- db subkommandon ---"
          supabase db --help 2>&1 || true
          echo "--- migration subkommandon ---"
          supabase migration --help 2>&1 || true

      - name: Kör migrationer via Supabase Management API (curl)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT="urjeijcncsyuletprydy"
          API="https://api.supabase.com/v1/projects/$PROJECT/database/query"

          run_sql() {
            local label="$1"
            local sql="$2"
            echo "▶ Kör $label..."
            HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$API" \
              -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":$(python3 -c "import json,sys; print(json.dumps(sys.stdin.read()))" <<< "$sql")}")
            echo "HTTP $HTTP: $(cat /tmp/resp.json)"
            [ "$HTTP" = "200" ] && echo "✅ $label klar" || (echo "❌ $label misslyckades"; cat /tmp/resp.json; exit 1)
          }

          run_sql "004_alias" "$(cat supabase/migrations/004_alias.sql)"
          run_sql "005_data"  "$(cat supabase/migrations/005_data.sql)"
          run_sql "006_keys"  "$(cat supabase/migrations/006_keys.sql)"

      - name: Verifiera tabeller
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.supabase.com/v1/projects/urjeijcncsyuletprydy/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"SELECT table_name FROM information_schema.tables WHERE table_schema='"'"'public'"'"' AND table_name IN ('"'"'customer_profiles'"'"','"'"'analytics_events'"'"','"'"'key_methods'"'"','"'"'messages'"'"') ORDER BY table_name;"}' \
            | python3 -c "import json,sys; d=json.load(sys.stdin); [print('✅',r['table_name']) for r in d] if isinstance(d,list) else print(d)"

name: Run SQL Migrations
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migrations.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install psql
        run: sudo apt-get install -y postgresql-client -q

      - name: Run migrations via psql
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          export PGSSLMODE=require
          DB="postgresql://postgres.urjeijcncsyuletprydy:${SUPABASE_DB_PASSWORD}@aws-0-eu-north-1.pooler.supabase.com:6543/postgres"

          echo "▶ Testar anslutning..."
          psql "$DB" -c "SELECT NOW();" && echo "✅ Anslutning OK"

          echo "▶ Migration 004..."
          psql "$DB" -f supabase/migrations/004_alias.sql && echo "✅ 004 klar"

          echo "▶ Migration 005..."
          psql "$DB" -f supabase/migrations/005_data.sql && echo "✅ 005 klar"

          echo "▶ Migration 006..."
          psql "$DB" -f supabase/migrations/006_keys.sql && echo "✅ 006 klar"

      - name: Verify tables
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          export PGSSLMODE=require
          DB="postgresql://postgres.urjeijcncsyuletprydy:${SUPABASE_DB_PASSWORD}@aws-0-eu-north-1.pooler.supabase.com:6543/postgres"
          psql "$DB" -c "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('customer_profiles','analytics_events','key_methods','messages') ORDER BY table_name;"
          echo "✅ Verifiering klar"
 

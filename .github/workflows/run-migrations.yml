name: Run SQL Migrations
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migrations.yml'
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Visa CLI-version och tillgängliga db-kommandon
        run: |
          supabase --version
          supabase db --help 2>&1 || true

      - name: Länka projekt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref urjeijcncsyuletprydy \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}" 2>&1 || true
          echo "✅ Länkning klar"

      - name: Pusha migrationer
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db push 2>&1
          echo "✅ db push klar"

name: Run SQL Migrations

'on':
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link projekt
        run: supabase link --project-ref $PROJECT_ID

      - name: Markera alla befintliga migrationer som applied
        run: |
          for id in \
            001 002 003 004 005 006 007 008 009 010 \
            20260325000001 20260325000002 20260325000003 \
            20260325000004 20260325000005 20260325000006 \
            20260326000001 20260326000002 20260326000003 \
            20260326000004 20260326000005 \
            20260326100001 20260326200001 \
            20260326300001 20260326300002 \
            20260326400001 \
            20260326500001 20260326500002 20260326500003 \
            20260326600001 \
            20260326700001 \
            20260326800001 \
            20260327 \
            20260327000001 20260327100001 \
            20260327200001 20260327300001 \
            20260327400001 20260327500001 \
            20260327600001 20260327700001; do
            supabase migration repair --status applied "$id" 2>/dev/null || true
          done

      - name: Kör nya migrationer
        run: supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

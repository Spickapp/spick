name: Run SQL Migrations
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migrations.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Check available CLI commands
        run: supabase --version && supabase db --help 2>&1 | head -20

      - name: Run migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT="urjeijcncsyuletprydy"

          # Kör varje migration som inline SQL via supabase db execute
          echo "▶ Migration 004..."
          supabase db execute --project-ref $PROJECT < supabase/migrations/004_alias.sql \
            && echo "✅ 004 klar" || echo "⚠️ 004 (möjligen redan körd)"

          echo "▶ Migration 005..."
          supabase db execute --project-ref $PROJECT < supabase/migrations/005_data.sql \
            && echo "✅ 005 klar" || echo "⚠️ 005 (möjligen redan körd)"

          echo "▶ Migration 006..."
          supabase db execute --project-ref $PROJECT < supabase/migrations/006_keys.sql \
            && echo "✅ 006 klar" || echo "⚠️ 006 (möjligen redan körd)"

      - name: Verify tables
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref urjeijcncsyuletprydy \
            <<< "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('customer_profiles','analytics_events','key_methods','messages') ORDER BY table_name;"
          echo "✅ Verifiering klar"

name: Run SQL Migrations
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/run-migrations.yml'

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run Migration 004
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref urjeijcncsyuletprydy \
            --file supabase/migrations/004_alias.sql
          echo "✅ 004 klar"

      - name: Run Migration 005
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref urjeijcncsyuletprydy \
            --file supabase/migrations/005_data.sql
          echo "✅ 005 klar"

      - name: Run Migration 006
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref urjeijcncsyuletprydy \
            --file supabase/migrations/006_keys.sql
          echo "✅ 006 klar"

      - name: Verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase db execute --project-ref urjeijcncsyuletprydy \
            --sql "SELECT table_name FROM information_schema.tables WHERE table_schema='public' AND table_name IN ('customer_profiles','analytics_events','key_methods','messages') ORDER BY table_name;"
          echo "✅ Verifiering klar"

name: Run SQL Migrations

'on':
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link projekt
        run: supabase link --project-ref $PROJECT_ID

      - name: Repair schema_migrations (idempotent)
        # Dynamisk repair-lista — scannar top-level supabase/migrations/*.sql
        # och markerar varje som applied. Säkerhetsnät ifall schema_migrations
        # skulle komma ur sync (backup-restore, manuell Studio-INSERT, etc).
        # Inga fel vid redan-applied versioner — repair är idempotent.
        # 2>/dev/null sväljer bara stderr-brus, inte exit-koder.
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            [ -f "$f" ] || continue
            basename=$(basename "$f" .sql)
            version="${basename%%_*}"
            echo "Repair: $version"
            supabase migration repair --status applied "$version" 2>/dev/null || \
              echo "  (already applied or skipped)"
          done

      - name: Kör nya migrationer
        # Ingen '|| exit 0' — om db push misslyckas vill vi veta.
        run: |
          set -e
          supabase db push --password "${{ secrets.SUPABASE_DB_PASSWORD }}"

name: Dispute SLA-check (1 ggr/dag)
# Etapp 1 IO-fix 2026-04-25: ändrat från varje timme till 1 ggr/dag.
# Spara ~96% IO. Vid låg dispute-volym är hourly överkill. SLA-warnings
# batchas och skickas 09:05 UTC (vardag-morgon). Vid hög dispute-volym
# återställ till hourly.
'on':
  schedule:
    - cron: '5 9 * * *'
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör dispute-sla-check
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/dispute-sla-check" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::dispute-sla-check failed with HTTP $HTTP_CODE"
          fi

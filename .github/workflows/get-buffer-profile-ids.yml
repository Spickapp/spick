name: Hämta Buffer Profile IDs

on:
  workflow_dispatch:

jobs:
  get-ids:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    steps:
      - name: Hämta Buffer-profiler
        env:
          BUFFER_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
        run: |
          if [ -z "$BUFFER_TOKEN" ]; then
            echo "⚠️ BUFFER_ACCESS_TOKEN ej konfigurerat"
            echo "Känd kanal-ID från Buffer: 69c417e0af47dacb69542274 (Spick.se)"
            echo "Hämta din access token: https://buffer.com/developers/apps"
            exit 0
          fi
          echo "=== Buffer profil-IDs ==="
          curl -s "https://api.buffer.com/1/profiles.json?access_token=$BUFFER_TOKEN" | \
            python3 -c "
import sys, json
try:
    profiles = json.load(sys.stdin)
    if isinstance(profiles, list):
        for p in profiles:
            print(f\"ID: {p.get('id')} | Service: {p.get('service')} | Konto: {p.get('service_username')}\")
    else:
        print('Svar:', json.dumps(profiles, indent=2)[:500])
except Exception as e:
    print('Fel:', e)
" || echo "Kunde ej hämta profiler"

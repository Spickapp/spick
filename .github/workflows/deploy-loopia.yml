name: Deploy till Loopia via FTP
# INAKTIVERAD - sajten körs på GitHub Pages med SSL
# Loopia används endast som DNS-leverantör
on:
  workflow_dispatch:  # Kör bara manuellt vid behov

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Deploy till Loopia via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftpcluster.loopia.se
          username: ${{ secrets.LOOPIA_FTP_USER }}
          password: ${{ secrets.LOOPIA_FTP_PASS }}
          server-dir: /spick.se/public_html/
          protocol: ftp
          port: 21
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/archive/**
            **/backups/**
            **/docs/**
            **/supabase/**
            **/.github/**

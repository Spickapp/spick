name: Deploy till Loopia via FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Deploy till Loopia via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.loopia.se
          username: ${{ secrets.LOOPIA_FTP_USER }}
          password: ${{ secrets.LOOPIA_FTP_PASS }}
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/backups/**
            **/*.md
            **/.github/**
            **/supabase/**
            **/files1.zip

      - name: Deploy klar!
        run: echo "spick.se uppdaterad via Loopia FTP!"

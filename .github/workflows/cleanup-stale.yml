name: Cleanup Stale Bookings
# Etapp 1 IO-fix 2026-04-25: ändrat från varje timme till var 6:e.
# Spara ~83% IO. Pending bookings >30 min raderas — 6 h vs 1 h ger
# marginell extra-fönster för zombie-pending men ingen faktisk påverkan
# på kund (de är redan över abandonment-trösken).
'on':
  schedule:
    - cron: '0 */6 * * *'    # Var 6:e timme (00, 06, 12, 18 UTC)
  workflow_dispatch: {}      # Manuell trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call cleanup Edge Function
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/cleanup-stale")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Cleanup failed with HTTP $HTTP_CODE"
            exit 1
          fi

name: Cleanup Stale Bookings
'on':
  schedule:
    - cron: '0 * * * *'    # Varje hel timme (spara Actions-minuter)
  workflow_dispatch: {}      # Manuell trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Call cleanup Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/cleanup-stale")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::Cleanup failed with HTTP $HTTP_CODE"
            exit 1
          fi

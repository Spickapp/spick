name: Inject GA4 + Meta Pixel
on:
  workflow_dispatch:
    inputs:
      ga4_id:
        description: 'GA4 Mätnings-ID (t.ex. G-XXXXXXXXXX)'
        required: true
      meta_pixel_id:
        description: 'Meta Pixel ID (t.ex. 1234567890)'
        required: true

permissions:
  contents: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Inject tracking i alla HTML-filer
        run: |
          GA="${{ github.event.inputs.ga4_id }}"
          PIXEL="${{ github.event.inputs.meta_pixel_id }}"
          
          SNIPPET="  <!-- Google Analytics GA4 -->\n  <script async src=\"https://www.googletagmanager.com/gtag/js?id=$GA\"></script>\n  <script>\n    window.dataLayer = window.dataLayer || [];\n    function gtag(){dataLayer.push(arguments);}\n    gtag('js', new Date());\n    gtag('config', '$GA');\n  </script>\n  <!-- Meta Pixel -->\n  <script>\n    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?\n    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;\n    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;\n    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,\n    document,'script','https://connect.facebook.net/en_US/fbevents.js');\n    fbq('init', '$PIXEL');\n    fbq('track', 'PageView');\n  </script>\n  <noscript><img height=\"1\" width=\"1\" style=\"display:none\"\n    src=\"https://www.facebook.com/tr?id=$PIXEL&ev=PageView&noscript=1\"/></noscript>"
          
          CONVERTED=0
          for f in *.html; do
            # Hoppa över filer som redan har GA4
            if grep -q "googletagmanager.com/gtag" "$f"; then
              echo "SKIP (already has GA4): $f"
              continue
            fi
            # Injicera före </head>
            if grep -q "</head>" "$f"; then
              sed -i "s|</head>|$SNIPPET\n</head>|" "$f"
              echo "INJECTED: $f"
              CONVERTED=$((CONVERTED + 1))
            fi
          done
          echo "Klart! Injicerade i $CONVERTED filer."

      - name: Spara bokningskonvertering i tack.html
        run: |
          GA="${{ github.event.inputs.ga4_id }}"
          if grep -q "gtag" "tack.html"; then
            # Lägg till konverteringshändelse
            sed -i "s|gtag('config', '$GA');|gtag('config', '$GA');\n    gtag('event', 'conversion', {'send_to': '$GA', 'event_category': 'booking', 'event_label': 'booking_complete'});|" tack.html
            echo "Konvertering tillagd i tack.html"
          fi

      - name: Commit och push
        run: |
          git config user.email "hello@spick.se"
          git config user.name "Spick Bot"
          git add -A
          git diff --cached --quiet || git commit -m "Inject GA4 + Meta Pixel i alla sidor"
          git push

name: 'Content Engine – Daily Posts'

'on':
  # INAKTIVERAD CRON: auto-post-daily.yml hanterar daglig posting via Buffer
  # Denna workflow anropar social-media Edge Function (AI-genererat innehåll)
  # Kör manuellt vid behov, eller aktivera cron på annan tid om båda behövs
  # schedule:
  #   - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      preview:
        description: 'Preview only (true/false)'
        default: 'false'
      pillar:
        description: 'Force pillar (tips/transformation/trust/rut/bts)'
        default: ''
      platform:
        description: 'Force platform (facebook/instagram)'
        default: ''

jobs:
  post-daily:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Generate & post daily content
        run: |
          PREVIEW="${{ github.event.inputs.preview || 'false' }}"
          PILLAR="${{ github.event.inputs.pillar || '' }}"
          PLATFORM="${{ github.event.inputs.platform || '' }}"
          
          # Build JSON body
          BODY="{\"preview\": $PREVIEW"
          [ -n "$PILLAR" ] && BODY="$BODY, \"pillar\": \"$PILLAR\""
          [ -n "$PLATFORM" ] && BODY="$BODY, \"platform\": \"$PLATFORM\""
          BODY="$BODY}"
          
          echo "Request: $BODY"
          
          RESPONSE=$(curl -s -X POST \
            "https://urjeijcncsyuletprydy.supabase.co/functions/v1/social-media" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -d "$BODY")
          
          echo "Response: $RESPONSE"
          
          # Extract status
          OK=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok',False))" 2>/dev/null || echo "false")
          PILLAR_USED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('pillar','?'))" 2>/dev/null || echo "?")
          PLATFORM_USED=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('platform','?'))" 2>/dev/null || echo "?")
          
          echo "✅ Pillar: $PILLAR_USED | Platform: $PLATFORM_USED | OK: $OK"
          
          if [ "$OK" != "True" ] && [ "$PREVIEW" = "false" ]; then
            echo "⚠️ Post may have failed"
          fi

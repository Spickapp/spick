name: Team SMS Notifications
'on':
  schedule:
    - cron: '11 16 * * *'  # 16:00 UTC = 18:00 svensk sommartid (kvällen innan — imorgon)
    - cron: '23 6 * * *'   # 06:00 UTC = 08:00 svensk sommartid (morgon — idag)
  workflow_dispatch:
    inputs:
      mode:
        description: 'evening (imorgon) eller morning (idag)'
        required: true
        default: 'evening'
        type: choice
        options:
          - evening
          - morning

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Determine mode from cron
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "mode=evening" >> $GITHUB_OUTPUT
          else
            echo "mode=morning" >> $GITHUB_OUTPUT
          fi

      - name: Send team SMS (${{ steps.mode.outputs.mode }})
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/team-sms-notify" \
            -d "{\"mode\":\"$MODE\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Mode: $MODE"
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::team-sms-notify failed with HTTP $HTTP_CODE"
            exit 1
          fi

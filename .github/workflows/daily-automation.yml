name: Daily Automation
on:
  schedule:
    - cron: '0 7 * * *'  # 08:00 svensk tid (UTC+2 sommar)
  workflow_dispatch:

jobs:
  daily:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Run daily automation
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 .github/scripts/daily_automation.py

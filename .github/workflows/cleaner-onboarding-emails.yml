name: Cleaner onboarding-emails (1x/dag 09:00 CET)
# Sprint 1D — kör cleaner-onboarding-emails-cron 1x/dag 07:00 UTC
# (≈ 09:00 CET vinter, 09:00 CEST sommartid). EF:n loopar approved
# cleaners och skickar nästa-mail-i-sekvens (max 1/cleaner/dag).
#
# Pattern: identisk struktur som rating-reminder.yml. Bearer
# CRON_SECRET verifieras via _shared/cron-auth.ts.
'on':
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kör cleaner-onboarding-emails
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/cleaner-onboarding-emails" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::cleaner-onboarding-emails failed with HTTP $HTTP_CODE"
            exit 1
          fi

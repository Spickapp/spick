name: Set Supabase Edge Function Secrets
'on':
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/set-secrets.yml'

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set VAPID secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "⚠️  SUPABASE_ACCESS_TOKEN saknas i GitHub Secrets"
            echo "Gå till: https://supabase.com/dashboard/account/tokens"
            echo "Skapa en token och lägg till som GitHub Secret: SUPABASE_ACCESS_TOKEN"
            exit 0
          fi

          supabase secrets set \
            VAPID_PUBLIC_KEY=BFq-Saij81SXRzVsPmNgFBOLPD7CeokFSSszEKTKBFzs2rOzKHSpf9nNYMERDKAdXiNNm2PDNRFJnZtLWPnSdH4 \
            VAPID_PRIVATE_KEY=9-qIkV5sEL1JpuFyypvOWnGKKJ1XDgdZlZBFKzTn9eE \
            RESEND_API_KEY=re_KxTTppVD_MZkRApNRrB236wNTFZ32vfdB \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --project-ref urjeijcncsyuletprydy

          echo "✅ Supabase secrets satta!"
          supabase secrets list --project-ref urjeijcncsyuletprydy
 
 

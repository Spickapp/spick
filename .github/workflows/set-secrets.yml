name: Set Supabase Secrets
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/set-secrets.yml'

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set all Supabase Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            VAPID_PUBLIC_KEY=BFq-Saij81SXRzVsPmNgFBOLPD7CeokFSSszEKTKBFzs2rOzKHSpf9nNYMERDKAdXiNNm2PDNRFJnZtLWPnSdH4 \
            VAPID_PRIVATE_KEY=9-qIkV5sEL1JpuFyypvOWnGKKJ1XDgdZlZBFKzTn9eE \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --project-ref urjeijcncsyuletprydy
          echo "✅ Supabase Edge Function secrets satta!"

      - name: List secrets to verify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets list --project-ref urjeijcncsyuletprydy

name: UI Monitor – Playwright
'on':
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'   # Var 6:e timme dygnet runt
  workflow_dispatch:

jobs:
  ui-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Installera Python + Playwright
        run: |
          pip install playwright --break-system-packages
          python3 -m playwright install chromium --with-deps

      - name: Kör UI-monitor
        env:
          SUPA_ANON: ${{ secrets.SUPABASE_ANON_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 .github/scripts/ui_monitor.py

      - name: Skicka varning vid fel
        if: failure()
        run: |
          echo "❌ UI-monitor misslyckades – varningsmail skickat till hello@spick.se"

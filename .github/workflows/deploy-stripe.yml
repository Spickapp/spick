name: Deploy Stripe Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/stripe-checkout/**'
      - 'supabase/functions/stripe-webhook/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.22.6/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Deploy stripe-checkout
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy stripe-checkout \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy stripe-webhook \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt

      - name: Set Stripe secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref urjeijcncsyuletprydy
          echo "✅ Stripe functions deployed $(date '+%H:%M')"

name: 'Deploy Stripe Functions'

'on':
  push:
    paths:
      - 'supabase/functions/stripe-checkout/**'
      - 'supabase/functions/stripe-webhook/**'
      - 'supabase/migrations/20260325_stripe_payments.sql'
  workflow_dispatch:

jobs:
  deploy-stripe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy stripe-checkout function
        run: |
          supabase functions deploy stripe-checkout \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy stripe-webhook function
        run: |
          supabase functions deploy stripe-webhook \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run payment migration
        run: |
          supabase db push \
            --project-ref urjeijcncsyuletprydy \
            --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Stripe secrets in Supabase
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref urjeijcncsyuletprydy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Confirm deploy
        run: echo "✅ Stripe-funktioner driftsatta kl $(date '+%H:%M %Z')"

name: Deploy Stripe Edge Functions

on:
  push:
    paths:
      - 'supabase/functions/stripe-checkout/**'
      - 'supabase/functions/stripe-webhook/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy stripe-checkout
        run: supabase functions deploy stripe-checkout --project-ref $PROJECT_ID --no-verify-jwt
      - name: Deploy stripe-webhook
        run: supabase functions deploy stripe-webhook --project-ref $PROJECT_ID --no-verify-jwt
      - name: Set Stripe secrets
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref $PROJECT_ID

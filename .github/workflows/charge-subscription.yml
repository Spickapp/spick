name: Debitera prenumerationer (dagligen 20:00 CET)
'on':
  schedule:
    - cron: '13 18 * * *'  # 18:00 UTC = 20:00 CET
  workflow_dispatch: {}

jobs:
  charge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Debitera morgondagens bokningar
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/charge-subscription-booking" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Charge failed with HTTP $HTTP_CODE"
            exit 1
          fi

name: Preference Learn Favorite (dagligen 06:00 CET)
'on':
  schedule:
    - cron: '0 4 * * *'  # 04:00 UTC = 06:00 CET — innan auto-rebook så att nya subs använder uppdaterad favorit
  workflow_dispatch: {}

jobs:
  learn:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kör preference-learn-favorite
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/preference-learn-favorite" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::preference-learn-favorite failed with HTTP $HTTP_CODE"
            exit 1
          fi

name: Company URL monitor (1x/dag 03:30 UTC)
# Verifierar varje aktivt företags landningssida (boka.html?company=X) fungerar.
# Kontrollerar: cleaners-medlemmar finns + services > 0 + matching-wrapper svarar.
# Komplement till F6-e2e-test (1 hardcoded company) — denna täcker ALLA aktiva.
'on':
  schedule:
    - cron: '30 3 * * *'  # 03:30 UTC (efter synthetic-monitor 03:00, innan lighthouse 04:00)
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kör company-url-monitor
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/company-url-monitor" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::company-url-monitor failed with HTTP $HTTP_CODE"
            exit 1
          fi

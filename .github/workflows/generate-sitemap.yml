name: Generate Sitemap
'on':
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generera sitemap.xml
        run: |
          DATE=$(date +%Y-%m-%d)
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          for f in *.html; do
            [[ "$f" == "admin.html" || "$f" == "404.html" || "$f" == "tack.html" \
            || "$f" == "index_1.html" || "$f" == "cookie-banner.html" \
            || "$f" == "seo-snippet.html" || "$f" == "sakerhetsplan.html" \
            || "$f" == "marknadsanalys.html" || "$f" == "data-dashboard.html" \
            || "$f" == "intern-kalkyl.html" || "$f" == "kalkyl-stadare.html" \
            || "$f" == "betygsatt.html" || "$f" == "presentkort-tack.html" ]] && continue
            PAGE="${f%.html}"
            [[ "$PAGE" == "index" ]] && URL="https://spick.se/" || URL="https://spick.se/$PAGE"
            # Sätt prioritet baserat på sidtyp
            PRIORITY="0.7"
            case "$PAGE" in
              "" | "index") PRIORITY="1.0" ;;
              "stadare" | "boka" | "bli-stadare") PRIORITY="0.9" ;;
              "priser" | "hur-det-funkar" | "faq") PRIORITY="0.8" ;;
              stockholm | goteborg | malmo | uppsala) PRIORITY="0.85" ;;
            esac
            echo "  <url><loc>$URL</loc><lastmod>$DATE</lastmod><changefreq>weekly</changefreq><priority>$PRIORITY</priority></url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml
          echo "✅ Sitemap: $(grep -c '<url>' sitemap.xml) sidor"

      - name: Commit sitemap
        run: |
          git config user.email "hello@spick.se"
          git config user.name "Spick Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Spickapp/spick.git
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-update sitemap.xml [skip ci]"
          git push

      - name: Ping sökmotorer om sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://spick.se/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://spick.se/sitemap.xml" || true
          echo "✅ Sökmotorer pingade"

name: Generate Sitemap
'on':
  push:
    branches: [main]
    paths-ignore:
      - 'sitemap.xml'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sitemap:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generera sitemap.xml
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          for f in *.html; do
            # Glob-exclude admin-* + _f1_test (audit-fix 2026-04-26)
            [[ "$f" == admin-* || "$f" == _f1_test* || "$f" == _* ]] && continue
            [[ "$f" == "admin.html" || "$f" == "404.html" || "$f" == "tack.html" \
            || "$f" == "index_1.html" || "$f" == "cookie-banner.html" \
            || "$f" == "seo-snippet.html" || "$f" == "sakerhetsplan.html" \
            || "$f" == "marknadsanalys.html" || "$f" == "data-dashboard.html" \
            || "$f" == "intern-kalkyl.html" || "$f" == "kalkyl-stadare.html" \
            || "$f" == "betygsatt.html" || "$f" == "presentkort-tack.html" \
            || "$f" == "stadare-dashboard.html" || "$f" == "stadare-uppdrag.html" \
            || "$f" == "min-bokning.html" || "$f" == "mitt-konto.html" \
            || "$f" == "noshow-refund.html" \
            || "$f" == "spark.html" || "$f" == "prenumerera.html" \
            || "$f" == "stadare-checklista.html" || "$f" == "stadare-guide.html" \
            || "$f" == "stadare-handbok.html" || "$f" == "stadare-test.html" \
            || "$f" == "skatt-utbetalningar.html" || "$f" == "boka-igen.html" \
            || "$f" == "bankid-klar.html" || "$f" == "ai-support.html" \
            || "$f" == "google363231d5ff56bd63.html" || "$f" == "stadare.html" ]] && continue
            PAGE="${f%.html}"
            [[ "$PAGE" == "index" ]] && URL="https://spick.se/" || URL="https://spick.se/${PAGE}.html"
            # Sätt prioritet baserat på sidtyp
            PRIORITY="0.7"
            case "$PAGE" in
              "" | "index") PRIORITY="1.0" ;;
              "stadare" | "boka" | "bli-stadare") PRIORITY="0.9" ;;
              "priser" | "hur-det-funkar" | "faq") PRIORITY="0.8" ;;
              stockholm | goteborg | malmo | uppsala) PRIORITY="0.85" ;;
            esac
            echo "  <url><loc>$URL</loc><lastmod>$DATE</lastmod><changefreq>weekly</changefreq><priority>$PRIORITY</priority></url>" >> sitemap.xml
          done
          # Blogg-sidor
          for f in blogg/*.html; do
            [[ "$f" == "blogg/index.html" ]] && continue
            PAGE="${f%.html}"
            URL="https://spick.se/${PAGE}.html"
            echo "  <url><loc>$URL</loc><lastmod>$DATE</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>" >> sitemap.xml
          done
          # Bloggindex
          echo "  <url><loc>https://spick.se/blogg/</loc><lastmod>$DATE</lastmod><changefreq>weekly</changefreq><priority>0.7</priority></url>" >> sitemap.xml

          # ── Sprint 4C (2026-04-26): Stad+Tjänst-aggregat-sidor ──
          # 5 städer × 5 tjänster = 25 SEO-landningssidor.
          # Källa: SUPPORTED_CITIES + SUPPORTED_SERVICES i
          # supabase/functions/seo-page-stad-tjanst/index.ts.
          # Listan här MÅSTE hållas synkad med EF — om EF utökas, lägg
          # till motsvarande slugs här (annars indexeras inte de nya).
          echo "  <!-- Stad+Tjänst SEO-aggregat (Sprint 4) -->" >> sitemap.xml
          for stad in stockholm goteborg malmo uppsala linkoping; do
            for tjanst in hemstadning storstadning flyttstadning fonsterputs kontorsstadning; do
              echo "  <url><loc>https://spick.se/${tjanst}-${stad}</loc><lastmod>$DATE</lastmod><changefreq>weekly</changefreq><priority>0.8</priority></url>" >> sitemap.xml
            done
          done

          # ── Sprint B4 (2026-04-26): Profil-URLs ──
          # Hämtar aktiva städare + företag från Supabase via REST + ANON_KEY
          # (publik info, ingen RLS-bypass behövs). VD-profiler (is_company_owner)
          # exkluderas — VD-canonical pekar ändå till /f/<slug> (Sprint Prof-5).
          # Teammedlemmar (company_id NOT NULL && is_company_owner=false) inkluderas
          # eftersom de har egna /s/<slug>-profiler.
          if [ -n "$SUPA_ANON_KEY" ]; then
            echo "  <!-- Profil-URLs (cleaner /s/) -->" >> sitemap.xml
            # Filtrera ut VD-profiler (is_company_owner=true) — de redirectar
            # till /f/<slug> och dubbelindexering ger SEO-straff (Sprint Prof-5).
            curl -sS "${SUPA_URL}/rest/v1/v_cleaners_public?select=slug,is_company_owner&is_approved=eq.true&status=eq.aktiv&slug=not.is.null" \
              -H "apikey: $SUPA_ANON_KEY" \
              -H "Authorization: Bearer $SUPA_ANON_KEY" \
              | jq -r --arg date "$DATE" '.[] | select(.is_company_owner != true and .slug != null) | "  <url><loc>https://spick.se/s/\(.slug)</loc><lastmod>\($date)</lastmod><changefreq>weekly</changefreq><priority>0.6</priority></url>"' \
              >> sitemap.xml || echo "  <!-- WARN: cleaner-profile-fetch failed -->" >> sitemap.xml

            echo "  <!-- Foretag-URLs (/f/) -->" >> sitemap.xml
            curl -sS "${SUPA_URL}/rest/v1/companies?select=slug&slug=not.is.null" \
              -H "apikey: $SUPA_ANON_KEY" \
              -H "Authorization: Bearer $SUPA_ANON_KEY" \
              | jq -r --arg date "$DATE" '.[] | select(.slug != null) | "  <url><loc>https://spick.se/f/\(.slug)</loc><lastmod>\($date)</lastmod><changefreq>weekly</changefreq><priority>0.7</priority></url>"' \
              >> sitemap.xml || echo "  <!-- WARN: company-fetch failed -->" >> sitemap.xml
          else
            echo "  <!-- SKIP: SUPABASE_ANON_KEY saknas - profil-URLs ej genererade -->" >> sitemap.xml
          fi

          echo '</urlset>' >> sitemap.xml
          echo "✅ Sitemap: $(grep -c '<url>' sitemap.xml) sidor"

      - name: Commit sitemap
        run: |
          git config user.email "hello@spick.se"
          git config user.name "Spick Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Spickapp/spick.git
          git add sitemap.xml
          git diff --cached --quiet || git commit -m "Auto-update sitemap.xml [skip ci]"
          git push

      - name: Ping sökmotorer om sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://spick.se/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://spick.se/sitemap.xml" || true
          echo "✅ Sökmotorer pingade"

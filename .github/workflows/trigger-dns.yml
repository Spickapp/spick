name: Trigger DNS Fix
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-dns.yml'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Kör DNS fix direkt
        env:
          U: ${{ secrets.LOOPIA_API_USER }}
          P: ${{ secrets.LOOPIA_API_PASS }}
        run: |
          api() { curl -s -X POST https://api.loopia.se/RPCSERV \
            -H "Content-Type: text/xml" -d "$1"; }

          add_a() {
            echo "➕ A-post: $1"
            api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><name>type</name><value><string>A</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }

          remove_a() {
            echo "➖ Tar bort A-post: $1"
            api "<?xml version='1.0'?><methodCall><methodName>removeZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><name>type</name><value><string>A</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }

          add_cname() {
            echo "➕ CNAME: $1 → $2"
            api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string>$1</string></value></param><param><value><struct><member><name>type</name><value><string>CNAME</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$2</string></value></member></struct></value></param></params></methodCall>"
          }

          echo "=== 1. Tar bort gamla Loopia A-poster ==="
          for IP in "194.9.94.85" "194.9.94.86" "75.2.60.5" "99.83.190.102"; do
            remove_a "$IP"
          done

          echo "=== 2. Lägger till GitHub Pages A-poster ==="
          add_a "185.199.108.153"
          add_a "185.199.109.153"
          add_a "185.199.110.153"
          add_a "185.199.111.153"

          echo "=== 3. Lägger till www CNAME ==="
          add_cname "www" "spickapp.github.io."

          echo "=== 4. Verifierar nuvarande records ==="
          sleep 3
          RESULT=$(api "<?xml version='1.0'?><methodCall><methodName>getZoneRecords</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param></params></methodCall>")
          echo "$RESULT" | grep -o '<string>[^<]*</string>' | grep -v "^<string></string>$"

          echo "✅ DNS uppdaterat! spick.se → GitHub Pages"
          echo "⏳ Propagering tar 1-24h (vanligtvis 15-30 min)"

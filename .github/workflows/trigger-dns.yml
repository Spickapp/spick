name: Trigger DNS Fix
'on':
  push:
    branches: [main]
    paths:
      - '.github/workflows/trigger-dns.yml'
      - '.github/scripts/dns_full_fix.py'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Kör komplett DNS-fix
        env:
          LOOPIA_USER: ${{ secrets.LOOPIA_API_USER }}
          LOOPIA_PASS: ${{ secrets.LOOPIA_API_PASS }}
        run: |
          python3 .github/scripts/dns_full_fix.py

name: Weekly Business Report
'on':
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generera och skicka veckorapport
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/weekly_report.py

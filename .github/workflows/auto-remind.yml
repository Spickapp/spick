name: Auto-remind (var 15 min)
# 2026-04-27 (Farhad-mandate): bytt från 2 ggr/dag → var 15 min.
# Tidigare 2 ggr/dag betydde att 90-min auto-timeout kunde vänta upp
# till 6h innan trigger. För live-bokningar (kunden väntar nu) måste
# auto-cancel + refund ske inom minuter, inte timmar.
# IO-impakt: ~96 körningar/dag istället för 2. Acceptabelt — varje
# körning idle-loopar genom ~5 bokningar och returnerar på <1s om inget
# att göra. Idempotency-keys på Stripe-refund + reminders_sent[]-array
# på bokningen säkrar att inget skickas/refundas dubbelt.
'on':
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör auto-remind
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/auto-remind" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Auto-remind failed with HTTP $HTTP_CODE"
            exit 1
          fi

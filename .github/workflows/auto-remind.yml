name: Auto-remind (2 ggr/dag)
# Etapp 1 IO-fix 2026-04-25: ändrat från 30-min till 2 ggr/dag. Spara
# ~95% IO. Påminnelser går ut max 6-8 h efter optimal tidpunkt — fortfarande
# nyttigt för 24h-före-bokning-påminnelser.
'on':
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör auto-remind
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/auto-remind" \
            -d '{}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::Auto-remind failed with HTTP $HTTP_CODE"
          fi

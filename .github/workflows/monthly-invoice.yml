name: Monthly Invoice Report
on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:
jobs:
  invoice:
    runs-on: ubuntu-latest
    env:
      SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
      SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Generate monthly report
        run: |
          MONTH=$(date -d 'last month' '+%Y-%m')
          echo "Generating report for $MONTH"
          curl -s "${SUPA_URL}/functions/v1/swift-endpoint" \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"type\":\"monthly_report\",\"month\":\"$MONTH\"}"
          echo "Monthly invoice report done!"
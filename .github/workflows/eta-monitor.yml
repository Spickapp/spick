name: ETA monitor (var 5:e min)
# Smart-ETA: påminner cleaner att trycka 'På väg' 15 min före slot,
# eskalerar till VD om städaren är försenad >10 min utan check-in,
# pingar cleaner med predicted_arrival_at-bokningar 30 min före.
'on':
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör eta-monitor
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/eta-monitor" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::eta-monitor failed with HTTP $HTTP_CODE"
          fi

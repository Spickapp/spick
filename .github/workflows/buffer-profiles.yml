name: 'Hämta Buffer Profile IDs'

'on':
  workflow_dispatch:

jobs:
  get-profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Hämta Buffer profiler
        run: |
          echo "=== Buffer profiler ==="
          RESP=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.BUFFER_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.buffer.com/1/profiles.json")
          echo "Råsvar: $RESP"
          echo "$RESP" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list):
                  for p in data:
                      print(f\">>> ID: {p.get('id','')} | Service: {p.get('service','')} | Name: {p.get('service_username','')}\")
              else:
                  print('Svar:', json.dumps(data, indent=2))
          except Exception as e:
              print('Parse-fel:', e)
          " || true

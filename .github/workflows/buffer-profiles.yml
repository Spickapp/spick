name: 'Hämta Buffer Profile IDs'

'on':
  workflow_dispatch:

jobs:
  get-profiles:
    runs-on: ubuntu-latest
    steps:
      - name: Hämta Buffer profiler
        run: |
          echo "=== Buffer profiler ==="
          curl -s "https://api.bufferapp.com/1/profiles.json?access_token=${{ secrets.BUFFER_ACCESS_TOKEN }}" | python3 -c "
          import sys, json
          profiles = json.load(sys.stdin)
          for p in profiles:
              print(f\"ID: {p['id']} | Service: {p['service']} | Name: {p.get('service_username','')}\")
          "

name: Monthly Invoice Generator
'on':
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Generera och skicka manadsfakturor
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: python3 .github/scripts/monthly_invoices.py

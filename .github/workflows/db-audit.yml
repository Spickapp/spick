name: DB Audit (Prod Read-Only)

# ──────────────────────────────────────────────────────────────────
# Sprint 1 Dag 3 (2026-04-24): Read-only prod-audits via Management API
# ──────────────────────────────────────────────────────────────────
# Kör fördefinierade audit-queries mot prod och skriver resultaten
# till workflow-loggen. Använder `supabase db query --linked` som
# går via Management API (HTTPS) — fungerar pålitligt från CI runners
# (till skillnad från direct DB-URL som kräver IPv6 + pooler-tenant).
#
# Auth: SUPABASE_ACCESS_TOKEN (redan i secrets). Project ref seed:as
# via supabase link-kommandot.
#
# Ingen write-access. Ingen SQL-input från parametrar (injection-safe).
# Tilläggs-audits läggs till som steps nedanför.
# ──────────────────────────────────────────────────────────────────

'on':
  workflow_dispatch:

jobs:
  audit:
    name: Read-only audit (cleaners, services, platform_settings, bookings)
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link prod-projekt
        run: supabase link --project-ref $PROJECT_ID

      - name: Audit 1 — Cleaner-dubletter (email × company_id)
        run: |
          supabase db query --linked "SELECT lower(email) AS email_lc, COUNT(*) AS n, array_agg(id::text ORDER BY created_at) AS ids FROM cleaners WHERE email IS NOT NULL GROUP BY lower(email), COALESCE(company_id::text, 'NULL') HAVING COUNT(*) > 1 ORDER BY n DESC LIMIT 20;"

      - name: Audit 2 — Hourly_rate-distribution
        run: |
          supabase db query --linked "SELECT COUNT(*) AS total, COUNT(*) FILTER (WHERE hourly_rate IS NULL) AS null_rate, COUNT(*) FILTER (WHERE hourly_rate < 200) AS below_min, COUNT(*) FILTER (WHERE hourly_rate BETWEEN 200 AND 399) AS normal, COUNT(*) FILTER (WHERE hourly_rate BETWEEN 400 AND 600) AS high, COUNT(*) FILTER (WHERE hourly_rate > 600) AS above_600, MIN(hourly_rate) AS min_rate, MAX(hourly_rate) AS max_rate, ROUND(AVG(hourly_rate)::numeric, 2) AS avg_rate FROM cleaners;"

      - name: Audit 3 — Cleaners med rate under min 200
        run: |
          supabase db query --linked "SELECT id, email, first_name, last_name, hourly_rate, company_id, is_approved FROM cleaners WHERE hourly_rate IS NOT NULL AND hourly_rate < 200 ORDER BY hourly_rate ASC LIMIT 30;"

      - name: Audit 4 — Services default_hourly_price (seed-verifiering)
        run: |
          supabase db query --linked "SELECT key, label_sv, rut_eligible, default_hourly_price, active FROM services ORDER BY display_order;"

      - name: Audit 5 — Pricing platform_settings
        run: |
          supabase db query --linked "SELECT key, value, updated_at FROM platform_settings WHERE key IN ('commission_standard','commission_top','min_hourly_rate','base_price_per_hour','default_hourly_rate','rut_pct','rut_yearly_cap_kr','money_layer_enabled','smart_trappstege_enabled','escrow_enabled','matching_algorithm_version') ORDER BY key;"

      - name: Audit 6 — PNR-status (verifiera Sprint 1 Dag 1-fix håller)
        run: |
          supabase db query --linked "SELECT length(customer_pnr) AS len, COUNT(*) AS n, COUNT(*) FILTER (WHERE created_at >= '2026-04-24') AS new_since_fix FROM bookings WHERE customer_pnr IS NOT NULL GROUP BY length(customer_pnr) ORDER BY length(customer_pnr);"

      - name: Audit 7 — Unique-constraint verifiering
        run: |
          supabase db query --linked "SELECT indexname, indexdef FROM pg_indexes WHERE indexname = 'cleaners_email_company_unique_idx';"

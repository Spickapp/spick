name: Customer Nudge Recurring (dagligen 09:00 CET)
'on':
  schedule:
    - cron: '0 7 * * *'  # 07:00 UTC = 09:00 CET — bra tid för email-öppnande
  workflow_dispatch: {}

jobs:
  nudge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kör customer-nudge-recurring
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/customer-nudge-recurring" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::customer-nudge-recurring failed with HTTP $HTTP_CODE"
            exit 1
          fi

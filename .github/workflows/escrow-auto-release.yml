name: Escrow auto-release (var 15:e minut)
'on':
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör escrow-auto-release
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/escrow-auto-release" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::escrow-auto-release failed with HTTP $HTTP_CODE"
          fi

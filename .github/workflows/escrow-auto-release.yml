name: Escrow auto-release (varje timme)
# Etapp 1 IO-fix 2026-04-25: ändrat från */15 till hourly. Spara ~75%
# IO. Acceptabel risk: escrow-release-latency max 60 min vs 15 min.
# Total escrow-period är 24 h så marginal påverkan.
'on':
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Kör escrow-auto-release
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/escrow-auto-release" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::escrow-auto-release failed with HTTP $HTTP_CODE"
            exit 1
          fi

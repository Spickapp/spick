name: Setup All GitHub Secrets
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/setup-all-secrets.yml'

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || apt install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update && sudo apt install gh -y

      - name: Set all secrets via gh CLI
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNzIyNDQsImV4cCI6MjA4OTg0ODI0NH0.CH5MSMaWTBfkuzZQOBKgxu-B6Vfy8w9DLh49WPU1Vd0"
          SERVICE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyamVpamNuY3N5dWxldHByeWR5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDI3MjI0NCwiZXhwIjoyMDg5ODQ4MjQ0fQ.fA5QAQ8Vqa_BOx4cW6i4kX3-jjPPGbWOthH0Amyy_vI"

          echo "$ANON_KEY" | gh secret set SUPABASE_ANON_KEY -R Spickapp/spick
          echo "$SERVICE_KEY" | gh secret set SUPABASE_SERVICE_ROLE_KEY -R Spickapp/spick
          echo "$SERVICE_KEY" | gh secret set SUPABASE_SERVICE_KEY -R Spickapp/spick
          echo "Spick2026!" | gh secret set SUPABASE_DB_PASSWORD -R Spickapp/spick
          echo "Spick90" | gh secret set LOOPIA_FTP_USER -R Spickapp/spick
          echo "2260113390!" | gh secret set LOOPIA_FTP_PASS -R Spickapp/spick

          echo "✅ Alla secrets satta!"
          gh secret list -R Spickapp/spick
 

name: Fix DNS via Loopia API
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: fix-github-pages
        type: choice
        options: [fix-github-pages, list-records, verify-dns]
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Run DNS fix
        env:
          U: ${{ secrets.LOOPIA_API_USER }}
          P: ${{ secrets.LOOPIA_API_PASS }}
        run: |
          api() { curl -s -X POST https://api.loopia.se/RPCSERV -H "Content-Type: text/xml" -d "$1"; }
          ACT="${{ github.event.inputs.action }}"
          if [ "$ACT" = "list-records" ]; then
            api "<?xml version='1.0'?><methodCall><methodName>getZoneRecords</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param></params></methodCall>"
          elif [ "$ACT" = "fix-github-pages" ]; then
            for IP in "75.2.60.5" "99.83.190.102"; do
              echo "Removing $IP"
              api "<?xml version='1.0'?><methodCall><methodName>removeZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><n>type</n><value><string>A</string></value></member><member><n>ttl</n><value><int>3600</int></value></member><member><n>priority</n><value><int>0</int></value></member><member><n>rdata</n><value><string>$IP</string></value></member></struct></value></param></params></methodCall>"
            done
            for IP in "185.199.108.153" "185.199.109.153" "185.199.110.153" "185.199.111.153"; do
              echo "Adding $IP"
              api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><n>type</n><value><string>A</string></value></member><member><n>ttl</n><value><int>3600</int></value></member><member><n>priority</n><value><int>0</int></value></member><member><n>rdata</n><value><string>$IP</string></value></member></struct></value></param></params></methodCall>"
            done
            echo "Done! Verifying:"
            dig +short A spick.se @8.8.8.8 || true
          elif [ "$ACT" = "verify-dns" ]; then
            dig +short A spick.se @8.8.8.8
            dig +short CNAME www.spick.se @8.8.8.8
          fi

name: Fix DNS via Loopia API
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: fix-github-pages
        type: choice
        options: [fix-github-pages, verify-dns, list-records, add-google-mx, full-reset-to-loopia]
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Run DNS action
        env:
          U: ${{ secrets.LOOPIA_API_USER }}
          P: ${{ secrets.LOOPIA_API_PASS }}
        run: |
          api() { curl -s -X POST https://api.loopia.se/RPCSERV \
            -H "Content-Type: text/xml" -d "$1"; }
          ACT="${{ github.event.inputs.action }}"

          add_a() {
            echo "Lägger till A-post: $1"
            api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><name>type</name><value><string>A</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }

          remove_a() {
            echo "Tar bort A-post: $1"
            api "<?xml version='1.0'?><methodCall><methodName>removeZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><name>type</name><value><string>A</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }

          add_cname() {
            echo "Lägger till CNAME: $1 -> $2"
            api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string>$1</string></value></param><param><value><struct><member><name>type</name><value><string>CNAME</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$2</string></value></member></struct></value></param></params></methodCall>"
          }

          remove_cname() {
            echo "Tar bort CNAME: $1 -> $2"
            api "<?xml version='1.0'?><methodCall><methodName>removeZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string>$1</string></value></param><param><value><struct><member><name>type</name><value><string>CNAME</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>0</int></value></member><member><name>rdata</name><value><string>$2</string></value></member></struct></value></param></params></methodCall>"
          }

          list_records() {
            api "<?xml version='1.0'?><methodCall><methodName>getZoneRecords</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param></params></methodCall>"
          }

          if [ "$ACT" = "fix-github-pages" ]; then
            echo "=== Pekar spick.se → GitHub Pages ==="
            echo "--- Nuvarande records ---"
            list_records | grep -o '<string>[^<]*</string>'

            echo "--- Tar bort gamla A-poster ---"
            for IP in "194.9.94.85" "194.9.94.86" "75.2.60.5" "99.83.190.102"; do
              remove_a "$IP"
            done

            echo "--- Lägger till GitHub Pages A-poster ---"
            add_a "185.199.108.153"
            add_a "185.199.109.153"
            add_a "185.199.110.153"
            add_a "185.199.111.153"

            echo "--- Lägger till www CNAME ---"
            remove_cname "www" "spick.se."
            add_cname "www" "spickapp.github.io."

            echo "--- Väntar 5s ---"
            sleep 5

            echo "--- Verifierar ---"
            dig +short A spick.se @8.8.8.8 || true
            dig +short CNAME www.spick.se @8.8.8.8 || true
            echo "=== KLAR! spick.se pekar nu på GitHub Pages ==="

          elif [ "$ACT" = "verify-dns" ]; then
            echo "--- A-poster @ ---"
            dig +short A spick.se @8.8.8.8
            echo "--- CNAME www ---"
            dig +short CNAME www.spick.se @8.8.8.8
            echo "--- MX ---"
            dig +short MX spick.se @8.8.8.8

          elif [ "$ACT" = "list-records" ]; then
            list_records

          elif [ "$ACT" = "add-google-mx" ]; then
            for entry in "1:ASPMX.L.GOOGLE.COM." "5:ALT1.ASPMX.L.GOOGLE.COM." "5:ALT2.ASPMX.L.GOOGLE.COM." "10:ALT3.ASPMX.L.GOOGLE.COM." "10:ALT4.ASPMX.L.GOOGLE.COM."; do
              PRIO="${entry%%:*}"; HOST="${entry##*:}"
              api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><name>type</name><value><string>MX</string></value></member><member><name>ttl</name><value><int>3600</int></value></member><member><name>priority</name><value><int>$PRIO</int></value></member><member><name>rdata</name><value><string>$HOST</string></value></member></struct></value></param></params></methodCall>"
            done
            echo "✅ Google MX-poster tillagda"

          elif [ "$ACT" = "full-reset-to-loopia" ]; then
            echo "=== Återställer till Loopia hosting ==="
            for IP in "185.199.108.153" "185.199.109.153" "185.199.110.153" "185.199.111.153"; do
              remove_a "$IP"
            done
            add_a "194.9.94.85"
            add_a "194.9.94.86"
            remove_cname "www" "spickapp.github.io."
            echo "=== Återställd till Loopia ==="
          fi

name: Fix DNS via Loopia API
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: clean-to-loopia
        type: choice
        options: [clean-to-loopia, add-google-mx, verify-dns, list-records]
jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Run DNS fix
        env:
          U: ${{ secrets.LOOPIA_API_USER }}
          P: ${{ secrets.LOOPIA_API_PASS }}
        run: |
          api() { curl -s -X POST https://api.loopia.se/RPCSERV -H "Content-Type: text/xml" -d "$1"; }
          ACT="${{ github.event.inputs.action }}"

          remove_a() {
            echo "Removing A $1"
            api "<?xml version='1.0'?><methodCall><methodName>removeZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><n>type</n><value><string>A</string></value></member><member><n>ttl</n><value><int>3600</int></value></member><member><n>priority</n><value><int>0</int></value></member><member><n>rdata</n><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }
          add_a() {
            echo "Adding A $1"
            api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><n>type</n><value><string>A</string></value></member><member><n>ttl</n><value><int>3600</int></value></member><member><n>priority</n><value><int>0</int></value></member><member><n>rdata</n><value><string>$1</string></value></member></struct></value></param></params></methodCall>"
          }

          if [ "$ACT" = "clean-to-loopia" ]; then
            echo "=== Tar bort ALLA felaktiga A-poster ==="
            for IP in "75.2.60.5" "99.83.190.102" "185.199.108.153" "185.199.109.153" "185.199.110.153" "185.199.111.153"; do
              remove_a "$IP"
            done
            echo "=== Lagger till korrekta Loopia IPs ==="
            add_a "194.9.94.85"
            add_a "194.9.94.86"
            echo "=== Klar! Verifierar ==="
            sleep 3
            dig +short A spick.se @8.8.8.8 || true

          elif [ "$ACT" = "add-google-mx" ]; then
            for HOST in "ASPMX.L.GOOGLE.COM." "ALT1.ASPMX.L.GOOGLE.COM." "ALT2.ASPMX.L.GOOGLE.COM." "ALT3.ASPMX.L.GOOGLE.COM." "ALT4.ASPMX.L.GOOGLE.COM."; do
              PRIO=1
              [[ "$HOST" == ALT1* || "$HOST" == ALT2* ]] && PRIO=5
              [[ "$HOST" == ALT3* || "$HOST" == ALT4* ]] && PRIO=10
              api "<?xml version='1.0'?><methodCall><methodName>addZoneRecord</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param><param><value><struct><member><n>type</n><value><string>MX</string></value></member><member><n>ttl</n><value><int>3600</int></value></member><member><n>priority</n><value><int>$PRIO</int></value></member><member><n>rdata</n><value><string>$HOST</string></value></member></struct></value></param></params></methodCall>"
            done

          elif [ "$ACT" = "list-records" ]; then
            api "<?xml version='1.0'?><methodCall><methodName>getZoneRecords</methodName><params><param><value><string>$U</string></value></param><param><value><string>$P</string></value></param><param><value><string>spick.se</string></value></param><param><value><string></string></value></param></params></methodCall>"

          elif [ "$ACT" = "verify-dns" ]; then
            echo "=== A-poster ==="
            dig +short A spick.se @8.8.8.8
            echo "=== MX ==="
            dig +short MX spick.se @8.8.8.8
          fi

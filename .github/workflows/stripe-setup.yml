name: Deploy alla edge functions (full setup)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/download/v2.22.6/supabase_linux_amd64.tar.gz | tar xz
          sudo mv supabase /usr/local/bin/supabase

      - name: Deploy stripe-checkout
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy stripe-checkout --project-ref urjeijcncsyuletprydy --no-verify-jwt

      - name: Deploy stripe-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy stripe-webhook --project-ref urjeijcncsyuletprydy --no-verify-jwt

      - name: Deploy rut-claim
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy rut-claim --project-ref urjeijcncsyuletprydy --no-verify-jwt

      - name: Deploy stripe-connect
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy stripe-connect --project-ref urjeijcncsyuletprydy --no-verify-jwt

      - name: Deploy social-media
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy social-media --project-ref urjeijcncsyuletprydy --no-verify-jwt

      - name: Set alla secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            BUFFER_ACCESS_TOKEN="${{ secrets.BUFFER_ACCESS_TOKEN }}" \
            --project-ref urjeijcncsyuletprydy
          echo "✅ Full deploy klar $(date '+%H:%M')"

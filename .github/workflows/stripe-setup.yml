name: 'Stripe Setup (kör en gång)'

'on':
  workflow_dispatch:

jobs:
  stripe-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploya stripe-checkout
        run: supabase functions deploy stripe-checkout --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya stripe-webhook
        run: supabase functions deploy stripe-webhook --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya rut-claim
        run: supabase functions deploy rut-claim --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Satt alla secrets i Supabase
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            SKV_API_KEY="${{ secrets.SKV_API_KEY }}" \
            --project-ref urjeijcncsyuletprydy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Klart
        run: echo "Alla edge functions live!"

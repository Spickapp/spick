name: 'Deploy alla edge functions'

'on':
  workflow_dispatch:
  push:
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploya stripe-checkout
        run: supabase functions deploy stripe-checkout --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya stripe-webhook
        run: supabase functions deploy stripe-webhook --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya rut-claim
        run: supabase functions deploy rut-claim --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya stripe-connect
        run: supabase functions deploy stripe-connect --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya social-media
        run: supabase functions deploy social-media --project-ref urjeijcncsyuletprydy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Satt alla secrets
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            SKV_API_KEY="${{ secrets.SKV_API_KEY }}" \
            BUFFER_ACCESS_TOKEN="${{ secrets.BUFFER_ACCESS_TOKEN }}" \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            META_ACCESS_TOKEN="${{ secrets.META_ACCESS_TOKEN }}" \
            META_PAGE_ID="${{ secrets.META_PAGE_ID }}" \
            META_IG_ACCOUNT_ID="${{ secrets.META_IG_ACCOUNT_ID }}" \
            --project-ref urjeijcncsyuletprydy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Klart
        run: echo "✅ 5 edge functions live!"

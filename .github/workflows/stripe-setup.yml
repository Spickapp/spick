name: 'Stripe Setup (kör en gång)'

'on':
  workflow_dispatch:

jobs:
  stripe-setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploya stripe-checkout edge function
        run: |
          supabase functions deploy stripe-checkout \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploya stripe-webhook edge function
        run: |
          supabase functions deploy stripe-webhook \
            --project-ref urjeijcncsyuletprydy \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Satt Stripe secrets i Supabase
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --project-ref urjeijcncsyuletprydy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Installera PostgreSQL-klient
        run: sudo apt-get install -y postgresql-client

      - name: Kor SQL-migration via psql
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          psql \
            -h db.urjeijcncsyuletprydy.supabase.co \
            -U postgres \
            -d postgres \
            -f supabase/migrations/20260325_stripe_payments.sql

      - name: Klart
        run: echo "Stripe fullstandigt driftsatt!"

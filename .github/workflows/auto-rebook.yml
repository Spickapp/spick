name: Auto-rebook (dagligen 05:00 UTC)
'on':
  schedule:
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 CET
  workflow_dispatch: {}

jobs:
  rebook:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Kör auto-rebook
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/auto-rebook" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Auto-rebook failed with HTTP $HTTP_CODE"
            exit 1
          fi

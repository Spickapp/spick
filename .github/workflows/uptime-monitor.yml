name: Uptime Monitor
'on':
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Check spick.se
        id: check
        run: |
          # Följ redirects och acceptera 2xx/3xx
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 --location https://spick.se 2>/dev/null || echo "000")
          echo "HTTP Status: $STATUS"
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [[ "$STATUS" =~ ^[23] ]]; then
            echo "OK"
            exit 0
          fi
          echo "is_down=true" >> $GITHUB_OUTPUT

      - name: Debounce check (max 1 larm/timme)
        if: steps.check.outputs.is_down == 'true'
        id: debounce
        env:
          SUPA_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          STATUS: ${{ steps.check.outputs.status }}
        run: |
          # Dubbelkolla med en andra request
          STATUS2=$(curl -o /dev/null -s -w "%{http_code}" --max-time 15 --location https://spick.se 2>/dev/null || echo "000")
          if [[ "$STATUS2" =~ ^[23] ]]; then
            echo "Falsk alarm — andra request OK (HTTP $STATUS2)"
            exit 0
          fi
          echo "Bekräftat nere: HTTP $STATUS + $STATUS2"
          if [ -n "$SUPA_KEY" ]; then
            curl -s -X POST https://urjeijcncsyuletprydy.supabase.co/functions/v1/notify \
              -H "Content-Type: application/json" \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -d "{\"type\":\"uptime_alert\",\"record\":{\"message\":\"spick.se HTTP $STATUS (bekräftat: $STATUS2)\"}}" || true
          fi

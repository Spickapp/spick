name: Deploy Supabase Edge Functions
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy alla Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT="urjeijcncsyuletprydy"
          for fn in notify geo push claude bankid; do
            echo "▶ Deploying $fn..."
            supabase functions deploy $fn --project-ref $PROJECT \
              --no-verify-jwt 2>&1 && echo "✅ $fn klar!" || echo "⚠️ $fn fel"
          done

      - name: Sätt Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            VAPID_PUBLIC_KEY=BFq-Saij81SXRzVsPmNgFBOLPD7CeokFSSszEKTKBFzs2rOzKHSpf9nNYMERDKAdXiNNm2PDNRFJnZtLWPnSdH4 \
            VAPID_PRIVATE_KEY=9-qIkV5sEL1JpuFyypvOWnGKKJ1XDgdZlZBFKzTn9eE \
            RESEND_API_KEY=re_KxTTppVD_MZkRApNRrB236wNTFZ32vfdB \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --project-ref urjeijcncsyuletprydy
          echo "✅ Secrets satta!"

name: Deploy Edge Functions

# H18-fix (2026-04-24): Auto-gen EF-lista från katalog + change-detection.
# Rule #28 SSOT: `supabase/functions/` är source of truth, inte en
# hårdkodad lista i denna workflow (tidigare 32 av 83 EFs).
#
# Strategi:
#  - push: deploy bara ändrade EFs (git-diff mot previous sha)
#  - Om _shared/ ändrats: deploy ALLA EFs (de importerar från _shared)
#  - workflow_dispatch: deploy ALLA (backup-väg)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:
    inputs:
      deploy_all:
        description: 'Deploy alla EFs oavsett diff (default true för manuell)'
        required: false
        default: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # behövs för git-diff mot föregående commit

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Bestäm vilka EFs som ska deployas
        id: plan
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          DEPLOY_ALL_INPUT="${{ github.event.inputs.deploy_all }}"

          # Lista alla deployable EFs (har index.ts, ej _-prefixade)
          ALL_EFS=()
          for dir in supabase/functions/*/; do
            name=$(basename "$dir")
            # Skip internal helpers (_shared, _tests, etc.)
            case "$name" in
              _*) continue ;;
            esac
            if [ -f "$dir/index.ts" ]; then
              ALL_EFS+=("$name")
            fi
          done
          echo "Totalt deployable: ${#ALL_EFS[@]} EFs"

          # Bestäm vilka som ska deployas
          DEPLOY_ALL="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$DEPLOY_ALL_INPUT" != "false" ]; then
            DEPLOY_ALL="true"
            echo "workflow_dispatch med deploy_all=$DEPLOY_ALL_INPUT → deploya ALLA"
          fi

          TO_DEPLOY=()
          if [ "$DEPLOY_ALL" = "true" ]; then
            TO_DEPLOY=("${ALL_EFS[@]}")
          else
            # Git-diff mot föregående commit
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- supabase/functions/ || echo "")
            echo "Changed files:"
            echo "$CHANGED"

            # Om _shared/ ändrats → deploy alla (de importerar från _shared)
            if echo "$CHANGED" | grep -q "^supabase/functions/_shared/"; then
              echo "⚠ _shared/ ändrat → deploya ALLA EFs"
              TO_DEPLOY=("${ALL_EFS[@]}")
            else
              # Extrahera EF-namn från changed files
              declare -A SEEN
              while IFS= read -r path; do
                [ -z "$path" ] && continue
                # path format: supabase/functions/<ef-name>/...
                ef=$(echo "$path" | awk -F/ '{print $3}')
                if [ -n "$ef" ] && [ -z "${SEEN[$ef]}" ]; then
                  case "$ef" in _*) continue ;; esac
                  # Verifiera att EF är deployable (har index.ts)
                  if [ -f "supabase/functions/$ef/index.ts" ]; then
                    TO_DEPLOY+=("$ef")
                    SEEN[$ef]=1
                  fi
                fi
              done <<< "$CHANGED"
            fi
          fi

          echo "Kommer att deploya: ${#TO_DEPLOY[@]} EFs"
          printf '  - %s\n' "${TO_DEPLOY[@]}"

          # Spara till output för nästa steg
          {
            echo 'to_deploy<<EOF'
            printf '%s\n' "${TO_DEPLOY[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "count=${#TO_DEPLOY[@]}" >> "$GITHUB_OUTPUT"

      - name: Deploy EFs
        if: steps.plan.outputs.count != '0'
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_ID }}"
          FAILED=0
          SUCCEEDED=0

          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "::group::Deploy $fn"
            if supabase functions deploy "$fn" --project-ref "$REF" --no-verify-jwt; then
              echo "✓ OK: $fn"
              SUCCEEDED=$((SUCCEEDED + 1))
            else
              echo "✗ FAILED: $fn"
              FAILED=$((FAILED + 1))
            fi
            echo "::endgroup::"
          done <<< "${{ steps.plan.outputs.to_deploy }}"

          echo ""
          echo "═══════════════════════════════════════"
          echo " Deploy-summary"
          echo "═══════════════════════════════════════"
          echo " Success: $SUCCEEDED"
          echo " Failed:  $FAILED"
          echo "═══════════════════════════════════════"

          [ "$FAILED" -eq 0 ] || exit 1

      - name: Ingen deploy behövdes
        if: steps.plan.outputs.count == '0'
        run: |
          echo "::notice title=Deploy EFs::Inga EFs att deploya — inga relevanta ändringar"

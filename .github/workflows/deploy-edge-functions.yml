name: Deploy Edge Functions
'on':
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: urjeijcncsyuletprydy
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: |
          # Deploya alla functions (med JWT-verifiering som standard)
          supabase functions deploy --project-ref $PROJECT_ID
          
          # Omdeployera functions som behöver --no-verify-jwt
          # (anropas från frontend, cron, eller webhooks utan Supabase JWT)
          for fn in health stripe-checkout stripe-webhook notify \
                    booking-create booking-cancel-v2 cleaner-optout cleanup-stale auto-remind \
                    social-media geo email-inbound swish \
                    bankid bankid-verify bankid-webhook \
                    rut-claim push; do
            if [ -d "supabase/functions/$fn" ]; then
              echo "🔓 Deploy $fn (no-verify-jwt)"
              supabase functions deploy "$fn" --project-ref $PROJECT_ID --no-verify-jwt
            fi
          done
          echo "✅ Alla Edge Functions deployade"

name: Deploy Supabase Edge Functions
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy notify --project-ref urjeijcncsyuletprydy
          supabase functions deploy claude --project-ref urjeijcncsyuletprydy
          echo "✅ Edge functions deployed!"

      - name: Set ANTHROPIC_API_KEY secret
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          supabase secrets set ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY --project-ref urjeijcncsyuletprydy
          echo "✅ ANTHROPIC_API_KEY satt i Supabase!"

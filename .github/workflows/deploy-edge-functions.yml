name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      # Hygien-flagg H18 (2026-04-24): Listan nedan täcker INTE alla 78 EFs
      # i repo (per CLAUDE.md). Rule #28 SSOT-brott — listan är stale sedan
      # många EFs lades till utan att uppdateras här. Flaggat för separat
      # hygien-sprint: auto-generera lista från `supabase/functions/`-katalogen.
      - name: Deploy Edge Functions
        run: |
          REF="${{ secrets.SUPABASE_PROJECT_ID }}"

          FUNCTIONS=(
            admin-morning-report
            auto-approve-check
            auto-remind
            bankid
            bankid-verify
            bankid-webhook
            booking-cancel-v2
            booking-create
            claude
            cleaner-optout
            cleanup-stale
            email-inbound
            export-customer-data
            generate-receipt
            geo
            get-cleaner-contact
            health
            notify
            notify-new-application
            onboarding-reminders
            onboarding-save
            places-autocomplete
            push
            referral-register
            serve-invoice
            sms
            social-media
            stripe-connect
            stripe-refund
            stripe-webhook
            swish
            team-sms-notify
          )

          FAILED=0
          for fn in "${FUNCTIONS[@]}"; do
            echo "--- Deploying $fn ---"
            if supabase functions deploy "$fn" --project-ref "$REF" --no-verify-jwt; then
              echo "OK: $fn"
            else
              echo "FAILED: $fn"
              FAILED=$((FAILED + 1))
            fi
          done

          echo "--- Done: ${#FUNCTIONS[@]} functions, $FAILED failed ---"
          [ "$FAILED" -eq 0 ] || exit 1

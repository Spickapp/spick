name: Admin Morning Report
'on':
  schedule:
    # Etapp 1 IO-fix 2026-04-25: 3 stages → 1 stage. Spara ~67% IO.
    # 03:00 UTC är off-peak för GitHub Actions (lägre delay-risk).
    # Risk: om GH Actions är ner 03:00 UTC missas dagens rapport — kan
    # triggas manuellt via workflow_dispatch om så.
    # EF idempotency-guard kvar (platform_settings.morning_report_last_sent_
    # date=YYYY-MM-DD svensk tid) → manuell re-run inte dubbel-skickar.
    - cron: '0 1 * * *'  # 01:00 UTC = 03:00 CEST (off-peak primär)
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send morning report
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/admin-morning-report" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::admin-morning-report failed with HTTP $HTTP_CODE"
            exit 1
          fi

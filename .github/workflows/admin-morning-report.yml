name: Admin Morning Report
'on':
  schedule:
    # 3 körningar per dygn för att absorbera GitHub Actions peak-delay.
    # EF:n har idempotency-guard (platform_settings.morning_report_last_sent_
    # date=YYYY-MM-DD svensk tid) — bara första lyckade körningen per dag
    # skickar mail, resterande returnerar {skipped:true}.
    # Tidigare 06:07 UTC försenades 4-5h (peak); 03:00 UTC försenades 8-9h
    # vid extrema peaks. 3 ancharkar garanterar leverans före 08:00 CEST
    # i 99%+ av fallen.
    - cron: '0 1 * * *'  # 01:00 UTC = 03:00 CEST (off-peak)
    - cron: '0 3 * * *'  # 03:00 UTC = 05:00 CEST (primär)
    - cron: '0 5 * * *'  # 05:00 UTC = 07:00 CEST (backup)
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send morning report
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/admin-morning-report" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::admin-morning-report failed with HTTP $HTTP_CODE"
            exit 1
          fi

name: Admin Morning Report
'on':
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC = 05:00 CEST. Off-peak ger typisk leverans 05:00-07:00 CEST (GitHub Actions cron-delay 0-2h). Tidigare 06:07 UTC försenades 4-5h pga peak-load (verifierat 2026-04-24: runs skedde faktiskt 10:48-11:07 UTC).
  workflow_dispatch: {}

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Send morning report
        env:
          SUPA_URL: https://urjeijcncsyuletprydy.supabase.co
          SUPA_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $SUPA_KEY" \
            -H "apikey: $SUPA_KEY" \
            -H "Content-Type: application/json" \
            "$SUPA_URL/functions/v1/admin-morning-report" \
            -d '{}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::warning::admin-morning-report failed with HTTP $HTTP_CODE"
            exit 1
          fi
